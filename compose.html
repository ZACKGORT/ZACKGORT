/* ══════════════════════════════════
   COMPOSE STUDIO
══════════════════════════════════ */
function openComposeStudio(rmId,citId,viewId){
  var rm=getRoom(rmId);if(!rm)return;
  csState={rmId:rmId,citId:citId,viewId:viewId};
  var cit=citId?citations.find(function(c){return c.id===citId;}):null;
  var eff=cit?resolveRoom(rm,cit):rm;
  g('compose-ttl').textContent=cit?'Override · Room':'Edit · Room';
  g('compose-rm-name').textContent=rm.name||rm.layout;
  var colL=g('cs-col-left'),colR=g('cs-col-right');
  colL.innerHTML='';colR.innerHTML='';
  function mkSec(col,title){var s=ce('div');s.className='cs-sec';var t=ce('div');t.className='cs-sec-t';t.textContent=title;s.appendChild(t);col.appendChild(s);return s;}
  function mkRow(sec,lbl,field,multi,placeholder,isOv){
    var r=ce('div');r.className='cs-row'+(multi?' top':'');
    var l=ce('span');l.className='cs-lbl';l.textContent=lbl;
    var inp=multi?ce('textarea'):ce('input');
    inp.className=multi?'cs-ta':'cs-in';
    if(isOv){inp.value=(cit&&cit.overrides&&cit.overrides[field])||'';inp.placeholder='Base: '+((rm[field]||'').slice(0,28)||'—');}
    else{inp.value=rm[field]||'';inp.placeholder=placeholder||lbl;}
    if(multi){inp.rows=3;setTimeout(function(){inp.style.height='auto';inp.style.height=inp.scrollHeight+'px';},0);}
    inp.dataset.csfield=field;inp.dataset.csov=isOv?'1':'0';
    r.appendChild(l);r.appendChild(inp);sec.appendChild(r);return inp;
  }
  function mkSelRow(sec,lbl,field,opts){
    var r=ce('div');r.className='cs-row';var l=ce('span');l.className='cs-lbl';l.textContent=lbl;
    var sel=ce('select');sel.className='cs-sel';
    opts.forEach(function(o){var opt=ce('option');opt.value=o.id;opt.textContent=o.name||o.id;if(rm[field]===o.id)opt.selected=true;sel.appendChild(opt);});
    sel.dataset.csfield=field;sel.dataset.csov='0';
    r.appendChild(l);r.appendChild(sel);sec.appendChild(r);return sel;
  }
  /* LEFT — Identity + Palette */
  var sId=mkSec(colL,'Identity');
  mkRow(sId,'Name','name',false,'Room name',false);
  mkRow(sId,'Label','label',false,'Section label',cit?true:false);
  mkSelRow(sId,'Layout','layout',LAYOUTS);
  mkSelRow(sId,'Type','contentType',CTYPES);
  var sPal=mkSec(colL,'Palette');
  var palRow=ce('div');palRow.className='cs-pal-row';
  var activePal=cit&&cit.overrides&&cit.overrides.palette!==undefined?cit.overrides.palette:rm.palette;
  PALS.forEach(function(p){
    var sw=ce('div');sw.className='cs-pal-sw'+(activePal===p.id?' sel':'');
    sw.style.background=p.col;sw.title=p.name;sw.dataset.cspalette=p.id;
    palRow.appendChild(sw);
  });
  sPal.appendChild(palRow);
  /* Commerce fields */
  if(rm.layout==='showcase'||rm.layout==='cart'||rm.layout==='hero'){
    var sProd=mkSec(colL,'Product');
    mkRow(sProd,'Price','price',false,'$0.00',false);
    mkRow(sProd,'Subtitle','priceSub',false,'e.g. Free shipping',false);
    mkRow(sProd,'Image URL','img',false,'https://...',false);
    /* variants */
    var vr=ce('div');vr.className='cs-row top';var vl=ce('span');vl.className='cs-lbl';vl.textContent='Variants';
    var vwrap=ce('div');vwrap.style.flex='1';
    var vlist=ce('div');vlist.className='var-list';
    function renderVarList(){
      vlist.innerHTML='';
      (rm.variants||[]).forEach(function(v,i){
        var chip=ce('div');chip.className='var-chip';chip.textContent=v;
        var del=ce('button');del.className='var-chip-del';del.textContent='×';del.addEventListener('click',function(){rm.variants.splice(i,1);renderVarList();syncAll();});
        chip.appendChild(del);vlist.appendChild(chip);
      });
    }
    renderVarList();
    var vadd=ce('div');vadd.className='var-add';
    var vinp=ce('input');vinp.placeholder='e.g. Black / S';
    var vbtn=ce('button');vbtn.textContent='Add';
    vbtn.addEventListener('click',function(){var v=vinp.value.trim();if(!v)return;if(!rm.variants)rm.variants=[];rm.variants.push(v);vinp.value='';renderVarList();syncAll();});
    vinp.addEventListener('keydown',function(e){if(e.key==='Enter'){vbtn.click();}});
    vadd.appendChild(vinp);vadd.appendChild(vbtn);
    vwrap.appendChild(vlist);vwrap.appendChild(vadd);
    vr.appendChild(vl);vr.appendChild(vwrap);sProd.appendChild(vr);
    /* spec rows */
    var sSpec=mkSec(colL,'Specs');
    var specList=ce('div');specList.className='spec-list';
    function renderSpecList(){
      specList.innerHTML='';
      (rm.specRows||[]).forEach(function(sr,i){
        var row=ce('div');row.className='spec-row-inp';
        var ki=ce('input');ki.className='spec-k';ki.value=sr.k||'';ki.placeholder='Material';
        var vi=ce('input');vi.className='spec-v';vi.value=sr.v||'';vi.placeholder='100% cotton';
        var del=ce('button');del.className='spec-del';del.textContent='×';
        ki.addEventListener('input',function(){sr.k=ki.value;syncAll();});
        vi.addEventListener('input',function(){sr.v=vi.value;syncAll();});
        del.addEventListener('click',function(){rm.specRows.splice(i,1);renderSpecList();syncAll();});
        row.appendChild(ki);row.appendChild(vi);row.appendChild(del);specList.appendChild(row);
      });
      var addb=ce('button');addb.className='spec-add-btn';addb.textContent='+ Add spec row';
      addb.addEventListener('click',function(){if(!rm.specRows)rm.specRows=[];rm.specRows.push({k:'',v:''});renderSpecList();syncAll();});
      specList.appendChild(addb);
    }
    renderSpecList();
    sSpec.appendChild(specList);
  }
  /* RIGHT — Copy */
  var sCopy=mkSec(colR,'Copy');
  var isOvCopy=!!cit;
  mkRow(sCopy,'Headline','headline',true,'Main heading…',isOvCopy);
  mkRow(sCopy,'Body','body',true,'Narrative copy…',isOvCopy);
  mkRow(sCopy,'Pull','pull',false,'Pull quote…',isOvCopy);
  /* context note for citation */
  if(cit){
    var sCtx=mkSec(colR,'Context');
    var note=ce('div');note.style.cssText='font-family:var(--mono);font-size:6.5px;color:var(--ink3);line-height:1.7';
    var vw=getView(cit.viewId);
    note.innerHTML='Override for <strong style="color:var(--ink2)">'+(vw?vw.name||vw.slug:'view')+'</strong> · pos '+cit.position+'<br>Blank fields inherit from the room.';
    sCtx.appendChild(note);
  }
  /* live sync */
  function syncAll(){refreshPoolRow(rm.id);refreshAllSlotsForRoom(rm.id);if(prevPanelViewId)syncPrevPanel();save();}
  var inner=g('compose-inner');
  inner.addEventListener('input',function csInput(e){
    var f=e.target.closest('[data-csfield]');if(!f)return;
    var field=f.dataset.csfield,val=f.value;
    if(f.dataset.csov==='1'&&cit){if(!cit.overrides)cit.overrides={};cit.overrides[field]=val;syncAll();}
    else{rm[field]=val;syncAll();}
  });
  inner.addEventListener('change',function(e){
    var f=e.target.closest('[data-csfield]');if(!f)return;
    var field=f.dataset.csfield,val=f.value;rm[field]=val;syncAll();
  });
  inner.addEventListener('click',function(e){
    var sw=e.target.closest('[data-cspalette]');if(!sw)return;
    var pid=sw.dataset.cspalette;
    if(cit){if(!cit.overrides)cit.overrides={};cit.overrides.palette=pid;}
    else rm.palette=pid;
    inner.querySelectorAll('.cs-pal-sw').forEach(function(s){s.classList.toggle('sel',s.dataset.cspalette===pid);});
    syncAll();
  });
  g('compose-studio').classList.add('open');
}
function closeComposeStudio(){g('compose-studio').classList.remove('open');}
g('compose-close').addEventListener('click',closeComposeStudio);
g('cs-save').addEventListener('click',closeComposeStudio);
g('compose-studio').addEventListener('click',function(e){if(e.target===g('compose-studio'))closeComposeStudio();});
g('cs-preview-btn').addEventListener('click',function(){
  var vid=csState.viewId;
  if(!vid&&csState.citId){var cit=citations.find(function(c){return c.id===csState.citId;});if(cit)vid=cit.viewId;}
  if(vid)presentView(vid);else if(views.length)presentView(views[0].id);
  closeComposeStudio();
});

/* ══════════════════════════════════
   PRESENT MODE — render engine
══════════════════════════════════ */
var _presViewId=null,_psChwOpen=false;
function presentView(vwId){
  var vw=getView(vwId);if(!vw){toast('View not found');return;}
  var vcits=viewCitations(vwId);if(!vcits.length){toast('No rooms in this view');return;}
  _presViewId=vwId;
  setMode('present');
}
function renderPresent(){
  var vwId=_presViewId||(views.length?views[0].id:null);
  if(!vwId)return;
  var vw=getView(vwId);if(!vw)return;
  var vcits=viewCitations(vwId);
  /* populate view selector */
  var sel=g('ps-view-sel');sel.innerHTML='';
  views.forEach(function(v){var o=ce('option');o.value=v.id;o.textContent=v.name||v.slug;if(v.id===vwId)o.selected=true;sel.appendChild(o);});
  g('ps-nm').textContent=g('tb-proj').value||'folio';
  /* build rooms */
  var rr=g('ps-rooms');rr.innerHTML='';
  var nav=g('ps-nav');nav.innerHTML='';
  vcits.forEach(function(cit,i){
    var rm=getRoom(cit.roomId);if(!rm)return;
    var eff=resolveRoom(rm,cit);
    var sn=ce('span');sn.className='psn';sn.textContent=rm.name||rm.layout;sn.dataset.sr=i;nav.appendChild(sn);
    if(i<vcits.length-1){var sep=ce('span');sep.className='psn-sep';sep.textContent='/';nav.appendChild(sep);}
    rr.appendChild(buildPresentRoom(eff,i));
  });
  /* chapter HUD */
  buildPsChw(vcits);
  /* scroll reveal — zackgort style: add .anim to trigger staggered animations */
  var scr=g('ps-scroll');scr.scrollTop=0;
  /* animate first room immediately */
  setTimeout(function(){var first=g('psr-0');if(first)first.classList.add('anim');},180);
  /* IntersectionObserver for subsequent rooms */
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting)e.target.classList.add('anim');
    });
  },{root:scr,threshold:.25});
  g('ps-rooms').querySelectorAll('.rm').forEach(function(rm){io.observe(rm);});
  scr.onscroll=function(){
    var pct=scr.scrollTop/(scr.scrollHeight-scr.clientHeight)*100;
    g('ps-prog').style.width=pct+'%';
    g('ps-bar').classList.toggle('scrolled',scr.scrollTop>60);
    updatePsChw(vcits);
  };
  /* parallax */
  startPar();
}
/* view switcher in present bar */
g('ps-view-sel').addEventListener('change',function(){_presViewId=this.value;renderPresent();});
g('ps-nav').addEventListener('click',function(e){var s=e.target.closest('[data-sr]');if(s){var t=g('psr-'+s.dataset.sr);var sc=g('ps-scroll');if(t&&sc)sc.scrollTo({top:t.offsetTop,behavior:'smooth'});}});
g('btn-ps-back').addEventListener('click',function(){stopPar();setMode('compose');});

function buildPresentRoom(rm,idx){
  var ly=getLayout(rm.layout);
  var acc=rm.palette?PALS.find(function(p){return p.id===rm.palette;}):null;
  var acCol=acc?acc.col:ly.col;
  var ambCol=acc?'rgba('+hexToRgb(acc.col)+',0.18)':'rgba(200,112,74,0.18)';
  var lbl=(rm.label||ly.name).toUpperCase();
  var hl=rm.headline||rm.name||ly.name;
  var body=rm.body||'';
  var pull=rm.pull||'';
  var bgSrc=rm.img||(IMGS[rm.layout]||IMGS.full);

  var sec=ce('section');
  sec.className='rm';
  sec.setAttribute('data-l',rm.layout);
  if(rm.palette)sec.setAttribute('data-p',rm.palette);
  sec.id='psr-'+idx;
  sec.style.setProperty('--rm-acc',acCol);
  sec.style.setProperty('--rm-amb',ambCol);

  /* background image — low opacity like zackgort */
  var img=ce('img');img.className='rm-img';img.src=bgSrc;img.alt='';
  setTimeout(function(){img.classList.add('vis');},60);
  sec.appendChild(img);

  /* diagonal scrim */
  var scrim=ce('div');scrim.className='rm-scrim';sec.appendChild(scrim);

  /* ambient glow */
  var amb=ce('div');amb.className='rm-ambient';sec.appendChild(amb);
  setTimeout(function(){amb.classList.add('on');},400);

  /* ghost overlay — atmospheric type layer from food.html */
  var ghostWords={'full':['Come','as you are'],'split':['On','Tap'],'hero':['Furnace','Street'],'showcase':['The','Goods'],'essay':['The','Story'],'cta':['Come','In'],'cart':['Your','Order']};
  var gw=ghostWords[rm.layout]||[hl.split(' ')[0]||''];
  /* custom ghost per headline */
  if(hl){var hw=hl.replace(/[^a-z0-9\s]/gi,'').trim().split(/\s+/);if(hw.length)gw=[hw[0],hw.slice(1,3).join(' ')];}
  var ghost=ce('div');ghost.className='rm-ghost';
  gw.forEach(function(w){if(!w)return;var d=ce('div');d.className='rm-ghost-word';d.textContent=w;ghost.appendChild(d);});
  sec.appendChild(ghost);

  /* slide index */
  var sidx=ce('div');sidx.className='rm-idx';sidx.textContent=String(idx+1).padStart(2,'0')+'/';sec.appendChild(sidx);

  /* helpers */
  function mkEra(){var e=ce('div');e.className='ps-era';e.textContent=lbl;return e;}
  function mkHl(){var e=ce('div');e.className='ps-hl';e.textContent=hl;return e;}
  function mkBody(){var e=ce('div');e.className='ps-body';e.textContent=body;return e;}
  function mkPq(){var e=ce('div');e.className='ps-pq';e.textContent=pull;return e;}
  function mkCta(txt){var b=ce('button');b.className='ps-cta';b.textContent=txt||'Explore →';return b;}

  if(rm.layout==='showcase'){
    /* showcase: left side has image+editorial, right panel has product details */
    var left=ce('div');left.className='sc-left';

    /* editorial content anchored bottom-left inside left column */
    var cont=ce('div');cont.className='rm-content';
    cont.appendChild(mkEra());
    cont.appendChild(mkHl());
    if(body)cont.appendChild(mkBody());
    if(pull)cont.appendChild(mkPq());
    left.appendChild(cont);
    sec.appendChild(left);

    /* right product panel */
    var right=ce('div');right.className='sc-right';

    if(rm.price){
      var pv=ce('div');pv.className='sc-price-val';pv.textContent=rm.price;right.appendChild(pv);
    }
    if(rm.priceSub){
      var ps2=ce('div');ps2.className='sc-price-sub';ps2.textContent=rm.priceSub;right.appendChild(ps2);
    }
    if(rm.variants&&rm.variants.length){
      var vars=ce('div');vars.className='sc-variants';
      rm.variants.forEach(function(v){
        var b=ce('button');b.className='sc-var';b.textContent=v;
        b.addEventListener('click',function(){
          vars.querySelectorAll('.sc-var').forEach(function(x){x.classList.remove('active');});
          b.classList.add('active');
        });
        vars.appendChild(b);
      });
      right.appendChild(vars);
    }
    if(rm.specRows&&rm.specRows.length){
      var specm=ce('div');specm.className='sc-specs-mini';
      rm.specRows.forEach(function(sr){
        var row=ce('div');row.className='sc-spec-row';
        var sk=ce('span');sk.className='sc-sk';sk.textContent=sr.k;
        var sv=ce('span');sv.className='sc-sv';sv.textContent=sr.v;
        row.appendChild(sk);row.appendChild(sv);specm.appendChild(row);
      });
      right.appendChild(specm);
    }
    var atcb=ce('button');atcb.className='sc-atc';atcb.textContent='Add to bag →';right.appendChild(atcb);
    sec.appendChild(right);

  } else if(rm.layout==='cart'){
    var cont2=ce('div');cont2.className='rm-content';
    cont2.appendChild(mkEra());
    cont2.appendChild(mkHl());
    if(body)cont2.appendChild(mkBody());

    var cartItems=ce('div');cartItems.className='cart-items';
    var totalVal=0;
    if(_presViewId){
      viewCitations(_presViewId).forEach(function(c){
        var r2=getRoom(c.roomId);if(!r2||r2.layout!=='showcase')return;
        var eff2=resolveRoom(r2,c);
        var crow=ce('div');crow.className='cart-row';
        var cimg=ce('div');cimg.className='cart-row-img';
        if(eff2.img){var ci2=ce('img');ci2.src=eff2.img;ci2.alt='';cimg.appendChild(ci2);}
        var cinfo=ce('div');cinfo.className='cart-row-info';
        var cname=ce('div');cname.className='cart-row-name';cname.textContent=(eff2.headline||eff2.name||'Product').slice(0,32);
        var cmeta=ce('div');cmeta.className='cart-row-meta';
        cmeta.textContent=eff2.variants&&eff2.variants[0]?eff2.variants[0]:'—';
        cinfo.appendChild(cname);cinfo.appendChild(cmeta);
        var cprice=ce('div');cprice.className='cart-row-price';
        var pnum=parseFloat((eff2.price||'0').replace(/[^0-9.]/g,''))||0;
        totalVal+=pnum;cprice.textContent=eff2.price||'—';
        crow.appendChild(cimg);crow.appendChild(cinfo);crow.appendChild(cprice);
        cartItems.appendChild(crow);
      });
    }
    if(!cartItems.children.length){
      var fr=ce('div');fr.className='cart-row';
      var fi2=ce('div');fi2.className='cart-row-img';
      var finfo=ce('div');finfo.className='cart-row-info';
      var fn=ce('div');fn.className='cart-row-name';fn.textContent='Your selections';
      var fm=ce('div');fm.className='cart-row-meta';fm.textContent='Review before checkout';
      finfo.appendChild(fn);finfo.appendChild(fm);
      var fp=ce('div');fp.className='cart-row-price';fp.textContent='—';
      fr.appendChild(fi2);fr.appendChild(finfo);fr.appendChild(fp);
      cartItems.appendChild(fr);
    }
    cont2.appendChild(cartItems);
    var tot=ce('div');tot.className='cart-total';
    var tl=ce('div');tl.className='cart-total-lbl';tl.textContent='Total';
    var tv=ce('div');tv.className='cart-total-val';
    tv.textContent=totalVal>0?('$'+totalVal.toFixed(2)):'—';
    tot.appendChild(tl);tot.appendChild(tv);cont2.appendChild(tot);
    var chk=ce('button');chk.className='btn-checkout';chk.textContent='Checkout →';cont2.appendChild(chk);
    sec.appendChild(cont2);

  } else {
    /* all other layouts: full-viewport with bottom-anchored content */
    var cont3=ce('div');cont3.className='rm-content';
    cont3.appendChild(mkEra());
    cont3.appendChild(mkHl());
    if(body)cont3.appendChild(mkBody());
    if(pull)cont3.appendChild(mkPq());
    if(rm.layout==='cta'){
      cont3.style.justifyContent='center';cont3.style.alignItems='center';cont3.style.textAlign='center';
      cont3.appendChild(mkCta('Get started →'));
    } else if(rm.layout!=='essay'){
      cont3.appendChild(mkCta(rm.layout==='split'?'View →':'Explore →'));
    }
    sec.appendChild(cont3);
  }

  return sec;
}

/* hex to rgb helper for ambient */
function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

/* chapter HUD */
function buildPsChw(vcits){
  var chw=g('ps-chw');chw.style.display=vcits.length>1?'block':'none';
  var dd=g('ps-chw-dd');dd.innerHTML='';
  vcits.forEach(function(cit,i){
    var rm=getRoom(cit.roomId);if(!rm)return;
    var b=ce('button');b.className='ps-chw-it'+(i===0?' act':'');b.dataset.sr=i;

/* parallax */
var _parOn=false,_parFn=null;
function startPar(){
  if(_parOn)return;_parOn=true;
  var P={x:0,y:0,tx:0,ty:0,mx:window.innerWidth/2,my:window.innerHeight/2};
  window.addEventListener('mousemove',function(e){P.mx=e.clientX;P.my=e.clientY;});
  function tick(){
    if(!_parOn)return;
    var cx=window.innerWidth/2,cy=window.innerHeight/2;
    P.tx=(P.mx-cx)/cx*3.5;P.ty=(P.my-cy)/cy*3.5;
    P.x+=(P.tx-P.x)*.07;P.y+=(P.ty-P.y)*.07;
    g('ps-rooms').querySelectorAll('.rm-img').forEach(function(img){img.style.transform='translate3d('+P.x+'px,'+P.y+'px,0) scale(1.05)';});
    requestAnimationFrame(tick);
  }
  _parFn=tick;requestAnimationFrame(tick);
}
function stopPar(){
  _parOn=false;
  g('ps-rooms').querySelectorAll('.rm-img').forEach(function(img){img.style.transform='';});
}

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='Escape'){
    if(createMenuOpen){closeCreateMenu();return;}
    if(g('compose-studio').classList.contains('open')){closeComposeStudio();return;}
    if(currentMode==='present'){stopPar();setMode('compose');return;}
  }
  if(currentMode!=='compose')return;
  if(e.key==='Backspace'||e.key==='Delete'){
    if(selectedCitId){e.preventDefault();removeCitation(selectedCitId);}
    else if(selectedId){e.preventDefault();deleteRoom(selectedId);}
  }
  if(e.key==='f'||e.key==='F')fit();
  if(e.key==='p'||e.key==='P'){if(views.length)presentView(prevPanelViewId||views[0].id);}
  if(e.key==='r'||e.key==='R'){addRoom('full','brand');toast('Brand room added');}
  if(e.key==='v'||e.key==='V'){addView();toast('View lane added');}
  if(e.key==='e'||e.key==='E'){
    if(selectedCitId){var cit=citations.find(function(c){return c.id===selectedCitId;});if(cit)openComposeStudio(cit.roomId,cit.id,cit.viewId);}
    else if(selectedId)openComposeStudio(selectedId,null,null);
  }
});
