<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>folio · commerce magazine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,700;0,900;1,700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
:root{
  --bg:#f5f2ec;--bg2:#eeebe4;--bg3:#e6e2da;--bg4:#dedad0;
  --ink:#1a1816;--ink2:#5a5650;--ink3:#a09890;
  --acc:#b8622a;--accl:rgba(184,98,42,.08);--accd:rgba(184,98,42,.04);
  --view:#2a58a0;--viewl:rgba(42,88,160,.08);
  --bdr:rgba(26,24,22,.05);--bdr2:rgba(26,24,22,.10);--bdr3:rgba(26,24,22,.22);
  --mono:'DM Mono',monospace;--disp:'DM Serif Display',serif;
  --cond:'Barlow Condensed',sans-serif;--serif:'Playfair Display',serif;
  --tb:44px;
  --pool-w:260px;
  --prev-w:276px;
  --snap:20px;
  --slot-w:168px;--slot-h:116px;
}
body{font-family:var(--mono);background:var(--bg);color:var(--ink);cursor:none}

/* ── CURSOR ── */
#cur{position:fixed;width:5px;height:5px;border-radius:50%;background:var(--acc);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);opacity:0;transition:width .12s,height .12s}
#cur.v{opacity:1}#cur.xl{width:18px;height:18px;background:transparent;border:1.5px solid var(--acc);opacity:.5}

/* ══════════════════════════════════
   TOPBAR
══════════════════════════════════ */
#tb{
  position:fixed;top:0;left:0;right:0;height:var(--tb);z-index:9000;
  display:flex;align-items:center;
  background:rgba(245,242,236,.97);border-bottom:1px solid var(--bdr2);
  backdrop-filter:blur(20px);
}
.tb-logo{padding:0 14px;display:flex;align-items:center;gap:6px;border-right:1px solid var(--bdr2);height:100%;flex-shrink:0}
.tb-dia{color:var(--acc);font-size:8px;line-height:1}
.tb-name{font-family:var(--cond);font-weight:700;font-size:14px;letter-spacing:.03em;color:var(--ink)}
.tb-name em{font-family:var(--mono);font-style:normal;font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);border-left:1px solid var(--bdr2);padding-left:8px;margin-left:6px}
#tb-proj{background:none;border:none;outline:none;font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);caret-color:var(--acc);padding:0 14px;flex:1}
#tb-proj:focus{color:var(--ink2)}

/* mode pills */
#mode-bar{display:flex;align-items:center;gap:2px;padding:0 8px;border-left:1px solid var(--bdr2);border-right:1px solid var(--bdr2);height:100%}
.mpill{background:none;border:1px solid transparent;border-radius:2px;font-family:var(--mono);font-size:6.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);padding:5px 11px;cursor:pointer;transition:all .14s;white-space:nowrap}
.mpill:hover{color:var(--ink2);border-color:var(--bdr2);background:var(--accd)}
.mpill.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

.tb-r{display:flex;align-items:center;gap:4px;padding:0 10px;height:100%;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--bdr2);border-radius:2px;font-family:var(--mono);font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:4px 9px;cursor:pointer;transition:all .12s;white-space:nowrap}
.tbtn:hover{border-color:var(--bdr3);color:var(--ink2);background:var(--accd)}
.tbtn.ac{color:var(--acc);border-color:rgba(184,98,42,.4);background:var(--accl)}
.tbtn.ac:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
.tbtn.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.tb-sep{width:1px;height:14px;background:var(--bdr2);margin:0 3px;flex-shrink:0}

/* ══════════════════════════════════
   MAIN LAYOUT — fills below topbar
══════════════════════════════════ */
#shell{position:fixed;inset:var(--tb) 0 0 0;display:flex;overflow:hidden}

/* ══════════════════════════════════
   MODE: COMPOSE
   Left pool | canvas | right schematic
══════════════════════════════════ */
#compose-mode{display:flex;flex:1;overflow:hidden;height:100%}

/* ── POOL SIDEBAR ── */
#pool-sidebar{
  width:var(--pool-w);flex-shrink:0;background:var(--bg);border-right:1px solid var(--bdr2);
  display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:100;
  transition:width .22s cubic-bezier(.22,1,.36,1);
}
#pool-sidebar.collapsed{width:36px}
#pool-sidebar.collapsed:hover{width:var(--pool-w)}
#pool-sidebar.collapsed:not(:hover) #pool-list,
#pool-sidebar.collapsed:not(:hover) #pool-add span:last-child,
#pool-sidebar.collapsed:not(:hover) .psb-title,
#pool-sidebar.collapsed:not(:hover) .psb-count,
#pool-sidebar.collapsed:not(:hover) .pool-row-body,
#pool-sidebar.collapsed:not(:hover) .pool-row-foot,
#pool-sidebar.collapsed:not(:hover) .pool-row-grip{opacity:0;pointer-events:none}
#pool-sidebar.collapsed:not(:hover) #pool-sidebar-hd{justify-content:center}
#pool-sidebar.collapsed:not(:hover) #psb-collapse-btn{transform:rotate(180deg)}
#pool-list,#pool-add span:last-child,.psb-title,.psb-count,
.pool-row-body,.pool-row-foot,.pool-row-grip{transition:opacity .15s}
#psb-collapse-btn{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:9px;padding:2px 4px;border-radius:2px;transition:color .1s,transform .22s cubic-bezier(.22,1,.36,1);flex-shrink:0;line-height:1}
#psb-collapse-btn:hover{color:var(--ink)}
.psb-rail-icon{display:none;flex-direction:column;align-items:center;gap:3px;padding:12px 0}
.psb-rail-pip{width:6px;height:6px;border-radius:50%;background:var(--bdr3)}
#pool-sidebar.collapsed:not(:hover) .psb-rail-icon{display:flex}
#pool-sidebar-hd{padding:10px 14px 8px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.psb-title{font-family:var(--mono);font-size:6px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3)}
.psb-count{font-family:var(--mono);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
#pool-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 8px 48px;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent;display:flex;flex-direction:column;gap:5px}
.pool-row{background:var(--bg);border:1px solid var(--bdr2);border-radius:3px;cursor:grab;user-select:none;transition:border-color .14s,box-shadow .14s,transform .1s;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(26,24,22,.05)}
.pool-row:hover{border-color:var(--bdr3);box-shadow:0 2px 10px rgba(26,24,22,.1);transform:translateX(2px)}
.pool-row.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--accl)}
.pool-row.dragging{cursor:grabbing;opacity:.45;transform:scale(.96)}
.pool-row-bar{height:3px;border-radius:3px 3px 0 0;flex-shrink:0}
.pool-row-body{padding:6px 9px 5px;display:flex;flex-direction:column;gap:3px}
.pool-row-top{display:flex;align-items:center;gap:6px}
.pool-row-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pool-row-name{flex:1;font-family:var(--mono);font-size:7px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:none;border:none;outline:none;caret-color:var(--acc);cursor:text;min-width:0}
.pool-row-name:focus{color:var(--ink)}
.pool-row-ly{font-family:var(--mono);font-size:5.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:1px 4px;border:1px solid var(--bdr);border-radius:1px;flex-shrink:0;background:none;outline:none;cursor:pointer}
.pool-row-acts{display:flex;gap:1px;flex-shrink:0}
.pra{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:7px;padding:1px 3px;border-radius:1px;line-height:1;transition:all .1s}
.pra:hover{color:var(--ink);background:var(--bdr2)}
.pool-row-hl{font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:-.01em;color:var(--ink);line-height:1.05;background:none;border:none;outline:none;width:100%;caret-color:var(--acc);resize:none;overflow:hidden;min-height:15px}
.pool-row-hl::placeholder{color:var(--ink3);opacity:.4;font-weight:400}
.pool-row-foot{display:flex;align-items:center;justify-content:space-between;padding:3px 9px 5px;border-top:1px solid var(--bdr)}
.pool-row-cits{display:flex;gap:3px;flex-wrap:wrap}
.prc{font-family:var(--mono);font-size:5px;letter-spacing:.06em;text-transform:uppercase;padding:1px 4px;border-radius:1px;border:1px solid rgba(42,88,160,.2);color:rgba(42,88,160,.7);background:rgba(42,88,160,.04);cursor:pointer;transition:all .1s}
.prc:hover{border-color:var(--view);color:var(--view)}
.pool-row-pal{display:flex;gap:3px}
.prp{width:8px;height:8px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:all .1s;flex-shrink:0}
.prp.sel{border-color:var(--ink);transform:scale(1.2)}
.pool-row-grip{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:8px;color:var(--ink3);opacity:0;letter-spacing:1px;line-height:1;pointer-events:none;transition:opacity .1s}
.pool-row:hover .pool-row-grip{opacity:.4}
#pool-add{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(245,242,236,.96);border-top:1px solid var(--bdr);cursor:pointer;transition:background .12s;backdrop-filter:blur(8px)}
#pool-add:hover{background:var(--accl)}
#pool-add span:first-child{font-size:10px;color:var(--ink3)}
#pool-add span:last-child{font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3)}
#pool-add:hover span{color:var(--acc)}
#pool-resize{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:200}
#pool-resize::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:36px;border-radius:2px;background:var(--bdr2);transition:background .15s}
#pool-resize:hover::after,#pool-resize.dragging::after{background:var(--acc)}

/* ── LANE CANVAS ── */
#lane-canvas{flex:1;min-width:0;position:relative;overflow:hidden;background:var(--bg)}
#lane-canvas::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(rgba(26,24,22,.16) 1px,transparent 1px);background-size:var(--snap) var(--snap)}
#canvas-wrap{position:absolute;inset:0;overflow:hidden}
#canvas-inner{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;min-width:3000px}
.lane{position:relative;display:flex;flex-direction:row;align-items:stretch;height:164px;border-bottom:1px solid var(--bdr2);background:var(--bg);transition:background .15s}
.lane:first-child{border-top:1px solid var(--bdr2)}
.lane.snap-target{background:rgba(184,98,42,.04)}
.lane.snap-target .lane-hd{background:rgba(184,98,42,.06)}
.lane-num{width:32px;flex-shrink:0;border-right:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;background:var(--bg2)}
.lane-num-txt{font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:var(--ink3);writing-mode:vertical-rl;transform:rotate(180deg)}
.lane-hd{width:180px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;padding:12px 14px;border-right:1px solid var(--bdr2);background:var(--bg2);transition:background .15s}
.lane-view-name{font-family:var(--cond);font-weight:700;font-size:13px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink);margin-bottom:2px;background:none;border:none;outline:none;caret-color:var(--acc);width:100%}
.lane-view-slug{font-family:var(--mono);font-size:6.5px;letter-spacing:.1em;color:var(--view);background:none;border:none;outline:none;caret-color:var(--view);width:100%}
.lane-meta{display:flex;align-items:center;gap:6px;margin-top:7px}
.lane-count{font-family:var(--mono);font-size:6px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
.lane-preview-btn{background:none;border:1px solid rgba(42,88,160,.22);border-radius:1px;font-family:var(--mono);font-size:5.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(42,88,160,.6);padding:2px 6px;cursor:pointer;transition:all .12s}
.lane-preview-btn:hover{border-color:var(--view);color:var(--view);background:var(--viewl)}
.lane-del-btn{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:8px;padding:2px;transition:color .1s;margin-left:auto}
.lane-del-btn:hover{color:rgba(160,40,40,.8)}
.lane-slots{flex:1;display:flex;align-items:center;padding:0 14px;gap:0;overflow:visible;position:relative}
.slot-conn{width:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative}
.slot-conn::before{content:'';display:block;height:1px;width:100%;background:var(--bdr2)}
.slot-conn::after{content:'›';position:absolute;right:-1px;font-size:9px;color:var(--ink3);line-height:1}
.lane-drop-zone{width:48px;min-height:96px;border:1.5px dashed var(--bdr2);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;transition:all .15s}
.lane-drop-zone.active{border-color:rgba(184,98,42,.5);background:rgba(184,98,42,.04);box-shadow:0 0 0 1px rgba(184,98,42,.15)}
.ldz-ico{font-size:10px;color:var(--bdr3);transition:color .15s}
.lane-drop-zone.active .ldz-ico{color:var(--acc)}
.slot-card{
  width:var(--slot-w);height:var(--slot-h);flex-shrink:0;
  background:var(--bg);border:1px solid var(--bdr2);border-radius:3px;
  cursor:pointer;user-select:none;position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  transition:border-color .14s,box-shadow .14s;
  box-shadow:0 1px 4px rgba(26,24,22,.06);
}
.slot-card:hover{border-color:var(--bdr3);box-shadow:0 2px 12px rgba(26,24,22,.1)}
.slot-card.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--accl)}
.slot-top-bar{height:3px;flex-shrink:0}
.slot-hd{padding:5px 7px 3px;display:flex;align-items:center;gap:5px;flex-shrink:0}
.slot-seq{font-family:var(--mono);font-size:5.5px;letter-spacing:.1em;color:var(--ink3)}
.slot-layout{font-family:var(--mono);font-size:5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);padding:1px 4px;border:1px solid var(--bdr);border-radius:1px}
.slot-rm{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--ink3);font-size:7px;padding:0 2px;transition:color .1s}
.slot-rm:hover{color:rgba(160,40,40,.8)}
.slot-diag{flex:1;padding:0 7px 5px;display:flex;align-items:flex-end;overflow:hidden}
.slot-hl{font-family:var(--cond);font-weight:700;font-size:10px;text-transform:uppercase;color:var(--ink);line-height:1;letter-spacing:-.01em;overflow:hidden;max-height:30px}
#lane-add-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  height:56px;border:1.5px dashed var(--bdr2);margin:12px 0;cursor:pointer;
  background:transparent;transition:all .15s;border-radius:3px;
}
#lane-add-btn:hover{border-color:var(--bdr3);background:var(--accd)}
.lab-ico{font-size:12px;color:var(--bdr3)}
.lab-lbl{font-family:var(--mono);font-size:6.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
#lane-add-btn:hover .lab-ico,#lane-add-btn:hover .lab-lbl{color:var(--acc)}
/* zoom hud */
#zhud{position:absolute;bottom:16px;right:16px;display:flex;align-items:center;gap:2px;background:rgba(245,242,236,.96);border:1px solid var(--bdr2);border-radius:3px;backdrop-filter:blur(12px)}
.zhb{background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:9px;color:var(--ink3);padding:5px 8px;transition:color .1s}
.zhb:hover{color:var(--ink)}
#zpct{font-family:var(--mono);font-size:6.5px;letter-spacing:.08em;color:var(--ink3);padding:0 6px;border-left:1px solid var(--bdr);border-right:1px solid var(--bdr)}

/* ── SCHEMATIC PANEL ── */
#prev-panel{
  width:var(--prev-w);flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bdr2);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .22s cubic-bezier(.22,1,.36,1);
}
#prev-panel.collapsed{width:0;border-left-width:0}
#prev-panel-hd{display:flex;align-items:center;gap:6px;padding:0 12px;height:38px;border-bottom:1px solid var(--bdr2);flex-shrink:0}
#prev-panel-title{font-family:var(--mono);font-size:6px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);display:flex;align-items:center;gap:6px;flex:1}
.pp-live-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);animation:pp-pulse 2.4s ease infinite}
@keyframes pp-pulse{0%,100%{opacity:1}50%{opacity:.3}}
#prev-panel-view-sel{background:var(--bg3);border:1px solid var(--bdr2);color:var(--ink2);font-family:var(--mono);font-size:6.5px;padding:3px 5px;border-radius:2px;cursor:pointer;outline:none;max-width:110px}
.pp-close{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:12px;padding:2px 4px;transition:color .1s}
.pp-close:hover{color:var(--ink)}
#prev-panel-body{flex:1;overflow-y:auto;padding:10px 8px;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent;display:flex;flex-direction:column;gap:0}
#pp-empty{font-family:var(--mono);font-size:7px;color:var(--ink3);letter-spacing:.08em;padding:24px 12px;text-align:center;line-height:1.8}
.pw-room{background:var(--bg);border:1px solid var(--bdr2);border-radius:3px;overflow:hidden;cursor:pointer;transition:border-color .14s,box-shadow .14s}
.pw-room:hover{border-color:var(--bdr3);box-shadow:0 2px 8px rgba(26,24,22,.08)}
.pw-room.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--accl)}
.pw-room-pal{height:2.5px}
.pw-room-diagram{padding:7px 8px 6px;height:72px;display:flex;align-items:flex-start;overflow:hidden}
.pw-room-meta{display:flex;align-items:center;gap:5px;padding:4px 8px 5px;border-top:1px solid var(--bdr)}
.pw-room-name{font-family:var(--mono);font-size:6px;letter-spacing:.05em;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pw-room-pal-tag{font-family:var(--mono);font-size:5px;letter-spacing:.06em;text-transform:uppercase;padding:1px 4px;border-radius:1px;border:1px solid;flex-shrink:0}
.pw-room-layout{font-family:var(--mono);font-size:5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);flex-shrink:0}
.pw-connector{display:flex;flex-direction:column;align-items:center;gap:0;padding:2px 0}
.pw-conn-line{width:1px;height:8px;background:var(--bdr2)}
.pw-conn-arrow{font-size:7px;color:var(--ink3);line-height:1}
#pp-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--bdr2);flex-shrink:0}
#pp-footer-summary{font-family:var(--mono);font-size:7px;color:var(--ink3);letter-spacing:.04em}
#pp-footer-summary strong{color:var(--ink2)}
#pp-render-btn{background:var(--acc);border:none;border-radius:2px;font-family:var(--mono);font-size:6.5px;letter-spacing:.12em;text-transform:uppercase;color:#fff;padding:6px 12px;cursor:pointer;transition:filter .12s}
#pp-render-btn:hover{filter:brightness(1.1)}

/* ══════════════════════════════════
   MODE: PRESENT (the storefront)
══════════════════════════════════ */
#present-mode{
  display:none;
  position:fixed;inset:0;z-index:9100;
  background:#060508;
}
#present-mode.active{display:flex;flex-direction:column}

/* Present top strip */
#ps-bar{
  position:sticky;top:0;flex-shrink:0;height:44px;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(6,5,8,.82);border-bottom:1px solid rgba(237,234,228,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
#ps-bar.scrolled{background:rgba(6,5,8,.96);border-bottom-color:rgba(237,234,228,.10)}
.ps-brand{display:flex;align-items:center;gap:9px}
.ps-dia{color:#c87a50;font-size:10px}
.ps-nm{font-family:var(--cond);font-weight:700;font-size:16px;letter-spacing:.04em;text-transform:uppercase;color:#edeae4}
#ps-nav{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:6.5px;letter-spacing:.18em;text-transform:uppercase;color:#2e2c30;max-width:55%;overflow:hidden}
.psn{cursor:pointer;transition:color .15s}.psn:hover{color:#c87a50}.psn-sep{opacity:.25}
.ps-acts{display:flex;align-items:center;gap:5px}
.psbtn{background:none;border:1px solid rgba(237,234,228,.1);border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:#6a6560;padding:5px 9px;cursor:pointer;transition:all .15s}
.psbtn:hover{color:#edeae4;background:rgba(200,122,80,.08)}
.psbtn.ac{border-color:#c87a50;color:#c87a50}

/* storefront scroll surface */
#ps-scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(237,234,228,.06) transparent;position:relative}
#ps-rooms{display:block}
#ps-prog{position:fixed;top:0;left:0;height:2px;width:0%;background:#c87a50;z-index:8100;pointer-events:none;transition:width .2s}

/* room-chapter HUD */
#ps-chw{position:fixed;bottom:24px;left:24px;z-index:8050;display:none}
.ps-chw-t{background:rgba(6,5,8,.88);border:1px solid rgba(237,234,228,.08);border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:#6a6560;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;backdrop-filter:blur(20px)}
.ps-chw-t:hover{border-color:rgba(237,234,228,.18);color:#edeae4}
.ps-chw-cur{color:#c87a50}
.ps-chw-dd{position:absolute;bottom:calc(100% + 8px);left:0;background:rgba(6,5,8,.96);border:1px solid rgba(237,234,228,.08);border-radius:2px;padding:4px;min-width:190px;backdrop-filter:blur(24px);opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .18s,transform .18s}
.ps-chw-dd.open{opacity:1;pointer-events:all;transform:none}
.ps-chw-it{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:7.5px;letter-spacing:.08em;color:#6a6560;padding:7px 10px;border-radius:2px;text-align:left;text-transform:uppercase;transition:all .12s}
.ps-chw-it:hover{background:rgba(200,122,80,.08);color:#edeae4}
.ps-chw-it.act{color:#c87a50}
.ps-chw-num{color:#2e2c30;width:18px;flex-shrink:0;font-size:6.5px}

/* ══════════════════════════════════
   ROOM — zackgort present-surface style
   Full-viewport slides, bottom-anchored,
   diagonal scrim + ambient glow
══════════════════════════════════ */
.rm{
  position:relative;width:100%;height:100dvh;flex-shrink:0;
  overflow:hidden;background:var(--rm-bg,#0a0908);
}
/* palette tokens */
.rm[data-p="amber"]{--rm-bg:#0c0800;--rm-acc:#e8a830;--rm-amb:rgba(232,168,48,0.20)}
.rm[data-p="forest"]{--rm-bg:#060a08;--rm-acc:#88b878;--rm-amb:rgba(136,184,120,0.18)}
.rm[data-p="midnight"]{--rm-bg:#04060e;--rm-acc:#5888be;--rm-amb:rgba(88,136,190,0.18)}
.rm[data-p="linen"]{--rm-bg:#0a0806;--rm-acc:#c07840;--rm-amb:rgba(192,120,64,0.18)}
.rm[data-p="red"]{--rm-bg:#0c0404;--rm-acc:#d04828;--rm-amb:rgba(208,72,40,0.18)}

/* background image — low opacity, subtle scale, matches zackgort pw-img */
.rm-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center 35%;
  opacity:0;transform:scale(1.05);
  transition:opacity 1.1s ease,transform 9s ease;
  will-change:transform;
}
.rm-img.vis{opacity:.22;transform:scale(1);}

/* diagonal scrim — exact zackgort #ps-scrim */
.rm-scrim{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,0,0,.52) 0%,rgba(0,0,0,.08) 55%,rgba(0,0,0,.42) 100%);
  pointer-events:none;
}

/* ambient radial glow — exact zackgort #ps-ambient */
.rm-ambient{
  position:absolute;inset:0;pointer-events:none;
  opacity:0;transition:opacity 1.8s ease;
  background:radial-gradient(ellipse 80% 60% at 50% 50%,var(--rm-amb,rgba(200,112,74,.18)) 0%,transparent 70%);
}
.rm-ambient.on{opacity:1;}

/* corner bracket markers — exact zackgort */
.rm-corner{position:absolute;width:40px;height:40px;pointer-events:none;}
.rm-corner.tl{top:5%;left:5%;border-top:1px solid rgba(240,236,226,.1);border-left:1px solid rgba(240,236,226,.1);}
.rm-corner.br{bottom:5%;right:5%;border-bottom:1px solid rgba(240,236,226,.1);border-right:1px solid rgba(240,236,226,.1);}

/* room index badge */
.rm-idx{position:absolute;top:14px;right:18px;z-index:5;font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:rgba(240,236,226,.22);}

/* content — bottom-left anchored, matches zackgort #ps-content */
.rm-content{
  position:absolute;inset:0;z-index:3;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:6% 7% calc(6% + 70px);
}

/* ── Text elements — exact zackgort ps-* classes ── */
/* era / label */
.ps-era{
  font-family:var(--mono);font-size:clamp(7px,.8vw,10px);letter-spacing:.22em;
  text-transform:uppercase;color:rgba(240,236,226,.3);
  margin-bottom:2%;
  opacity:0;transform:translateY(8px);
  transition:opacity .5s,transform .5s;
}
/* type tag / accent label */
.ps-tag{
  font-family:var(--mono);font-size:clamp(8px,.9vw,11px);letter-spacing:.2em;
  text-transform:uppercase;color:var(--rm-acc,#c8704a);
  margin-bottom:2.5%;
  opacity:0;transform:translateY(10px);
  transition:opacity .55s .08s,transform .55s .08s;
}
/* headline — DM Serif Display, matches zackgort ps-hl */
.ps-hl{
  font-family:'DM Serif Display',serif;
  font-size:clamp(28px,5vw,72px);color:#f0ece2;
  line-height:1.06;letter-spacing:-.025em;
  margin-bottom:3%;
  opacity:0;transform:translateY(18px);
  transition:opacity .65s .2s,transform .65s .2s;
}
/* body copy */
.ps-body{
  font-family:var(--mono);font-size:clamp(10px,1.3vw,16px);
  color:rgba(240,236,226,.68);line-height:1.7;max-width:62%;
  opacity:0;transform:translateY(12px);
  transition:opacity .62s .35s,transform .62s .35s;
}
/* pull quote — DM Serif Display italic */
.ps-pq{
  font-family:'DM Serif Display',serif;font-style:italic;
  font-size:clamp(16px,2.2vw,32px);color:#f0ece2;
  line-height:1.38;
  border-left:4px solid var(--rm-acc,#c8704a);padding-left:5%;
  max-width:78%;margin-top:3%;
  opacity:0;transform:translateY(12px);
  transition:opacity .65s .38s,transform .65s .38s;
}
/* CTA button */
.ps-cta{
  display:inline-block;margin-top:4%;
  background:none;border:1px solid var(--rm-acc,#c8704a);
  font-family:var(--mono);font-size:clamp(7px,.85vw,10px);
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--rm-acc,#c8704a);padding:clamp(10px,1.4vh,16px) clamp(20px,2.8vw,36px);
  cursor:pointer;
  opacity:0;transform:translateY(10px);
  transition:opacity .6s .52s,transform .6s .52s,background .2s,color .2s;
}
.ps-cta:hover{background:var(--rm-acc,#c8704a);color:#0a0908;}

/* animate-in trigger — matches zackgort #ps-slide.anim */
.rm.anim .ps-era,.rm.anim .ps-tag,.rm.anim .ps-hl,
.rm.anim .ps-body,.rm.anim .ps-pq,.rm.anim .ps-cta{
  opacity:1;transform:translateY(0);
}

/* ══════════════════════════════════
   GHOST OVERLAY — food.html sentence engine
   Large ghosted type that scrolls behind content,
   triggered per-room as an atmospheric layer
══════════════════════════════════ */
.rm-ghost{
  position:absolute;inset:0;z-index:1;
  pointer-events:none;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:3% 5% 22%;
}
.rm-ghost-word{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:clamp(120px,22vw,280px);
  line-height:.82;letter-spacing:-.04em;text-transform:uppercase;
  color:transparent;
  -webkit-text-stroke:1px rgba(240,236,226,.07);
  user-select:none;white-space:nowrap;overflow:hidden;
  opacity:0;transform:translateY(12px);
  transition:opacity 1.2s .1s,transform 1.4s .1s cubic-bezier(.16,1,.36,1);
}
.rm.anim .rm-ghost-word{opacity:1;transform:translateY(0);}
/* second line slightly offset */
.rm-ghost-word:nth-child(2){
  -webkit-text-stroke:1px rgba(240,236,226,.04);
  font-size:clamp(80px,14vw,180px);
  transition-delay:.25s,.25s;
  margin-left:8%;
}

/* ── SHOWCASE layout — split with opaque product panel ── */
.rm[data-l="showcase"]{display:flex;}
.sc-left{
  flex:1;position:relative;
  /* left side has the image + text, content positioned by rm-content */
}
.sc-right{
  width:min(420px,42%);flex-shrink:0;
  background:rgba(10,9,8,.9);
  border-left:1px solid rgba(240,236,226,.07);
  display:flex;flex-direction:column;justify-content:center;
  padding:clamp(40px,7vh,80px) clamp(28px,3.5vw,56px);
  position:relative;z-index:4;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.sc-price-val{
  font-family:'DM Serif Display',serif;
  font-size:clamp(28px,3.5vw,52px);color:#f0ece2;
  line-height:1;margin-bottom:4px;
  letter-spacing:-.02em;
}
.sc-price-sub{
  font-family:var(--mono);font-size:clamp(7px,.75vw,9px);letter-spacing:.18em;
  text-transform:uppercase;color:rgba(240,236,226,.28);
  margin-bottom:clamp(20px,3vh,36px);
}
.sc-variants{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:clamp(20px,3vh,32px);}
.sc-var{
  background:none;border:1px solid rgba(240,236,226,.14);border-radius:3px;
  font-family:var(--mono);font-size:clamp(6px,.75vw,9px);letter-spacing:.1em;
  text-transform:uppercase;color:rgba(240,236,226,.44);
  padding:6px 10px;cursor:pointer;transition:all .14s;
}
.sc-var:hover,.sc-var.active{border-color:var(--rm-acc,#c8704a);color:var(--rm-acc,#c8704a);}
.sc-specs-mini{margin-bottom:clamp(20px,3vh,32px);}
.sc-spec-row{
  display:flex;align-items:baseline;gap:10px;
  border-bottom:1px solid rgba(240,236,226,.06);padding:7px 0;
}
.sc-sk{
  font-family:var(--mono);font-size:clamp(6px,.7vw,8.5px);letter-spacing:.14em;
  text-transform:uppercase;color:rgba(240,236,226,.28);
  min-width:88px;flex-shrink:0;
}
.sc-sv{font-family:var(--mono);font-size:clamp(7px,.8vw,10px);color:rgba(240,236,226,.58);}
.sc-atc{
  display:block;width:100%;margin-top:clamp(16px,2.5vh,28px);
  background:none;border:1px solid var(--rm-acc,#c8704a);
  font-family:var(--mono);font-size:clamp(7px,.8vw,9px);
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--rm-acc,#c8704a);padding:14px 0;
  cursor:pointer;text-align:center;
  transition:background .2s,color .2s;
}
.sc-atc:hover{background:var(--rm-acc,#c8704a);color:#0a0908;}

/* ── CART layout ── */
.rm[data-l="cart"] .rm-content{justify-content:center;align-items:flex-start;max-width:580px;margin:0 auto;padding:8% 7%;}
.cart-items{width:100%;margin:clamp(20px,3vh,32px) 0;display:flex;flex-direction:column;}
.cart-row{display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(240,236,226,.07);padding:14px 0;}
.cart-row-img{width:52px;height:64px;background:rgba(240,236,226,.06);border-radius:2px;flex-shrink:0;overflow:hidden;}
.cart-row-img img{width:100%;height:100%;object-fit:cover;opacity:.75;}
.cart-row-info{flex:1;}
.cart-row-name{font-family:'DM Serif Display',serif;font-size:clamp(13px,1.4vw,18px);color:#f0ece2;line-height:1.2;margin-bottom:4px;}
.cart-row-meta{font-family:var(--mono);font-size:clamp(6px,.7vw,8px);letter-spacing:.1em;text-transform:uppercase;color:rgba(240,236,226,.3);}
.cart-row-price{font-family:var(--mono);font-size:clamp(9px,1vw,13px);color:var(--rm-acc,#c8704a);flex-shrink:0;}
.cart-total{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid rgba(240,236,226,.12);padding-top:18px;margin-top:4px;width:100%;}
.cart-total-lbl{font-family:var(--mono);font-size:clamp(7px,.8vw,9px);letter-spacing:.2em;text-transform:uppercase;color:rgba(240,236,226,.3);}
.cart-total-val{font-family:'DM Serif Display',serif;font-size:clamp(24px,3vw,44px);color:#f0ece2;}
.btn-checkout{
  display:block;width:100%;margin-top:clamp(16px,2.5vh,28px);
  background:var(--rm-acc,#c8704a);border:none;
  font-family:var(--mono);font-size:clamp(7px,.8vw,9px);
  letter-spacing:.2em;text-transform:uppercase;
  color:#0a0908;padding:16px 0;cursor:pointer;
  transition:filter .2s;
}
.btn-checkout:hover{filter:brightness(1.12);}

/* ── scroll container needs snap / height for present ── */
#ps-rooms{display:flex;flex-direction:column;}
#ps-scroll{scroll-snap-type:y mandatory;}
.rm{scroll-snap-align:start;}

@media(max-width:900px){
  .rm[data-l="showcase"]{flex-direction:column;}
  .sc-right{width:100%;min-height:50dvh;}
  .ps-body{max-width:90%;}
}

/* ══════════════════════════════════
   COMPOSE STUDIO (modal)
══════════════════════════════════ */
#compose-studio{position:fixed;inset:0;z-index:9600;background:rgba(26,24,22,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s cubic-bezier(.22,1,.36,1)}
#compose-studio.open{opacity:1;pointer-events:all}
#compose-inner{background:var(--bg);border:1px solid var(--bdr2);border-radius:6px;box-shadow:0 24px 80px rgba(26,24,22,.24);width:min(760px,96vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;transform:translateY(10px);transition:transform .22s cubic-bezier(.22,1,.36,1)}
#compose-studio.open #compose-inner{transform:none}
#compose-hd{display:flex;align-items:center;gap:8px;padding:0 16px;height:42px;border-bottom:1px solid var(--bdr2);background:var(--bg2);flex-shrink:0}
#compose-ttl{font-family:var(--mono);font-size:6.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);flex:1}
#compose-rm-name{font-family:var(--cond);font-weight:700;font-size:14px;color:var(--ink);letter-spacing:.02em}
.compose-close{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:13px;padding:2px 5px;transition:color .1s}
.compose-close:hover{color:var(--ink)}
#compose-body{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cs-col{display:flex;flex-direction:column;gap:10px}
.cs-sec{background:var(--bg2);border:1px solid var(--bdr);border-radius:3px;padding:12px 13px}
.cs-sec-t{font-family:var(--mono);font-size:6px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
.cs-row{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid var(--bdr)}
.cs-row:last-child{border-bottom:none}
.cs-row.top{align-items:flex-start}
.cs-lbl{font-family:var(--mono);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);width:54px;flex-shrink:0}
.cs-in{background:none;border:none;outline:none;font-family:var(--mono);font-size:8px;color:var(--ink2);flex:1;caret-color:var(--acc)}
.cs-in:focus{color:var(--ink)}
.cs-ta{background:none;border:none;outline:none;font-family:var(--mono);font-size:8px;color:var(--ink2);flex:1;caret-color:var(--acc);resize:none;line-height:1.55;min-height:56px}
.cs-ta:focus{color:var(--ink)}
.cs-sel{background:var(--bg3);border:1px solid var(--bdr2);color:var(--ink2);font-family:var(--mono);font-size:7px;padding:3px 6px;border-radius:2px;cursor:pointer;outline:none;flex:1}
.cs-sel:focus{border-color:var(--acc)}
.cs-pal-row{display:flex;gap:5px;flex-wrap:wrap;padding-top:3px}
.cs-pal-sw{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.cs-pal-sw.sel{border-color:var(--ink);transform:scale(1.2)}
/* spec rows in studio */
.spec-list{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.spec-row-inp{display:flex;gap:4px;align-items:center}
.spec-k,.spec-v{background:var(--bg3);border:1px solid var(--bdr2);border-radius:2px;font-family:var(--mono);font-size:7px;padding:4px 6px;color:var(--ink2);outline:none;flex:1;transition:border-color .1s}
.spec-k:focus,.spec-v:focus{border-color:var(--acc);color:var(--ink)}
.spec-k{max-width:90px}
.spec-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:9px;padding:2px;transition:color .1s}
.spec-del:hover{color:rgba(160,40,40,.8)}
.spec-add-btn{background:none;border:1px dashed var(--bdr2);border-radius:2px;font-family:var(--mono);font-size:6px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);padding:5px 8px;cursor:pointer;transition:all .12s;width:100%;margin-top:4px}
.spec-add-btn:hover{border-color:var(--acc);color:var(--acc)}
/* variant chips in studio */
.var-list{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.var-chip{background:var(--bg3);border:1px solid var(--bdr2);border-radius:2px;font-family:var(--mono);font-size:7px;padding:3px 7px;display:flex;align-items:center;gap:4px;color:var(--ink2)}
.var-chip-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:8px;padding:0;line-height:1;transition:color .1s}
.var-chip-del:hover{color:rgba(160,40,40,.8)}
.var-add{display:flex;gap:4px;margin-top:4px}
.var-add input{background:var(--bg3);border:1px solid var(--bdr2);border-radius:2px;font-family:var(--mono);font-size:7px;padding:4px 6px;color:var(--ink2);outline:none;flex:1}
.var-add input:focus{border-color:var(--acc)}
.var-add button{background:none;border:1px solid var(--bdr2);border-radius:2px;font-family:var(--mono);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:4px 8px;cursor:pointer;transition:all .12s;white-space:nowrap}
.var-add button:hover{border-color:var(--acc);color:var(--acc)}
#compose-ft{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--bdr2);background:var(--bg2);flex-shrink:0}
.cs-hint{font-family:var(--mono);font-size:6px;color:var(--ink3);letter-spacing:.06em}
#cs-preview-btn{background:none;border:1px solid var(--bdr2);border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:7px 12px;cursor:pointer;transition:all .12s;margin-left:auto}
#cs-preview-btn:hover{border-color:var(--bdr3);color:var(--ink2)}
#cs-save{background:var(--acc);border:none;border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:#fff;padding:7px 16px;cursor:pointer;transition:filter .12s}
#cs-save:hover{filter:brightness(1.1)}

/* ══════════════════════════════════
   CREATE MENU
══════════════════════════════════ */
#create-menu{
  position:fixed;z-index:9500;background:rgba(245,242,236,.98);border:1px solid var(--bdr2);border-radius:4px;
  box-shadow:0 8px 40px rgba(26,24,22,.16);backdrop-filter:blur(20px);padding:6px;min-width:220px;
  opacity:0;pointer-events:none;transform:translateY(4px) scale(.97);transform-origin:top right;
  transition:opacity .15s cubic-bezier(.22,1,.36,1),transform .15s cubic-bezier(.22,1,.36,1);
}
#create-menu.open{opacity:1;pointer-events:all;transform:none}
.cm-sec{font-family:var(--mono);font-size:5.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);padding:5px 8px 3px}
.cm-item{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;padding:7px 8px;border-radius:2px;cursor:pointer;transition:background .1s;text-align:left}
.cm-item:hover{background:var(--accd)}
.cm-ico{width:24px;height:24px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.cm-txt{display:flex;flex-direction:column;gap:2px}
.cm-name{font-family:var(--mono);font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
.cm-desc{font-family:var(--mono);font-size:6px;color:var(--ink3);line-height:1.4}
.cm-kbd{margin-left:auto;font-family:var(--mono);font-size:6px;color:var(--ink3);background:var(--bg3);border:1px solid var(--bdr2);border-radius:2px;padding:1px 5px;flex-shrink:0}

/* ── DRAG GHOST ── */
#drag-ghost{position:fixed;z-index:9400;background:rgba(245,242,236,.96);border:1px solid var(--bdr3);border-radius:2px;padding:5px 10px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);pointer-events:none;display:none;top:0;left:0;align-items:center;gap:6px;backdrop-filter:blur(12px)}
#drag-ghost.show{display:flex}

/* ── CONTEXT MENU ── */
#ctx-menu{position:fixed;z-index:9500;background:rgba(245,242,236,.98);border:1px solid var(--bdr2);border-radius:4px;box-shadow:0 8px 40px rgba(26,24,22,.16);backdrop-filter:blur(20px);padding:6px;min-width:200px;opacity:0;pointer-events:none;transform:translateY(4px) scale(.97);transition:opacity .15s,transform .15s}
#ctx-menu.open{opacity:1;pointer-events:all;transform:none}
.ctx-header{font-family:var(--cond);font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);padding:5px 8px 2px}
.ctx-sep{height:1px;background:var(--bdr2);margin:4px 0}
.ctx-item{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;padding:7px 8px;border-radius:2px;cursor:pointer;transition:background .1s;text-align:left}
.ctx-item:hover{background:var(--accd)}
.ctx-item.danger:hover{background:rgba(160,40,40,.06)}
.ctx-ico{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--ink3);flex-shrink:0}
.ctx-ico.acc{color:var(--acc)}.ctx-ico.view{color:var(--view)}.ctx-ico.danger{color:rgba(160,40,40,.7)}
.ctx-txt{display:flex;flex-direction:column;gap:1px;flex:1}
.ctx-name{font-family:var(--mono);font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
.ctx-desc{font-family:var(--mono);font-size:6px;color:var(--ink3);line-height:1.4}
.ctx-kbd{font-family:var(--mono);font-size:6px;color:var(--ink3);background:var(--bg3);border:1px solid var(--bdr2);border-radius:2px;padding:1px 5px}

/* ── TOAST ── */
#tst{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:rgba(245,242,236,.9);font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border-radius:2px;z-index:9999;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .18s,transform .18s;box-shadow:0 4px 20px rgba(26,24,22,.2)}
#tst.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY STATE ── */
#empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none;z-index:1}
#empty-state.hidden{display:none}
.es-head{font-family:var(--cond);font-weight:700;font-size:28px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink3)}
.es-sub{font-family:var(--mono);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);opacity:.6}
</style>
</head>
<body>
<div id="cur"></div>

<!-- TOPBAR -->

<!-- CREATE MENU -->
<div id="create-menu">
  <div class="cm-sec">Create</div>
  <button class="cm-item" data-create="room-full"><div class="cm-ico" style="background:rgba(200,112,74,.1);color:#c8704a">⬡</div><div class="cm-txt"><span class="cm-name">Brand Room</span><span class="cm-desc">Full-bleed cinematic opener</span></div><span class="cm-kbd">R</span></button>
  <button class="cm-item" data-create="room-showcase"><div class="cm-ico" style="background:rgba(106,176,154,.1);color:#6ab09a">◈</div><div class="cm-txt"><span class="cm-name">Showcase</span><span class="cm-desc">Product spotlight with price + CTA</span></div></button>
  <button class="cm-item" data-create="room-hero"><div class="cm-ico" style="background:rgba(122,142,204,.1);color:#7a8ecc">▣</div><div class="cm-txt"><span class="cm-name">Hero</span><span class="cm-desc">Image + editorial text</span></div></button>
  <button class="cm-item" data-create="room-split"><div class="cm-ico" style="background:rgba(176,122,204,.1);color:#b07acc">⬢</div><div class="cm-txt"><span class="cm-name">Split</span><span class="cm-desc">Two-column editorial</span></div></button>
  <button class="cm-item" data-create="room-essay"><div class="cm-ico" style="background:rgba(138,158,106,.1);color:#8a9e6a">≡</div><div class="cm-txt"><span class="cm-name">Essay</span><span class="cm-desc">Long-form narrative copy</span></div></button>
  <button class="cm-item" data-create="room-cta"><div class="cm-ico" style="background:rgba(154,128,112,.1);color:#9a8070">→</div><div class="cm-txt"><span class="cm-name">CTA</span><span class="cm-desc">Conversion close</span></div></button>
  <button class="cm-item" data-create="room-cart"><div class="cm-ico" style="background:rgba(212,168,74,.1);color:#d4a84a">⊕</div><div class="cm-txt"><span class="cm-name">Cart</span><span class="cm-desc">Checkout summary room</span></div></button>
  <div class="cm-sec">Structure</div>
  <button class="cm-item" data-create="view"><div class="cm-ico" style="background:rgba(42,88,160,.1);color:var(--view)">⊞</div><div class="cm-txt"><span class="cm-name">View</span><span class="cm-desc">Page lane — sequence of rooms</span></div><span class="cm-kbd">V</span></button>
</div>

<!-- DRAG GHOST -->
<div id="drag-ghost"><span id="dg-dot" style="display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:2px;vertical-align:middle"></span><span id="dg-lbl">drop to cite</span></div>

<!-- SHELL -->
<div id="shell">

  <!-- COMPOSE MODE -->

    <!-- LEFT: POOL SIDEBAR -->

      <div id="pool-sidebar-hd">
        <span class="psb-title">Room Pool</span>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-header" id="ctx-header">Room</div>
  <div class="ctx-sep"></div>
  <button class="ctx-item" id="ctx-edit"><span class="ctx-ico acc">✎</span><span class="ctx-txt"><span class="ctx-name">Edit</span><span class="ctx-desc">Open compose studio</span></span><span class="ctx-kbd">E</span></button>
  <button class="ctx-item" id="ctx-preview"><span class="ctx-ico view">↗</span><span class="ctx-txt"><span class="ctx-name">Present view</span><span class="ctx-desc">Render this view</span></span><span class="ctx-kbd">P</span></button>

<!-- TOAST -->
<div id="tst"></div>

<script>
(function(){'use strict';

/* ══════════════════════════════════
   CONSTANTS
══════════════════════════════════ */
var LANE_H=164,LANE_HDR_W=212,SLOT_W=168,SLOT_H=116,SNAP=20;
var LAYOUTS=[
  {id:'full',name:'Brand Room',col:'#c8704a'},
  {id:'split',name:'Split',col:'#7a8ecc'},
  {id:'hero',name:'Hero',col:'#c87060'},
  {id:'showcase',name:'Showcase',col:'#6ab09a'},
  {id:'essay',name:'Essay',col:'#8a9e6a'},
  {id:'cta',name:'CTA',col:'#9a8070'},
  {id:'cart',name:'Cart',col:'#d4a84a'}
];
var CTYPES=[
  {id:'brand',name:'Brand'},{id:'story',name:'Story'},{id:'product',name:'Product'},
  {id:'editorial',name:'Editorial'},{id:'essay',name:'Essay'},{id:'convert',name:'Convert'}
];
var PALS=[
  {id:'',name:'Night',col:'#c8902a'},
  {id:'amber',name:'On Tap',col:'#e8a830'},
  {id:'forest',name:'Kitchen',col:'#88b878'},
  {id:'midnight',name:'Cellar',col:'#5888be'},
  {id:'linen',name:'Copper',col:'#c07840'},
  {id:'red',name:'Foundry',col:'#d04828'}
];
var PAL_COLORS={'':'#c8902a','amber':'#e8a830','forest':'#88b878','midnight':'#5888be','linen':'#c07840','red':'#d04828'};
var IMGS={
  full:'https://images.pexels.com/photos/5530253/pexels-photo-5530253.jpeg?w=1800',
  split:'https://images.pexels.com/photos/1267682/pexels-photo-1267682.jpeg?w=1200',
  hero:'https://images.unsplash.com/photo-1566837945700-30057527ade0?w=1800&q=80',
  showcase:'https://images.unsplash.com/photo-1548391350-968f58dedaed?w=1200&q=80',
  essay:'https://images.unsplash.com/photo-1445019980597-93fa8acb246c?w=1800&q=80',
  cta:'https://images.unsplash.com/photo-1559526324-4b87b5e36e44?w=1800&q=80',
  cart:'https://images.unsplash.com/photo-1532634922-8fe0b757fb13?w=1200&q=80'
};

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
var rooms=[],views=[],citations=[];
var selectedId=null,selectedCitId=null;
var prevPanelViewId=null,prevPanelOpen=true;
var createMenuOpen=false,ctxOpen=false,psChwOpen=false;
var currentMode='compose';
var T={x:0,y:0,s:1};
var idn=1;
function gid(){return 'n'+(idn++);}

var ctxState={citId:null,rmId:null,viewId:null};
var csState={rmId:null,citId:null,viewId:null};
var dragRmId=null;

/* ══════════════════════════════════
   DOM SHORTCUTS
══════════════════════════════════ */
function g(id){return document.getElementById(id);}
function ce(t){return document.createElement(t);}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
var _tt;
function toast(msg){var t=g('tst');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2600);}

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
function getLayout(id){return LAYOUTS.find(function(l){return l.id===id;})||LAYOUTS[0];}
function getRoom(id){return rooms.find(function(r){return r.id===id;});}
function getView(id){return views.find(function(v){return v.id===id;});}
function roomColor(rm){var p=rm.palette?PALS.find(function(p){return p.id===rm.palette;}):null;return p?p.col:getLayout(rm.layout).col;}
function viewCitations(vId){return citations.filter(function(c){return c.viewId===vId;}).sort(function(a,b){return a.position-b.position;});}
function roomCitations(rmId){return citations.filter(function(c){return c.roomId===rmId;});}
function resolveRoom(rm,cit){if(!cit||!cit.overrides)return rm;return Object.assign({},rm,{label:cit.overrides.label||rm.label,headline:cit.overrides.headline||rm.headline,palette:cit.overrides.palette!==undefined?cit.overrides.palette:rm.palette,body:cit.overrides.body||rm.body,pull:cit.overrides.pull||rm.pull});}
function citHasOverrides(cit){if(!cit||!cit.overrides)return false;return Object.keys(cit.overrides).some(function(k){return cit.overrides[k]!==undefined&&cit.overrides[k]!=='';});}

/* ══════════════════════════════════
   PERSIST
══════════════════════════════════ */
function save(){
  try{localStorage.setItem('folio_cl1',JSON.stringify({rooms:rooms,views:views,citations:citations,T:T,idn:idn,proj:g('tb-proj').value}));}catch(e){}
}
function load(){
  try{
    var d=JSON.parse(localStorage.getItem('folio_cl1')||'null');
    if(!d)return false;
    rooms=d.rooms||[];views=d.views||[];citations=d.citations||[];
    T=d.T||{x:0,y:0,s:1};idn=d.idn||1;
    if(d.proj)g('tb-proj').value=d.proj;
    return true;
  }catch(e){return false;}
}

/* ══════════════════════════════════
   MODE SWITCHING
══════════════════════════════════ */
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mpill').forEach(function(p){p.classList.toggle('active',p.dataset.mode===mode);});
  var cm=g('compose-mode'),pm=g('present-mode');
  if(mode==='compose'){
    cm.style.display='flex';pm.classList.remove('active');
  } else {
    if(!views.length){toast('Create a view first');document.querySelectorAll('.mpill').forEach(function(p){p.classList.toggle('active',p.dataset.mode==='compose');});return;}
    cm.style.display='none';pm.classList.add('active');
    renderPresent();
  }
}
document.querySelectorAll('.mpill').forEach(function(p){
  p.addEventListener('click',function(){setMode(p.dataset.mode);});
});

/* ══════════════════════════════════
   DATA CRUD
══════════════════════════════════ */
function addRoom(layout,contentType){
  var rm={id:gid(),layout:layout||'full',contentType:contentType||'brand',
    name:getLayout(layout||'full').name,label:'',headline:'',body:'',pull:'',
    palette:'',img:'',price:'',priceSub:'',variants:[],specRows:[]};
  rooms.push(rm);renderPoolSidebar();save();updateEmptyState();return rm;
}
function deleteRoom(id){
  rooms=rooms.filter(function(r){return r.id!==id;});
  citations=citations.filter(function(c){return c.roomId!==id;});
  if(selectedId===id){selectedId=null;}
  renderPoolSidebar();renderAllLanes();syncPrevPanel();save();updateEmptyState();toast('Room deleted');
}
function addView(name,slug){
  var vw={id:gid(),name:name||'New View',slug:slug||'/new-view'};
  views.push(vw);
  if(!prevPanelViewId)prevPanelViewId=vw.id;
  renderAllLanes();syncPrevPanelViewSel();syncPrevPanel();save();updateEmptyState();return vw;
}
function deleteView(id){
  views=views.filter(function(v){return v.id!==id;});
  citations=citations.filter(function(c){return c.viewId!==id;});
  if(prevPanelViewId===id)prevPanelViewId=views.length?views[0].id:null;
  renderAllLanes();syncPrevPanelViewSel();syncPrevPanel();save();updateEmptyState();toast('View deleted');
}
function addCitation(roomId,viewId,position){
  if(citations.find(function(c){return c.roomId===roomId&&c.viewId===viewId;})){toast('Already in this view');return null;}
  var pos=position!==undefined?position:viewCitations(viewId).length+1;
  var cit={id:gid(),roomId:roomId,viewId:viewId,position:pos,overrides:{}};
  citations.push(cit);
  viewCitations(viewId).forEach(function(c,i){c.position=i+1;});
  renderLane(viewId);renderPoolSidebar();
  if(prevPanelViewId===viewId)syncPrevPanel();
  save();return cit;
}
function removeCitation(citId){
  var cit=citations.find(function(c){return c.id===citId;});if(!cit)return;
  var vwId=cit.viewId;
  citations=citations.filter(function(c){return c.id!==citId;});
  viewCitations(vwId).forEach(function(c,i){c.position=i+1;});
  renderLane(vwId);renderPoolSidebar();
  if(prevPanelViewId===vwId)syncPrevPanel();
  save();toast('Removed');
}
function reorderCitation(citId,newPos,viewId){
  var vcits=viewCitations(viewId);
  var cit=vcits.find(function(c){return c.id===citId;});if(!cit)return;
  var oldPos=cit.position;if(oldPos===newPos)return;
  vcits.forEach(function(c){
    if(c.id===citId){c.position=newPos;return;}
    if(oldPos<newPos){if(c.position>oldPos&&c.position<=newPos)c.position--;}
    else{if(c.position>=newPos&&c.position<oldPos)c.position++;}
  });
  renderLane(viewId);if(prevPanelViewId===viewId)syncPrevPanel();save();
}

/* ══════════════════════════════════
   CANVAS TRANSFORM
══════════════════════════════════ */
var ci=g('canvas-inner');
function applyT(){ci.style.transform='translate('+T.x+'px,'+T.y+'px) scale('+T.s+')';g('zpct').textContent=Math.round(T.s*100)+'%';}
function zoom(d,cx,cy){
  var ns=Math.max(.2,Math.min(2.5,T.s*(1+d)));
  var lc=g('lane-canvas');
  var lx=cx!==undefined?cx:lc.clientWidth/2,ly=cy!==undefined?cy:lc.clientHeight/2;
  T.x=lx-(lx-T.x)*(ns/T.s);T.y=ly-(ly-T.y)*(ns/T.s);T.s=ns;applyT();
}
function fit(){
  if(!views.length){T.x=20;T.y=20;T.s=.9;applyT();save();return;}
  var lc=g('lane-canvas');
  var totalW=LANE_HDR_W+Math.max.apply(null,views.map(function(vw){return viewCitations(vw.id).length*(SLOT_W+20)+80;}).concat([400]));
  var totalH=views.length*LANE_H+80;
  var sw=lc.clientWidth-40,sh=lc.clientHeight-40;
  T.s=Math.min(sw/totalW,sh/totalH,.95);T.x=20;T.y=20;applyT();save();
}
g('btn-zo').addEventListener('click',function(){zoom(-.15);});
g('btn-zi').addEventListener('click',function(){zoom(.15);});
g('btn-fit').addEventListener('click',fit);

/* canvas pan */
var lc=g('lane-canvas');
var _pan=false,_panPS={};
var _spaceDown=false;
document.addEventListener('keydown',function(e){if(e.code==='Space'&&!e.repeat&&!e.target.closest('input,textarea,select')){e.preventDefault();_spaceDown=true;lc.style.cursor='grab';}});
document.addEventListener('keyup',function(e){if(e.code==='Space'){_spaceDown=false;if(!_pan)lc.style.cursor='';}});
lc.addEventListener('pointerdown',function(e){
  if(e.button!==0)return;
  if(_spaceDown){e.preventDefault();lc.setPointerCapture(e.pointerId);_pan=true;_panPS={x:e.clientX,y:e.clientY,tx:T.x,ty:T.y};lc.style.cursor='grabbing';return;}
  if(e.target.closest('.lane,.pool-row,.slot-card,#lane-add-btn'))return;
  e.preventDefault();lc.setPointerCapture(e.pointerId);_pan=true;_panPS={x:e.clientX,y:e.clientY,tx:T.x,ty:T.y};lc.style.cursor='grabbing';
});
lc.addEventListener('pointermove',function(e){if(!_pan||!e.isPrimary)return;T.x=_panPS.tx+(e.clientX-_panPS.x);T.y=_panPS.ty+(e.clientY-_panPS.y);applyT();});
lc.addEventListener('pointerup',function(e){if(!e.isPrimary)return;if(_pan){_pan=false;lc.style.cursor=_spaceDown?'grab':'';save();}});
lc.addEventListener('pointercancel',function(){if(_pan){_pan=false;lc.style.cursor='';}});
lc.addEventListener('wheel',function(e){e.preventDefault();var r=lc.getBoundingClientRect();zoom(-e.deltaY*.001,e.clientX-r.left,e.clientY-r.top);},{passive:false});

/* pool sidebar resize */
(function(){
  var h=g('pool-resize'),rz=false,sx=0,sw=0;
  h.addEventListener('pointerdown',function(e){if(e.button!==0)return;h.setPointerCapture(e.pointerId);h.classList.add('dragging');rz=true;sx=e.clientX;sw=g('pool-sidebar').offsetWidth;e.preventDefault();});
  h.addEventListener('pointermove',function(e){if(!rz||!e.isPrimary)return;var w=Math.max(200,Math.min(400,sw+(e.clientX-sx)));g('pool-sidebar').style.width=w+'px';document.documentElement.style.setProperty('--pool-w',w+'px');});
  h.addEventListener('pointerup',function(){rz=false;h.classList.remove('dragging');});
  h.addEventListener('pointercancel',function(){rz=false;h.classList.remove('dragging');});
})();

/* ══════════════════════════════════
   POOL SIDEBAR
══════════════════════════════════ */
function renderPoolSidebar(){
  var pl=g('pool-list');pl.innerHTML='';
  rooms.forEach(function(rm){pl.appendChild(makePoolRow(rm));});
  var c=g('pool-count');if(c)c.textContent=rooms.length+(rooms.length===1?' room':' rooms');
}
function makePoolRow(rm){
  var col=roomColor(rm);
  var myC=roomCitations(rm.id);
  var el=ce('div');el.className='pool-row'+(selectedId===rm.id?' sel':'');el.id='pr-'+rm.id;
  var bar=ce('div');bar.className='pool-row-bar';bar.style.background=col;
  var body=ce('div');body.className='pool-row-body';
  var top=ce('div');top.className='pool-row-top';
  var dot=ce('div');dot.className='pool-row-dot';dot.style.background=col;
  var ni=ce('input');ni.className='pool-row-name';ni.value=rm.name||'';ni.placeholder='Room name';ni.dataset.rmfield='name';ni.dataset.rmid=rm.id;
  var lysel=ce('select');lysel.className='pool-row-ly';
  LAYOUTS.forEach(function(l){var o=ce('option');o.value=l.id;o.textContent=l.id;if(l.id===rm.layout)o.selected=true;lysel.appendChild(o);});
  lysel.dataset.rmfield='layout';lysel.dataset.rmid=rm.id;
  var acts=ce('div');acts.className='pool-row-acts';
  var iBtn=ce('button');iBtn.className='pra';iBtn.textContent='✎';iBtn.title='Edit';iBtn.dataset.rmact='inspect';iBtn.dataset.rmid=rm.id;
  var dBtn=ce('button');dBtn.className='pra';dBtn.textContent='✕';dBtn.title='Delete';dBtn.dataset.rmact='delete';dBtn.dataset.rmid=rm.id;
  acts.appendChild(iBtn);acts.appendChild(dBtn);
  top.appendChild(dot);top.appendChild(ni);top.appendChild(lysel);top.appendChild(acts);
  var hl=ce('textarea');hl.className='pool-row-hl';hl.value=rm.headline||'';hl.placeholder='Headline…';hl.rows=1;hl.dataset.rmfield='headline';hl.dataset.rmid=rm.id;
  body.appendChild(top);body.appendChild(hl);
  var foot=ce('div');foot.className='pool-row-foot';
  var cits=ce('div');cits.className='pool-row-cits';
  myC.forEach(function(cit){var vw=getView(cit.viewId);if(!vw)return;var b=ce('span');b.className='prc';b.textContent=vw.name||vw.slug;b.dataset.rmcit=cit.id;cits.appendChild(b);});
  var palrow=ce('div');palrow.className='pool-row-pal';
  PALS.forEach(function(p){var sw=ce('div');sw.className='prp'+(rm.palette===p.id?' sel':'');sw.style.background=p.col;sw.title=p.name;sw.dataset.rmpalette=p.id;sw.dataset.rmid=rm.id;palrow.appendChild(sw);});
  foot.appendChild(cits);foot.appendChild(palrow);
  var grip=ce('span');grip.className='pool-row-grip';grip.textContent='⠿';
  el.appendChild(bar);el.appendChild(body);el.appendChild(foot);el.appendChild(grip);
  bindPoolRowDrag(el,rm);
  /* inline edit */
  el.addEventListener('input',function(e){var f=e.target.closest('[data-rmfield]');if(!f)return;rm[f.dataset.rmfield]=f.value;refreshAllSlotsForRoom(rm.id);if(prevPanelViewId)syncPrevPanel();save();});
  el.addEventListener('change',function(e){var f=e.target.closest('[data-rmfield]');if(!f)return;rm[f.dataset.rmfield]=f.value;if(f.dataset.rmfield==='layout')refreshPoolRow(rm.id);refreshAllSlotsForRoom(rm.id);if(prevPanelViewId)syncPrevPanel();save();});
  el.querySelectorAll('textarea').forEach(function(ta){ta.addEventListener('input',function(){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  el.addEventListener('click',function(e){
    var act=e.target.closest('[data-rmact]');
    var pcit=e.target.closest('[data-rmcit]');
    var ppal=e.target.closest('[data-rmpalette]');
    if(ppal){e.stopPropagation();rm.palette=ppal.dataset.rmpalette;refreshPoolRow(rm.id);refreshAllSlotsForRoom(rm.id);if(prevPanelViewId)syncPrevPanel();save();return;}
    if(pcit){e.stopPropagation();removeCitation(pcit.dataset.rmcit);return;}
    if(act){e.stopPropagation();
      if(act.dataset.rmact==='delete'){deleteRoom(act.dataset.rmid);return;}
      if(act.dataset.rmact==='inspect'){openComposeStudio(act.dataset.rmid,null,null);return;}
    }
  });
  el.addEventListener('contextmenu',function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
    e.preventDefault();openCtxMenu(e.clientX,e.clientY,null,rm.id,null);
  });
  return el;
}
function refreshPoolRow(rmId){var rm=getRoom(rmId);if(!rm)return;var old=g('pr-'+rmId);if(!old)return;old.replaceWith(makePoolRow(rm));}
function refreshAllSlotsForRoom(rmId){
  views.forEach(function(vw){
    viewCitations(vw.id).forEach(function(cit){
      if(cit.roomId===rmId){var slot=g('slot-'+cit.id);var rm=getRoom(rmId);if(slot&&rm){var neo=makeSlotCard(cit,rm);slot.replaceWith(neo);bindSlotDrag(neo,cit,vw.id);}}
    });
  });
}

/* POOL ROW DRAG */
function bindPoolRowDrag(el,rm){
  el.addEventListener('pointerdown',function(e){
    if(e.button!==0)return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
    if(e.target.closest('.pra'))return;
    e.preventDefault();el.setPointerCapture(e.pointerId);
    var moved=false,snapLaneId=null;
    el.classList.add('dragging');dragRmId=rm.id;
    g('dg-dot').style.background=roomColor(rm);
    g('dg-lbl').textContent=(rm.name||rm.layout)+' → drop to cite';
    function mm(e){
      if(!e.isPrimary)return;if(!moved)moved=true;
      var dg=g('drag-ghost');dg.style.left=(e.clientX+12)+'px';dg.style.top=(e.clientY-10)+'px';dg.classList.add('show');
      var laneUnder=findLaneAt(e.clientX,e.clientY);
      if(laneUnder!==snapLaneId){
        if(snapLaneId){var pv=g('lane-'+snapLaneId);if(pv){pv.classList.remove('snap-target');var pdz=g('ldz-'+snapLaneId);if(pdz)pdz.classList.remove('active');}}
        snapLaneId=laneUnder;
        if(snapLaneId){var lel=g('lane-'+snapLaneId);if(lel){lel.classList.add('snap-target');var dz=g('ldz-'+snapLaneId);if(dz)dz.classList.add('active');}}
      }
    }
    function mu(e){
      if(!e.isPrimary)return;
      el.classList.remove('dragging');dragRmId=null;g('drag-ghost').classList.remove('show');
      if(snapLaneId){
        var lel=g('lane-'+snapLaneId);if(lel)lel.classList.remove('snap-target');
        var dz=g('ldz-'+snapLaneId);if(dz)dz.classList.remove('active');
        var insertPos=getInsertPosition(e.clientX,snapLaneId);
        var existing=citations.find(function(c){return c.roomId===rm.id&&c.viewId===snapLaneId;});
        if(!existing){addCitation(rm.id,snapLaneId,insertPos);toast((rm.name||rm.layout)+' added');}
        else toast('Already in this view');
        snapLaneId=null;
      }
      el.removeEventListener('pointermove',mm);el.removeEventListener('pointerup',mu);el.removeEventListener('pointercancel',mu);
    }
    el.addEventListener('pointermove',mm);el.addEventListener('pointerup',mu);el.addEventListener('pointercancel',mu);
  });
}
function findLaneAt(cx,cy){
  var els=document.querySelectorAll('.lane');
  for(var i=0;i<els.length;i++){var r=els[i].getBoundingClientRect();if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)return els[i].dataset.viewid;}
  return null;
}
function getInsertPosition(cx,viewId){
  var slots=document.querySelectorAll('.slot-card[data-viewid="'+viewId+'"]');
  if(!slots.length)return 1;
  for(var i=0;i<slots.length;i++){var r=slots[i].getBoundingClientRect();if(cx<(r.left+r.right)/2)return i+1;}
  return viewCitations(viewId).length+1;
}

/* ══════════════════════════════════
   LANE RENDER
══════════════════════════════════ */
function renderAllLanes(){
  ci.querySelectorAll('.lane').forEach(function(el){el.remove();});
  views.forEach(function(vw){ci.insertBefore(makeLane(vw),g('lane-add-btn'));});
  syncLaneSeqStrips();
}
function renderLane(viewId){
  var vw=getView(viewId);if(!vw)return;
  var old=g('lane-'+viewId);
  var neo=makeLane(vw);
  if(old)old.replaceWith(neo);else ci.insertBefore(neo,g('lane-add-btn'));
  syncLaneSeqStrips();
}
function makeLane(vw){
  var vcits=viewCitations(vw.id);
  var el=ce('div');el.className='lane';el.id='lane-'+vw.id;el.dataset.viewid=vw.id;
  /* number strip */
  var num=ce('div');num.className='lane-num';var nt=ce('span');nt.className='lane-num-txt';nt.textContent='01';num.appendChild(nt);el.appendChild(num);
  /* header */
  var hd=ce('div');hd.className='lane-hd';
  var vni=ce('input');vni.className='lane-view-name';vni.value=vw.name||'';vni.spellcheck=false;
  var vsi=ce('input');vsi.className='lane-view-slug';vsi.value=vw.slug||'';vsi.spellcheck=false;
  var meta=ce('div');meta.className='lane-meta';
  var cnt=ce('span');cnt.className='lane-count';cnt.textContent=vcits.length+' room'+(vcits.length!==1?'s':'');
  var pb=ce('button');pb.className='lane-preview-btn';pb.textContent='Present ↗';
  var db=ce('button');db.className='lane-del-btn';db.textContent='×';
  meta.appendChild(cnt);meta.appendChild(pb);meta.appendChild(db);
  hd.appendChild(vni);hd.appendChild(vsi);hd.appendChild(meta);el.appendChild(hd);
  /* events on header */
  vni.addEventListener('input',function(){vw.name=vni.value;syncPrevPanelViewSel();save();});
  vsi.addEventListener('input',function(){vw.slug=vsi.value;save();});
  pb.addEventListener('click',function(){presentView(vw.id);});
  db.addEventListener('click',function(){if(confirm('Delete view "'+vw.name+'"?'))deleteView(vw.id);});
  /* slots */
  var slots=ce('div');slots.className='lane-slots';
  vcits.forEach(function(cit,i){
    var rm=getRoom(cit.roomId);if(!rm)return;
    if(i>0){var conn=ce('div');conn.className='slot-conn';slots.appendChild(conn);}
    var sc=makeSlotCard(cit,rm);slots.appendChild(sc);bindSlotDrag(sc,cit,vw.id);
  });
  /* drop zone */
  var dz=ce('div');dz.className='lane-drop-zone';dz.id='ldz-'+vw.id;var dzi=ce('span');dzi.className='ldz-ico';dzi.textContent='⊕';dz.appendChild(dzi);slots.appendChild(dz);
  el.appendChild(slots);
  return el;
}
function makeSlotCard(cit,rm){
  var eff=resolveRoom(rm,cit);
  var col=roomColor(eff);
  var el=ce('div');el.className='slot-card'+(selectedCitId===cit.id?' sel':'');el.id='slot-'+cit.id;el.dataset.citid=cit.id;el.dataset.viewid=cit.viewId;
  var tb=ce('div');tb.className='slot-top-bar';tb.style.background=col;
  var hd=ce('div');hd.className='slot-hd';
  var sq=ce('span');sq.className='slot-seq';sq.textContent=String(cit.position).padStart(2,'0');
  var ly=ce('span');ly.className='slot-layout';ly.textContent=rm.layout;
  var rm2=ce('button');rm2.className='slot-rm';rm2.textContent='×';rm2.title='Remove';rm2.dataset.removecit=cit.id;
  hd.appendChild(sq);hd.appendChild(ly);hd.appendChild(rm2);
  var diag=ce('div');diag.className='slot-diag';
  if(eff.headline){var hl=ce('div');hl.className='slot-hl';hl.style.color=col;hl.textContent=eff.headline.slice(0,28);diag.appendChild(hl);}
  else{var ph=ce('div');ph.style.cssText='height:8px;border-radius:1px;background:var(--bdr2);width:70%;margin-bottom:3px';diag.appendChild(ph);}
  el.appendChild(tb);el.appendChild(hd);el.appendChild(diag);
  el.addEventListener('click',function(e){
    if(e.target.closest('.slot-rm')){e.stopPropagation();removeCitation(e.target.dataset.removecit||e.target.closest('.slot-rm').dataset.removecit);return;}
    selectedCitId=cit.id;selectedId=null;
    document.querySelectorAll('.slot-card').forEach(function(s){s.classList.remove('sel');});
    el.classList.add('sel');
    openComposeStudio(cit.roomId,cit.id,cit.viewId);
  });
  el.addEventListener('contextmenu',function(e){e.preventDefault();openCtxMenu(e.clientX,e.clientY,cit.id,cit.roomId,cit.viewId);});
  return el;
}
function bindSlotDrag(el,cit,viewId){
  el.addEventListener('pointerdown',function(e){
    if(e.button!==0||e.target.closest('.slot-rm'))return;
    e.preventDefault();el.setPointerCapture(e.pointerId);
    var sx=e.clientX,moved=false,overCitId=null;
    el.style.opacity='.5';el.style.outline='1.5px solid var(--acc)';
    function mm(e){
      if(!e.isPrimary)return;if(Math.abs(e.clientX-sx)>8)moved=true;if(!moved)return;
      el.style.pointerEvents='none';
      var under=document.elementFromPoint(e.clientX,e.clientY);
      el.style.pointerEvents='';
      var ts=under?under.closest('.slot-card'):null;
      document.querySelectorAll('.slot-card').forEach(function(s){s.style.borderLeft='';});
      if(ts&&ts!==el&&ts.dataset.viewid===viewId){overCitId=ts.dataset.citid;ts.style.borderLeft='2px solid var(--acc)';}
      else overCitId=null;
    }
    function mu(){
      el.style.opacity='';el.style.outline='';
      document.querySelectorAll('.slot-card').forEach(function(s){s.style.borderLeft='';});
      el.removeEventListener('pointermove',mm);el.removeEventListener('pointerup',mu);el.removeEventListener('pointercancel',mu);
      if(moved&&overCitId){var tc=citations.find(function(c){return c.id===overCitId;});if(tc)reorderCitation(cit.id,tc.position,viewId);}
    }
    el.addEventListener('pointermove',mm);el.addEventListener('pointerup',mu);el.addEventListener('pointercancel',mu);
  });
}
function syncLaneSeqStrips(){
  views.forEach(function(vw,i){var el=g('lane-'+vw.id);if(el){var t=el.querySelector('.lane-num-txt');if(t)t.textContent=String(i+1).padStart(2,'0');}});
}

/* ══════════════════════════════════
   SCHEMATIC PANEL
══════════════════════════════════ */
function syncPrevPanelViewSel(){
  var sel=g('prev-panel-view-sel');sel.innerHTML='';
  views.forEach(function(vw){var o=ce('option');o.value=vw.id;o.textContent=vw.name||vw.slug;if(vw.id===prevPanelViewId)o.selected=true;sel.appendChild(o);});
}
function syncPrevPanel(){
  var vwId=prevPanelViewId;
  var emptyEl=g('pp-empty'),schEl=g('pp-schematic'),footEl=g('pp-footer'),sum=g('pp-footer-summary');
  if(!vwId||!views.length){emptyEl.style.display='block';schEl.innerHTML='';footEl.style.display='none';return;}
  var vw=getView(vwId);if(!vw){emptyEl.style.display='block';schEl.innerHTML='';footEl.style.display='none';return;}
  var vcits=viewCitations(vwId);
  if(!vcits.length){emptyEl.style.display='block';emptyEl.textContent='No rooms in this view yet.';schEl.innerHTML='';footEl.style.display='none';return;}
  emptyEl.style.display='none';footEl.style.display='flex';
  if(sum)sum.innerHTML='<strong>'+vcits.length+'</strong> room'+(vcits.length!==1?'s':'')+' · '+(vw.name||vw.slug);
  schEl.innerHTML=vcits.map(function(cit,i){
    var rm=getRoom(cit.roomId);if(!rm)return '';
    var eff=resolveRoom(rm,cit);
    var accent=PAL_COLORS[eff.palette||'']||PAL_COLORS[''];
    return '<div class="pw-room'+(selectedCitId===cit.id?' sel':'')+'" onclick="selectCit(\''+cit.id+'\')" title="'+rm.layout+'">'+
      '<div class="pw-room-pal" style="background:'+accent+'"></div>'+
      '<div class="pw-room-diagram">'+buildSchDiagram(rm.layout,eff,accent)+'</div>'+
      '<div class="pw-room-meta">'+
        '<span class="pw-room-name">'+(eff.name||eff.headline||rm.layout).slice(0,24)+'</span>'+
        '<span class="pw-room-pal-tag" style="border-color:'+accent+'44;color:'+accent+'">'+(eff.palette||'night')+'</span>'+
        '<span class="pw-room-layout">'+rm.layout+'</span>'+
      '</div></div>'+
      (i<vcits.length-1?'<div class="pw-connector"><div class="pw-conn-line"></div><span class="pw-conn-arrow">↓</span><div class="pw-conn-line"></div></div>':'');
  }).join('');
}
window.selectCit=function(citId){
  selectedCitId=citId;selectedId=null;
  document.querySelectorAll('.slot-card').forEach(function(s){s.classList.remove('sel');});
  var el=g('slot-'+citId);if(el)el.classList.add('sel');
  syncPrevPanel();
  var cit=citations.find(function(c){return c.id===citId;});
  if(cit)openComposeStudio(cit.roomId,cit.id,cit.viewId);
};
function buildSchDiagram(layout,rm,accent){
  var fi='rgba(26,24,22,.5)',fd='rgba(26,24,22,.2)',fg='rgba(26,24,22,.09)';
  var lbl=rm.label
    ?'<div style="font-family:\'DM Mono\',monospace;font-size:5.5px;letter-spacing:.2em;text-transform:uppercase;color:'+accent+';opacity:.8;margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+rm.label+'</div>'
    :'<div style="height:2px;border-radius:1px;background:'+accent+';opacity:.4;width:38%;margin-bottom:4px"></div>';
  var hl=rm.headline
    ?'<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:9px;text-transform:uppercase;color:'+fi+';line-height:1;letter-spacing:-.01em;margin-bottom:4px;overflow:hidden;max-height:20px">'+rm.headline.slice(0,22)+'</div>'
    :'<div style="height:8px;border-radius:1px;background:'+fg+';width:72%;margin-bottom:4px"></div>';
  var bd=rm.body
    ?'<div style="font-family:\'DM Mono\',monospace;font-size:5px;line-height:1.4;color:'+fd+';overflow:hidden;max-height:16px">'+rm.body.slice(0,56)+'</div>'
    :'<div style="height:2px;border-radius:1px;background:'+fg+';width:88%;margin-bottom:2px"></div><div style="height:2px;border-radius:1px;background:'+fg+';width:66%"></div>';
  if(layout==='full'||layout==='cta'||layout==='essay'){
    return '<div style="flex:1;padding-right:4px">'+lbl+hl+bd+'</div><div style="width:26%;background:'+fg+';border-radius:1px;opacity:.7"></div>';
  }
  if(layout==='split'||layout==='hero'){
    return '<div style="flex:1;padding-right:5px">'+lbl+hl+bd+'</div><div style="width:35%;background:'+fg+';border-radius:1px;flex-shrink:0"></div>';
  }
  if(layout==='showcase'){
    var pr=rm.price?'<div style="font-family:\'DM Mono\',monospace;font-size:6px;color:'+accent+';margin-top:3px">'+rm.price+'</div>':'';
    return '<div style="flex:1;padding-right:4px">'+lbl+hl+pr+'</div><div style="width:32%;background:'+fg+';border-radius:1px;flex-shrink:0"></div>';
  }
  if(layout==='cart'){
    return '<div style="flex:1">'+lbl+'<div style="border-top:1px solid '+fg+';margin-top:3px">'+'<div style="display:flex;gap:4px;border-bottom:1px solid '+fg+';padding:2px 0"><div style="width:12px;height:15px;background:'+fg+';border-radius:1px;flex-shrink:0"></div><div style="flex:1"><div style="height:2px;background:'+fi+';border-radius:1px;width:80%;margin-bottom:2px"></div><div style="height:2px;background:'+fg+';border-radius:1px;width:50%"></div></div><div style="font-size:5px;color:'+accent+'">$—</div></div>'.repeat(2)+'</div></div>';
  }
  return '<div style="flex:1">'+lbl+hl+bd+'</div>';
}
g('prev-panel-view-sel').addEventListener('change',function(){prevPanelViewId=this.value;syncPrevPanel();});
g('pp-render-btn').addEventListener('click',function(){if(prevPanelViewId)presentView(prevPanelViewId);});
g('btn-pp-close').addEventListener('click',function(){
  prevPanelOpen=!prevPanelOpen;
  g('prev-panel').classList.toggle('collapsed',!prevPanelOpen);
  g('btn-schematic').classList.toggle('on',prevPanelOpen);
});
g('btn-schematic').addEventListener('click',function(){
  prevPanelOpen=!prevPanelOpen;
  g('prev-panel').classList.toggle('collapsed',!prevPanelOpen);
  this.classList.toggle('on',prevPanelOpen);
  if(prevPanelOpen)syncPrevPanel();
});

   CREATE MENU
══════════════════════════════════ */
function openCreateMenu(anchor){
  var menu=g('create-menu');
  var r=anchor.getBoundingClientRect();
