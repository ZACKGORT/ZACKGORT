  var r5=addRoom('essay','essay');r5.name='The Essay';r5.headline='Against disposability.';r5.body='There is a grief that happens when a well-made thing is thrown away.';r5.pull='Buy less. Keep it longer.';
  var r6=addRoom('cta','convert');r6.name='Convert Room';r6.headline='Stay close.';r6.body='One message when something is ready.';r6.palette='forest';
  var r7=addRoom('cover','editorial');r7.name='Campaign Cover';r7.headline='Autumn Things.';r7.body='Objects for the slower season.';r7.palette='midnight';
  var r8=addRoom('specs','data');r8.name='Specs Room';r8.headline='What things are made of.';

  var v1=addView('Home Page','/home');
  var v2=addView('Campaign','/campaign');
  addCitation(r1.id,v1.id);addCitation(r3.id,v1.id);addCitation(r4.id,v1.id);addCitation(r6.id,v1.id);
  addCitation(r7.id,v2.id);addCitation(r2.id,v2.id);addCitation(r5.id,v2.id);addCitation(r6.id,v2.id);
  var camCit=citations.find(function(c){return c.roomId===r6.id&&c.viewId===v2.id;});
  if(camCit)camCit.overrides={headline:'This is the one.',label:'Campaign close',palette:'midnight'};

  prevPanelViewId=v1.id;
  syncPrevPanelViewSel();syncPrevPanel();
  renderPoolSidebar();renderAllLanes();
  save();
}

/* ═══════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════ */
var ctxState={citId:null,rmId:null,viewId:null};
var ctxEl=g('ctx-menu');

function openCtxMenu(x,y,citId,rmId,viewId){
  ctxState={citId:citId,rmId:rmId,viewId:viewId};

  /* Resolve room for header label */
  var rm=getRoom(rmId);
  var hdr=g('ctx-header');
  hdr.textContent=rm?(rm.name||rm.layout):'Room';

  /* Show/hide remove option — only relevant when in a citation context */
  g('ctx-remove').style.display=citId?'flex':'none';
  /* Show/hide duplicate — only for rooms */
  g('ctx-duplicate').style.display=rmId?'flex':'none';

  /* Position — keep inside viewport */
  var mw=200,mh=200;
  var lx=Math.min(x,window.innerWidth-mw-8);
  var ly=Math.min(y,window.innerHeight-mh-8);
  ctxEl.style.left=lx+'px';
  ctxEl.style.top=ly+'px';
  ctxEl.style.transformOrigin=(x>window.innerWidth/2?'top right':'top left');
  ctxEl.classList.add('open');
}

function closeCtxMenu(){ctxEl.classList.remove('open');}

/* Dismiss on outside click or Escape */
document.addEventListener('click',function(e){
  if(!e.target.closest('#ctx-menu'))closeCtxMenu();
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeCtxMenu();closeComposeStudio();}
});

g('ctx-edit').addEventListener('click',function(){
  closeCtxMenu();
  openComposeStudio(ctxState.rmId,ctxState.citId,ctxState.viewId);
});

g('ctx-preview').addEventListener('click',function(){
  closeCtxMenu();
  /* Preview the view this citation belongs to, or first view */
  var vid=ctxState.viewId;
  if(!vid&&ctxState.citId){
    var cit=citations.find(function(c){return c.id===ctxState.citId;});
    if(cit)vid=cit.viewId;
  }
  if(vid)previewView(vid);
  else if(views.length)previewView(views[0].id);
});

g('ctx-duplicate').addEventListener('click',function(){
  closeCtxMenu();
  var rm=getRoom(ctxState.rmId);if(!rm)return;
  var copy=JSON.parse(JSON.stringify(rm));
  copy.id='r'+Date.now();
  copy.name=(rm.name||rm.layout)+' copy';
  rooms.push(copy);
  renderPoolSidebar();save();
  toast('Duplicated → '+copy.name);
});

g('ctx-remove').addEventListener('click',function(){
  closeCtxMenu();
  if(ctxState.citId)removeCitation(ctxState.citId);
});

/* ═══════════════════════════════════════
   COMPOSE STUDIO
═══════════════════════════════════════ */
var csState={rmId:null,citId:null,viewId:null};

function openComposeStudio(rmId,citId,viewId){
  var rm=getRoom(rmId);if(!rm)return;
  csState={rmId:rmId,citId:citId,viewId:viewId};

  /* Effective values — room base merged with citation overrides */
  var cit=citId?citations.find(function(c){return c.id===citId;}):null;
  var eff=cit?resolveRoom(rm,cit):rm;

  g('compose-ttl').textContent=cit?'Override · Room':'Edit · Room';
  g('compose-rm-name').textContent=rm.name||rm.layout;

  var colL=g('cs-col-left');var colR=g('cs-col-right');
  colL.innerHTML='';colR.innerHTML='';

  function mkSec(col,title){
    var s=ce('div');s.className='cs-sec';
    var t=ce('div');t.className='cs-sec-t';t.textContent=title;
    s.appendChild(t);col.appendChild(s);return s;
  }
  function mkRow(sec,lbl,field,multi,placeholder,isOv){
    var r=ce('div');r.className='cs-row'+(multi?' top':'');
    var l=ce('span');l.className='cs-lbl';l.textContent=lbl;
    var inp=multi?ce('textarea'):ce('input');
    inp.className=multi?'cs-ta':'cs-in';
    /* Override field: show effective value, placeholder shows base */
    if(isOv){
      inp.value=(cit&&cit.overrides&&cit.overrides[field])||'';
      inp.placeholder='Base: '+((rm[field]||'').slice(0,28)||'—');
    } else {
      inp.value=rm[field]||'';
      inp.placeholder=placeholder||lbl;
    }
    if(multi){inp.rows=3;setTimeout(function(){inp.style.height='auto';inp.style.height=inp.scrollHeight+'px';},0);}
    inp.dataset.csfield=field;inp.dataset.csov=isOv?'1':'0';
    r.appendChild(l);r.appendChild(inp);sec.appendChild(r);return inp;
  }
  function mkSelRow(sec,lbl,field,opts){
    var r=ce('div');r.className='cs-row';
    var l=ce('span');l.className='cs-lbl';l.textContent=lbl;
    var sel=ce('select');sel.className='cs-sel';
    opts.forEach(function(o){
      var opt=ce('option');opt.value=o.id;opt.textContent=o.name||o.id;
      if(rm[field]===o.id)opt.selected=true;sel.appendChild(opt);
    });
    sel.dataset.csfield=field;sel.dataset.csov='0';
    r.appendChild(l);r.appendChild(sel);sec.appendChild(r);return sel;
  }

  /* Left column — Identity + Structure */
  var sId=mkSec(colL,'Identity');
  mkRow(sId,'Name','name',false,'Room name',false);
  mkRow(sId,'Label','label',false,'Section label',cit?true:false);
  mkSelRow(sId,'Layout','layout',LAYOUTS);
  mkSelRow(sId,'Type','contentType',CTYPES);

  var sPal=mkSec(colL,'Palette');
  var palRow=ce('div');palRow.className='cs-pal-row';
  var activePal=cit&&cit.overrides&&cit.overrides.palette?cit.overrides.palette:rm.palette;
  PALS.forEach(function(p){
    var sw=ce('div');sw.className='cs-pal-sw'+(activePal===p.id?' sel':'');
    sw.style.background=p.col;sw.title=p.name;sw.dataset.cspalette=p.id;
    palRow.appendChild(sw);
  });
  sPal.appendChild(palRow);

  /* Right column — Copy */
  var sCopy=mkSec(colR,'Copy');
  var isOvCopy=!!cit;
  mkRow(sCopy,'Headline','headline',true,'Main heading…',isOvCopy);
  mkRow(sCopy,'Body','body',true,'Narrative copy…',isOvCopy);
  mkRow(sCopy,'Pull','pull',false,'Pull quote…',isOvCopy);

  /* Citation context note */
  if(cit){
    var sCtx=mkSec(colR,'Context');
    var note=ce('div');note.style.cssText='font-family:var(--mono);font-size:6.5px;color:var(--ink3);line-height:1.7';
    var vw=getView(cit.viewId);
    note.innerHTML='Override for <strong style="color:var(--ink2)">'+(vw?vw.name||vw.slug:'view')+'</strong> · pos '+cit.position+'<br>Blank fields inherit from the room.';
    sCtx.appendChild(note);
    /* Diverge button if overrides exist */
    if(citHasOverrides(cit)){
      var divBtn=ce('button');
      divBtn.style.cssText='background:none;border:1px solid rgba(184,98,42,.3);border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);padding:6px 10px;cursor:pointer;margin-top:8px;transition:all .12s;width:100%';
      divBtn.textContent='↗ Diverge as new room';
      divBtn.addEventListener('click',function(){divergeCitation(cit.id);closeComposeStudio();});
      sCtx.appendChild(divBtn);
    }
  }

  /* Live input sync */
  var inner=g('compose-inner');
  inner.addEventListener('input',function(e){
    var f=e.target.closest('[data-csfield]');if(!f)return;
    var field=f.dataset.csfield;var val=f.value;
    if(f.dataset.csov==='1'&&cit){
      if(!cit.overrides)cit.overrides={};
      cit.overrides[field]=val;
      refreshAllSlotsForRoom(rm.id);
      if(prevPanelViewId===cit.viewId)syncPrevPanel();
    } else {
      rm[field]=val;
      refreshPoolRow(rm.id);
      refreshAllSlotsForRoom(rm.id);
      if(prevPanelViewId)syncPrevPanel();
    }
    save();
  });
  inner.addEventListener('change',function(e){
    var f=e.target.closest('[data-csfield]');if(!f)return;
    var field=f.dataset.csfield;var val=f.value;
    rm[field]=val;
    refreshPoolRow(rm.id);refreshAllSlotsForRoom(rm.id);
    if(prevPanelViewId)syncPrevPanel();
    save();
  });
  inner.addEventListener('click',function(e){
    var sw=e.target.closest('[data-cspalette]');if(!sw)return;
    var pid=sw.dataset.cspalette;
    if(cit){if(!cit.overrides)cit.overrides={};cit.overrides.palette=pid;}
    else rm.palette=pid;
    inner.querySelectorAll('.cs-pal-sw').forEach(function(s){s.classList.toggle('sel',s.dataset.cspalette===pid);});
    refreshPoolRow(rm.id);refreshAllSlotsForRoom(rm.id);
    if(prevPanelViewId)syncPrevPanel();
    save();
  });

  g('compose-studio').classList.add('open');
}

function closeComposeStudio(){
  g('compose-studio').classList.remove('open');
  /* Remove stale input listeners by clearing inner HTML won't work safely — 
     instead remove the open class and re-populate next open */
  g('compose-inner').removeEventListener('input',null);
}

g('compose-close').addEventListener('click',closeComposeStudio);
g('cs-save').addEventListener('click',closeComposeStudio);
g('compose-studio').addEventListener('click',function(e){
  if(e.target===g('compose-studio'))closeComposeStudio();
});
g('cs-preview-btn').addEventListener('click',function(){
  var vid=csState.viewId;
  if(!vid&&csState.citId){var cit=citations.find(function(c){return c.id===csState.citId;});if(cit)vid=cit.viewId;}
  if(vid)previewView(vid);
  else if(views.length)previewView(views[0].id);
  closeComposeStudio();
});

/* Keyboard shortcut: E to edit selected slot */
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='e'||e.key==='E'){
    if(selectedCitId){
      var cit=citations.find(function(c){return c.id===selectedCitId;});
      if(cit)openComposeStudio(cit.roomId,cit.id,cit.viewId);
    } else if(selectedId){
      openComposeStudio(selectedId,null,null);
    }
  }
});

/* ── INIT ── */
function init(){
  var loaded=load();
  if(loaded&&(rooms.length||views.length)){
    renderPoolSidebar();renderAllLanes();
    syncPrevPanelViewSel();
    if(views.length){prevPanelViewId=views[0].id;syncPrevPanel();}
    applyT();
  } else {
    seed();
    T.x=16;T.y=16;T.s=.88;applyT();
  }
}
init();

})();
</script>
