<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>arc · whiteboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
:root{
  --bg:#f5f2ec;--bg2:#eeebe4;--bg3:#e6e2da;--bg4:#dedad0;
  --ink:#1a1816;--ink2:#5a5650;--ink3:#a09890;
  --acc:#b8622a;--accl:rgba(184,98,42,.08);--accd:rgba(184,98,42,.04);
  --view:#2a58a0;--viewl:rgba(42,88,160,.08);
  --bdr:rgba(26,24,22,.05);--bdr2:rgba(26,24,22,.10);--bdr3:rgba(26,24,22,.22);
  --mono:'DM Mono',monospace;--disp:'DM Serif Display',serif;
  --cond:'Barlow Condensed',sans-serif;--serif:'Playfair Display',serif;
  --tb:42px;
  --pool-w:258px;   /* left sidebar */
  --prev-w:290px;   /* right preview panel */
  --lane-h:164px;
  --slot-w:168px;
  --slot-h:116px;
  --snap:20px;
}
body{font-family:var(--mono);background:var(--bg);color:var(--ink);cursor:none}

/* ── CURSOR ── */
#cur{position:fixed;width:5px;height:5px;border-radius:50%;background:var(--acc);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);opacity:0;transition:width .12s,height .12s}
#cur.v{opacity:1}#cur.xl{width:18px;height:18px;background:transparent;border:1.5px solid var(--acc);opacity:.5}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
#tb{
  position:fixed;top:0;left:0;right:0;height:var(--tb);z-index:9000;
  display:flex;align-items:center;
  background:rgba(245,242,236,.97);border-bottom:1px solid var(--bdr2);
  backdrop-filter:blur(20px);
}
.tb-logo{padding:0 14px;display:flex;align-items:center;gap:6px;border-right:1px solid var(--bdr2);height:100%;flex-shrink:0;width:var(--pool-w)}
.tb-dia{color:var(--acc);font-size:8px;line-height:1}
.tb-name{font-family:var(--cond);font-weight:700;font-size:14px;letter-spacing:.03em;color:var(--ink)}
#tb-proj{background:none;border:none;outline:none;font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);caret-color:var(--acc);padding:0 14px;flex:1}
#tb-proj:focus{color:var(--ink2)}
.tb-r{display:flex;align-items:center;gap:4px;padding:0 10px;border-left:1px solid var(--bdr2);height:100%;flex-shrink:0}
.tbtn{background:none;border:1px solid var(--bdr2);border-radius:2px;font-family:var(--mono);font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:4px 9px;cursor:pointer;transition:all .12s;white-space:nowrap}
.tbtn:hover{border-color:var(--bdr3);color:var(--ink2);background:var(--accd)}
.tbtn.ac{color:var(--acc);border-color:rgba(184,98,42,.4);background:var(--accl)}
.tbtn.ac:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
.tbtn.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.tb-sep{width:1px;height:14px;background:var(--bdr2);margin:0 3px;flex-shrink:0}

/* ═══════════════════════════════════════
   THREE-COLUMN LAYOUT
═══════════════════════════════════════ */
#layout{
  position:fixed;inset:var(--tb) 0 0 0;
  display:flex;
  overflow:hidden;
}

/* ── LEFT: POOL SIDEBAR ── */
#pool-sidebar{
  width:var(--pool-w);
  flex-shrink:0;
  background:var(--bg);
  border-right:1px solid var(--bdr2);
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  z-index:100;
  transition:width .22s cubic-bezier(.22,1,.36,1);
}
/* Collapsed: thin 36px rail */
#pool-sidebar.collapsed{width:36px}
/* Hover-expand while collapsed */
#pool-sidebar.collapsed:hover{width:var(--pool-w)}
/* Hide text content in collapsed state (before hover restores) */
#pool-sidebar.collapsed:not(:hover) #pool-list,
#pool-sidebar.collapsed:not(:hover) #pool-add span:last-child,
#pool-sidebar.collapsed:not(:hover) .psb-title,
#pool-sidebar.collapsed:not(:hover) .psb-count,
#pool-sidebar.collapsed:not(:hover) .pool-row-body,
#pool-sidebar.collapsed:not(:hover) .pool-row-foot,
#pool-sidebar.collapsed:not(:hover) .pool-row-grip{
  opacity:0;pointer-events:none;
}
#pool-sidebar.collapsed:not(:hover) #pool-sidebar-hd{justify-content:center}
#pool-sidebar.collapsed:not(:hover) #psb-collapse-btn{transform:rotate(180deg)}
/* Transition the opacity */
#pool-list,#pool-add span:last-child,.psb-title,.psb-count,
.pool-row-body,.pool-row-foot,.pool-row-grip{
  transition:opacity .15s;
}

/* Collapse toggle button in sidebar header */
#psb-collapse-btn{
  background:none;border:none;cursor:pointer;
  color:var(--ink3);font-size:9px;padding:2px 4px;
  border-radius:2px;transition:color .1s,transform .22s cubic-bezier(.22,1,.36,1);
  flex-shrink:0;line-height:1;
}
#psb-collapse-btn:hover{color:var(--ink)}
/* Collapsed icon in rail — show a dot stack icon */
.psb-rail-icon{
  display:none;flex-direction:column;align-items:center;
  gap:3px;padding:12px 0;
}
.psb-rail-pip{width:6px;height:6px;border-radius:50%;background:var(--bdr3)}
#pool-sidebar.collapsed:not(:hover) .psb-rail-icon{display:flex}
#pool-sidebar-hd{
  padding:10px 14px 8px;
  border-bottom:1px solid var(--bdr);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.psb-title{font-family:var(--mono);font-size:6px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3)}
.psb-count{font-family:var(--mono);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
#pool-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 8px 48px;
  scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent;
  display:flex;flex-direction:column;gap:5px;
}

/* POOL ROW CARD — compact sidebar format */
.pool-row{
  background:var(--bg);
  border:1px solid var(--bdr2);
  border-radius:3px;
  cursor:grab;
  user-select:none;
  transition:border-color .14s,box-shadow .14s,transform .1s;
  position:relative;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(26,24,22,.05);
}
.pool-row:hover{border-color:var(--bdr3);box-shadow:0 2px 10px rgba(26,24,22,.1);transform:translateX(2px)}
.pool-row.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--accl)}
.pool-row.dragging{cursor:grabbing;opacity:.45;transform:scale(.96)}
.pool-row.cited-partial{opacity:.7}
/* 3px colorbar top */
.pool-row-bar{height:3px;border-radius:3px 3px 0 0;flex-shrink:0}
.pool-row-body{padding:6px 9px 7px;display:flex;flex-direction:column;gap:3px}
.pool-row-top{display:flex;align-items:center;gap:6px}
.pool-row-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pool-row-name{
  flex:1;font-family:var(--mono);font-size:7px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  background:none;border:none;outline:none;caret-color:var(--acc);cursor:text;min-width:0;
}
.pool-row-name:focus{color:var(--ink)}
.pool-row-ly{
  font-family:var(--mono);font-size:5.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink3);padding:1px 4px;border:1px solid var(--bdr);border-radius:1px;flex-shrink:0;
  background:none;outline:none;cursor:pointer;
}
.pool-row-ly:focus{border-color:var(--acc)}
.pool-row-acts{display:flex;gap:1px;flex-shrink:0}
.pra{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:7px;padding:1px 3px;border-radius:1px;line-height:1;transition:all .1s}
.pra:hover{color:var(--ink);background:var(--bdr2)}
.pool-row-hl{
  font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:-.01em;
  color:var(--ink);line-height:1.05;
  background:none;border:none;outline:none;width:100%;
  caret-color:var(--acc);resize:none;overflow:hidden;min-height:15px;
}
.pool-row-hl::placeholder{color:var(--ink3);opacity:.4;font-weight:400}
.pool-row-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 9px 5px;border-top:1px solid var(--bdr);
}
.pool-row-cits{display:flex;gap:3px;flex-wrap:wrap}
.prc{font-family:var(--mono);font-size:5px;letter-spacing:.06em;text-transform:uppercase;padding:1px 4px;border-radius:1px;border:1px solid rgba(42,88,160,.2);color:rgba(42,88,160,.7);background:rgba(42,88,160,.04);cursor:pointer;transition:all .1s}
.prc:hover{border-color:var(--view);color:var(--view)}
.pool-row-pal{display:flex;gap:3px}
.prp{width:8px;height:8px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:all .1s;flex-shrink:0}
.prp.sel{border-color:var(--ink);transform:scale(1.2)}
/* drag handle on hover */
.pool-row-grip{
  position:absolute;right:4px;top:50%;transform:translateY(-50%);
  font-size:8px;color:var(--ink3);opacity:0;letter-spacing:1px;line-height:1;
  pointer-events:none;transition:opacity .1s;
}
.pool-row:hover .pool-row-grip{opacity:.4}

/* add room button at bottom of list */
#pool-add{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:rgba(245,242,236,.96);border-top:1px solid var(--bdr);
  cursor:pointer;transition:background .12s;
  backdrop-filter:blur(8px);
}
#pool-add:hover{background:var(--accl)}
#pool-add span:first-child{font-size:10px;color:var(--ink3)}
#pool-add span:last-child{font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3)}
#pool-add:hover span{color:var(--acc)}

/* resize handle between pool and canvas */
#pool-resize{
  position:absolute;right:-4px;top:0;bottom:0;width:8px;
  cursor:col-resize;z-index:200;
}
#pool-resize::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:2px;height:36px;border-radius:2px;background:var(--bdr2);transition:background .15s;
}
#pool-resize:hover::after,#pool-resize.dragging::after{background:var(--acc)}

/* ── MIDDLE: LANE CANVAS ── */
#lane-canvas{
  flex:1;min-width:0;
  position:relative;
  overflow:hidden;
  background:var(--bg);
}
/* dot grid */
#lane-canvas::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(26,24,22,.16) 1px,transparent 1px);
  background-size:var(--snap) var(--snap);
}
/* scrollable canvas wrap */
#canvas-wrap{
  position:absolute;inset:0;overflow:hidden;
}
#canvas-inner{
  position:absolute;top:0;left:0;
  transform-origin:0 0;will-change:transform;
  min-width:3000px;
}

/* ── LANE ── */
.lane{
  position:relative;
  display:flex;flex-direction:row;align-items:stretch;
  height:var(--lane-h);
  border-bottom:1px solid var(--bdr2);
  background:var(--bg);
  transition:background .15s;
}
.lane:first-child{border-top:1px solid var(--bdr2)}
.lane.snap-target{background:rgba(184,98,42,.04)}
.lane.snap-target .lane-hd{background:rgba(184,98,42,.06)}
/* lane number strip */
.lane-num{
  width:32px;flex-shrink:0;border-right:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  background:var(--bg2);
}
.lane-num-txt{font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:var(--ink3);writing-mode:vertical-rl;transform:rotate(180deg)}
/* lane header */
.lane-hd{
  width:180px;flex-shrink:0;
  display:flex;flex-direction:column;justify-content:center;
  padding:12px 14px;
  border-right:1px solid var(--bdr2);
  background:var(--bg2);
  transition:background .15s;
}
.lane-view-name{
  font-family:var(--cond);font-weight:700;font-size:13px;letter-spacing:.03em;text-transform:uppercase;
  color:var(--ink);margin-bottom:2px;
  background:none;border:none;outline:none;caret-color:var(--acc);width:100%;
}
.lane-view-slug{font-family:var(--mono);font-size:6.5px;letter-spacing:.1em;color:var(--view);background:none;border:none;outline:none;caret-color:var(--view);width:100%}
.lane-meta{display:flex;align-items:center;gap:6px;margin-top:7px}
.lane-count{font-family:var(--mono);font-size:6px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
.lane-preview-btn{background:none;border:1px solid rgba(42,88,160,.22);border-radius:1px;font-family:var(--mono);font-size:5.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(42,88,160,.6);padding:2px 6px;cursor:pointer;transition:all .12s}
.lane-preview-btn:hover{border-color:var(--view);color:var(--view);background:var(--viewl)}
.lane-del-btn{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:8px;padding:2px;transition:color .1s;margin-left:auto}
.lane-del-btn:hover{color:rgba(160,40,40,.8)}
/* lane slots area */
.lane-slots{
  flex:1;display:flex;align-items:center;
  padding:0 14px;gap:0;overflow:visible;
  position:relative;
}
/* connector */
.slot-conn{
  width:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;
}
.slot-conn::before{content:'';display:block;height:1px;width:100%;background:var(--bdr2)}
.slot-conn::after{content:'›';position:absolute;right:-1px;font-size:9px;color:var(--ink3);line-height:1}
/* drop zone */
.lane-drop-zone{
  width:48px;min-height:96px;border:1.5px dashed var(--bdr2);border-radius:3px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;transition:all .15s;
}
.lane-drop-zone.active{border-color:rgba(184,98,42,.5);background:rgba(184,98,42,.04);box-shadow:0 0 0 1px rgba(184,98,42,.15)}
.ldz-ico{font-size:10px;color:var(--bdr3);transition:color .15s}
.lane-drop-zone.active .ldz-ico{color:var(--acc)}

/* ── SLOT CARD ── */
.slot-card{
  width:var(--slot-w);height:var(--slot-h);flex-shrink:0;
  background:var(--bg);border:1px solid var(--bdr2);border-radius:3px;
  display:flex;flex-direction:column;cursor:pointer;
  transition:border-color .14s,box-shadow .14s;user-select:none;position:relative;
  box-shadow:0 1px 4px rgba(26,24,22,.06);
  overflow:hidden;
}
.slot-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.slot-card:hover{border-color:var(--bdr3);box-shadow:0 3px 14px rgba(26,24,22,.12)}
.slot-card.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--accl)}
.slot-card.has-ov{border-color:rgba(184,98,42,.3)}
.slot-card.has-ov::after{content:'∗';position:absolute;top:4px;right:22px;font-size:8px;color:var(--acc);line-height:1}
.slot-card-hd{display:flex;align-items:center;gap:4px;padding:5px 6px 4px;border-bottom:1px solid var(--bdr);background:var(--bg2);flex-shrink:0;margin-top:3px}
.slot-ttl{flex:1;font-family:var(--mono);font-size:6px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-ly{font-family:var(--mono);font-size:5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:1px 3px;border:1px solid var(--bdr);border-radius:1px;flex-shrink:0}
.slot-rm{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:8px;padding:0 2px;transition:color .1s;flex-shrink:0;line-height:1}
.slot-rm:hover{color:rgba(160,40,40,.8)}
.slot-diag{flex:1;padding:5px 7px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.slot-hl{font-family:var(--cond);font-weight:700;font-size:10px;letter-spacing:-.01em;color:var(--ink);line-height:1.1;margin-bottom:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.slot-bd{font-family:var(--mono);font-size:5.5px;line-height:1.5;color:var(--ink3);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.slot-pos{position:absolute;top:-9px;left:6px;font-family:var(--mono);font-size:5px;letter-spacing:.1em;color:var(--ink3);background:var(--bg);padding:0 3px}

/* sequence progress strip at bottom of lane */
.lane-seq-strip{
  position:absolute;bottom:0;left:212px;right:0;height:3px;
  display:flex;gap:1px;padding:0 14px;pointer-events:none;
}
.lane-seq-pip{flex:1;height:100%;border-radius:1px;background:var(--bdr2);max-width:24px;transition:background .2s}
.lane-seq-pip.filled{background:var(--acc);opacity:.5}

/* add lane button */
#lane-add-btn{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px 12px 60px;
  cursor:pointer;border-bottom:1px dashed var(--bdr2);
  transition:background .12s;
  background:var(--bg);
}
#lane-add-btn:hover{background:var(--accl)}
.lab-ico{font-size:10px;color:var(--ink3)}
.lab-lbl{font-family:var(--mono);font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
#lane-add-btn:hover .lab-ico,#lane-add-btn:hover .lab-lbl{color:var(--acc)}

/* zoom HUD bottom-center of lane canvas */
#zhud{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;
  background:rgba(245,242,236,.96);border:1px solid var(--bdr2);border-radius:2px;
  box-shadow:0 2px 12px rgba(26,24,22,.1);z-index:200;
  backdrop-filter:blur(16px);
}
.zhb{background:none;border:none;cursor:pointer;color:var(--ink3);padding:5px 9px;font-size:11px;transition:all .1s}
.zhb:hover{color:var(--ink);background:var(--accd)}
#zpct{font-family:var(--mono);font-size:6.5px;color:var(--ink3);padding:0 8px;border-left:1px solid var(--bdr2);border-right:1px solid var(--bdr2);min-width:36px;text-align:center}

/* ── RIGHT: PREVIEW PANEL ── */
#prev-panel{
  width:var(--prev-w);flex-shrink:0;
  background:var(--bg);border-left:1px solid var(--bdr2);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .25s cubic-bezier(.22,1,.36,1);
  position:relative;z-index:100;
}
#prev-panel.collapsed{width:0;border-left:none}
#prev-panel-hd{
  padding:0 12px;height:var(--tb);border-bottom:1px solid var(--bdr2);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  background:var(--bg2);
}
#prev-panel-title{font-family:var(--mono);font-size:6px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);flex:1;display:flex;align-items:center;gap:6px}
.pp-live-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);animation:pwpulse 2.4s ease-in-out infinite}
@keyframes pwpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.55)}}
#prev-panel-view-sel{
  background:none;border:1px solid var(--bdr);color:var(--ink2);
  font-family:var(--mono);font-size:6.5px;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 6px;border-radius:2px;cursor:pointer;outline:none;max-width:120px;
}
#prev-panel-view-sel:focus{border-color:var(--acc)}
.pp-close{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:11px;padding:2px 4px;transition:color .1s}
.pp-close:hover{color:var(--ink)}
#prev-panel-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px 14px;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
#pp-empty{padding:24px 12px;text-align:center;font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase;line-height:1.8}
#pp-schematic{display:flex;flex-direction:column;gap:4px}
.pw-room{position:relative;border-radius:2px;overflow:hidden;border:1px solid var(--bdr2);background:var(--bg2);cursor:pointer;transition:border-color .14s,transform .14s;animation:pwRoomIn .22s cubic-bezier(.22,1,.36,1) both}
@keyframes pwRoomIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.pw-room:hover{border-color:rgba(184,98,42,.4);transform:translateX(2px)}
.pw-room.pw-active-room{border-color:var(--acc)}
.pw-room-pal{position:absolute;left:0;top:0;bottom:0;width:3px}
.pw-room-diagram{display:flex;align-items:stretch;padding:6px 8px 6px 14px;gap:6px;min-height:42px}
.pw-room-meta{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 5px 14px;border-top:1px solid var(--bdr);background:var(--bg3)}
.pw-room-name{font-family:var(--mono);font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2)}
.pw-room-layout{font-family:var(--mono);font-size:6px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);opacity:.7}
.pw-room-pal-tag{font-family:var(--mono);font-size:5.5px;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;border-radius:10px;border:1px solid var(--bdr2);color:var(--ink3)}
.pw-connector{display:flex;align-items:center;justify-content:center;gap:6px;padding:1px 0}
.pw-conn-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--bdr2),transparent)}
.pw-conn-arrow{color:var(--ink3);font-size:8px;opacity:.4}
#pp-footer{border-top:1px solid var(--bdr);padding:8px 10px;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
#pp-footer-summary{font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);flex:1}
#pp-footer-summary strong{color:var(--acc)}
#pp-render-btn{background:var(--acc);border:none;border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:#fff;padding:5px 10px;cursor:pointer;flex-shrink:0;transition:opacity .12s}
#pp-render-btn:hover{opacity:.85}

/* ── DRAG GHOST ── */
#drag-ghost{
  position:fixed;z-index:9999;pointer-events:none;
  background:rgba(184,98,42,.1);border:1px solid rgba(184,98,42,.4);
  border-radius:3px;padding:5px 10px;
  font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--acc);white-space:nowrap;opacity:0;transition:opacity .1s;
}
#drag-ghost.show{opacity:1}

/* ── INSPECTOR ── */
#insp{
  position:fixed;top:var(--tb);right:0;bottom:0;width:272px;
  background:var(--bg);border-left:1px solid var(--bdr2);
  display:flex;flex-direction:column;z-index:7000;
  transform:translateX(100%);
  transition:transform .22s cubic-bezier(.22,1,.36,1);
  box-shadow:-4px 0 24px rgba(26,24,22,.08);
}
#insp.open{transform:none}
#insp-hd{display:flex;align-items:center;gap:7px;padding:0 12px;height:36px;border-bottom:1px solid var(--bdr2);flex-shrink:0;background:var(--bg2)}
#insp-ttl{font-family:var(--mono);font-size:6.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);flex:1}
#insp-close{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:12px;padding:2px 5px;transition:color .1s}
#insp-close:hover{color:var(--ink)}
#insp-body{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
.ins-sec{margin-bottom:14px}
.ins-sec-t{font-family:var(--mono);font-size:6px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--bdr)}
.ins-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--bdr)}
.ins-row:last-child{border-bottom:none}
.ins-row.top{align-items:flex-start}
.ins-lbl{font-family:var(--mono);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);width:54px;flex-shrink:0}
.ins-in{background:none;border:none;outline:none;font-family:var(--mono);font-size:7.5px;color:var(--ink2);flex:1;caret-color:var(--acc)}
.ins-in:focus{color:var(--ink)}
.ins-ta{background:none;border:none;outline:none;font-family:var(--mono);font-size:7.5px;color:var(--ink2);flex:1;caret-color:var(--acc);resize:none;line-height:1.5;min-height:44px}
.ins-ta:focus{color:var(--ink)}
.ins-sel{background:var(--bg2);border:1px solid var(--bdr2);color:var(--ink2);font-family:var(--mono);font-size:6.5px;padding:2px 5px;border-radius:2px;cursor:pointer;outline:none;flex:1}
.ins-sel:focus{border-color:var(--acc)}
.pal-row{display:flex;gap:4px;flex-wrap:wrap}
.pal-sw{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s;flex-shrink:0}
.pal-sw.sel{border-color:var(--ink);transform:scale(1.15)}
.ins-action{display:block;width:100%;background:var(--acc);border:none;border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:#fff;padding:9px;cursor:pointer;margin-top:8px;transition:filter .12s}
.ins-action:hover{filter:brightness(1.1)}
.ins-esc{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px;border-top:1px solid var(--bdr);font-family:var(--mono);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);cursor:pointer;transition:color .1s;flex-shrink:0}
.ins-esc:hover{color:var(--ink2)}
.ins-esc kbd{background:var(--bg2);border:1px solid var(--bdr2);border-bottom-width:2px;border-radius:2px;font-family:var(--mono);font-size:7px;color:var(--ink3);padding:1px 5px}
.ov-wrap{background:var(--bg2);border:1px solid rgba(184,98,42,.2);border-radius:2px;padding:8px 10px;margin-top:6px}
.ov-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--bdr)}
.ov-row:last-child{border-bottom:none}
.ov-lbl{font-family:var(--mono);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:rgba(184,98,42,.7);width:54px;flex-shrink:0}
.ov-in{background:none;border:none;outline:none;font-family:var(--mono);font-size:7.5px;color:var(--ink2);flex:1;caret-color:var(--acc)}
.ov-in:focus{color:var(--ink)}
.ov-clear{background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(160,40,40,.5);padding:4px 0;transition:color .1s}
.ov-clear:hover{color:rgba(160,40,40,.9)}
.div-suggest{background:var(--accl);border:1px solid rgba(184,98,42,.2);border-radius:2px;padding:8px 10px;margin-top:8px}
.div-t{font-family:var(--mono);font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);margin-bottom:2px}
.div-d{font-family:var(--mono);font-size:6px;color:var(--ink2);margin-bottom:7px;line-height:1.5}
.div-btn{background:none;border:1px solid rgba(184,98,42,.4);border-radius:2px;font-family:var(--mono);font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);padding:5px 10px;cursor:pointer;transition:all .12s}
.div-btn:hover{background:var(--acc);color:#fff}

/* ── CONTEXT MENU ── */
#ctx-menu{
  position:fixed;z-index:9800;
  background:rgba(245,242,236,.98);
  border:1px solid var(--bdr2);border-radius:4px;
  box-shadow:0 8px 40px rgba(26,24,22,.18),0 2px 8px rgba(26,24,22,.1);
  backdrop-filter:blur(20px);
  padding:4px;min-width:190px;
  opacity:0;pointer-events:none;
  transform:scale(.95);transform-origin:top left;
  transition:opacity .12s cubic-bezier(.22,1,.36,1),transform .12s cubic-bezier(.22,1,.36,1);
}
#ctx-menu.open{opacity:1;pointer-events:all;transform:none}
.ctx-item{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;padding:7px 9px;border-radius:2px;cursor:pointer;transition:background .08s;text-align:left}
.ctx-item:hover{background:var(--accd)}
.ctx-item.danger:hover{background:rgba(160,40,40,.06)}
.ctx-ico{width:18px;height:18px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;color:var(--ink3);background:var(--bg3)}
.ctx-ico.acc{background:var(--accl);color:var(--acc)}
.ctx-ico.view{background:rgba(42,88,160,.08);color:var(--view)}
.ctx-ico.danger{background:rgba(160,40,40,.06);color:rgba(160,40,40,.7)}
.ctx-txt{display:flex;flex-direction:column;gap:1px;flex:1}
.ctx-name{font-family:var(--mono);font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
.ctx-desc{font-family:var(--mono);font-size:5.5px;color:var(--ink3);line-height:1.4}
.ctx-item.danger .ctx-name{color:rgba(160,40,40,.8)}
.ctx-kbd{font-family:var(--mono);font-size:6px;color:var(--ink3);background:var(--bg3);border:1px solid var(--bdr2);border-radius:2px;padding:1px 5px;flex-shrink:0}
.ctx-sep{height:1px;background:var(--bdr);margin:3px 4px}
.ctx-header{padding:5px 9px 3px;font-family:var(--mono);font-size:5.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3)}

/* ── COMPOSE STUDIO ── */
#compose-studio{position:fixed;inset:0;z-index:9600;background:rgba(26,24,22,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s cubic-bezier(.22,1,.36,1)}
#compose-studio.open{opacity:1;pointer-events:all}
#compose-inner{background:var(--bg);border:1px solid var(--bdr2);border-radius:6px;box-shadow:0 24px 80px rgba(26,24,22,.24);width:min(680px,96vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;transform:translateY(10px);transition:transform .22s cubic-bezier(.22,1,.36,1)}
#compose-studio.open #compose-inner{transform:none}
#compose-hd{display:flex;align-items:center;gap:8px;padding:0 16px;height:42px;border-bottom:1px solid var(--bdr2);background:var(--bg2);flex-shrink:0}
#compose-ttl{font-family:var(--mono);font-size:6.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);flex:1}
#compose-rm-name{font-family:var(--cond);font-weight:700;font-size:14px;color:var(--ink);letter-spacing:.02em}
.compose-close{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:13px;padding:2px 5px;transition:color .1s}
.compose-close:hover{color:var(--ink)}
#compose-body{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cs-col{display:flex;flex-direction:column;gap:10px}
.cs-sec{background:var(--bg2);border:1px solid var(--bdr);border-radius:3px;padding:12px 13px}
.cs-sec-t{font-family:var(--mono);font-size:6px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
.cs-row{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid var(--bdr)}
.cs-row:last-child{border-bottom:none}
.cs-row.top{align-items:flex-start}
.cs-lbl{font-family:var(--mono);font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);width:52px;flex-shrink:0}
.cs-in{background:none;border:none;outline:none;font-family:var(--mono);font-size:8px;color:var(--ink2);flex:1;caret-color:var(--acc)}
.cs-in:focus{color:var(--ink)}
.cs-ta{background:none;border:none;outline:none;font-family:var(--mono);font-size:8px;color:var(--ink2);flex:1;caret-color:var(--acc);resize:none;line-height:1.55;min-height:56px}
.cs-ta:focus{color:var(--ink)}
.cs-sel{background:var(--bg3);border:1px solid var(--bdr2);color:var(--ink2);font-family:var(--mono);font-size:7px;padding:3px 6px;border-radius:2px;cursor:pointer;outline:none;flex:1}
.cs-sel:focus{border-color:var(--acc)}
.cs-pal-row{display:flex;gap:5px;flex-wrap:wrap;padding-top:3px}
.cs-pal-sw{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.cs-pal-sw.sel{border-color:var(--ink);transform:scale(1.2)}
#compose-ft{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--bdr2);background:var(--bg2);flex-shrink:0}
.cs-save{background:var(--acc);border:none;border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:#fff;padding:7px 16px;cursor:pointer;transition:filter .12s}
.cs-save:hover{filter:brightness(1.1)}
.cs-preview-btn{background:none;border:1px solid var(--bdr2);border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:7px 12px;cursor:pointer;transition:all .12s;margin-left:auto}
.cs-preview-btn:hover{border-color:var(--bdr3);color:var(--ink2)}
.cs-hint{font-family:var(--mono);font-size:6px;color:var(--ink3);letter-spacing:.06em}


/* ── TOAST ── */
#tst{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:rgba(245,242,236,.9);font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border-radius:2px;z-index:9999;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .18s,transform .18s;box-shadow:0 4px 20px rgba(26,24,22,.2);display:flex;align-items:center;gap:8px}
#tst.show{opacity:1;transform:translateX(-50%) translateY(0)}
#tst-msg button{pointer-events:all}

/* ── CREATE MENU ── */
#create-menu{
  position:fixed;z-index:9500;
  background:rgba(245,242,236,.98);border:1px solid var(--bdr2);border-radius:4px;
  box-shadow:0 8px 40px rgba(26,24,22,.16);backdrop-filter:blur(20px);
  padding:6px;min-width:210px;
  opacity:0;pointer-events:none;
  transform:translateY(4px) scale(.97);transform-origin:top right;
  transition:opacity .15s cubic-bezier(.22,1,.36,1),transform .15s cubic-bezier(.22,1,.36,1);
}
#create-menu.open{opacity:1;pointer-events:all;transform:none}
.cm-sec{font-family:var(--mono);font-size:5.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);padding:5px 8px 3px}
.cm-item{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;padding:7px 8px;border-radius:2px;cursor:pointer;transition:background .1s;text-align:left}
.cm-item:hover{background:var(--accd)}
.cm-ico{width:24px;height:24px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.cm-txt{display:flex;flex-direction:column;gap:2px}
.cm-name{font-family:var(--mono);font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
.cm-desc{font-family:var(--mono);font-size:6px;color:var(--ink3);line-height:1.4}
.cm-kbd{margin-left:auto;font-family:var(--mono);font-size:6px;color:var(--ink3);background:var(--bg3);border:1px solid var(--bdr2);border-radius:2px;padding:1px 5px;flex-shrink:0}

/* ── RENDER ENGINE ── */
#rndr{position:fixed;inset:0;z-index:9800;background:#060508;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(237,234,228,.06) transparent;opacity:0;pointer-events:none;transition:opacity .36s cubic-bezier(.22,1,.36,1)}
#rndr.open{opacity:1;pointer-events:all}
#sbar{position:fixed;top:0;left:0;right:0;height:44px;z-index:9900;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(6,5,8,0);border-bottom:1px solid rgba(237,234,228,0);opacity:0;transition:opacity .4s,background .4s,border-color .4s}
#rndr.open #sbar{opacity:1}
#sbar.scrolled{background:rgba(6,5,8,.94);border-bottom-color:rgba(237,234,228,.06);backdrop-filter:blur(24px)}
.sb-brand{display:flex;align-items:center;gap:9px}
.sb-dia{color:#c87a50;font-size:10px}
.sb-nm{font-family:var(--cond);font-weight:700;font-size:16px;letter-spacing:.04em;text-transform:uppercase;color:#edeae4}
#sb-nav{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:6.5px;letter-spacing:.18em;text-transform:uppercase;color:#2e2c30;max-width:55%;overflow:hidden}
.sbn{cursor:pointer;transition:color .15s}.sbn:hover{color:#c87a50}.sbn-sep{opacity:.25}
.sb-acts{display:flex;align-items:center;gap:5px}
.sbbtn{background:none;border:1px solid rgba(237,234,228,.1);border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:#6a6560;padding:5px 9px;cursor:pointer;transition:all .15s}
.sbbtn:hover{color:#edeae4;background:rgba(200,122,80,.08)}
.sbbtn.ac{border-color:#c87a50;color:#c87a50}
.sbbtn.ac:hover{background:#c87a50;color:#060508}
#rprog{position:fixed;top:0;left:0;height:1px;width:0%;background:#c87a50;z-index:9950;pointer-events:none;transition:width .2s}
#rr{display:block}
#chw{position:fixed;bottom:24px;left:24px;z-index:9850;display:none}
.chw-t{background:rgba(6,5,8,.88);border:1px solid rgba(237,234,228,.08);border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:#6a6560;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;backdrop-filter:blur(20px)}
.chw-t:hover{border-color:rgba(237,234,228,.18);color:#edeae4}
.chw-cur{color:#c87a50}
.chw-dd{position:absolute;bottom:calc(100% + 8px);left:0;background:rgba(6,5,8,.96);border:1px solid rgba(237,234,228,.08);border-radius:2px;padding:4px;min-width:190px;backdrop-filter:blur(24px);opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .18s,transform .18s}
.chw-dd.open{opacity:1;pointer-events:all;transform:none}
.chw-it{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:7.5px;letter-spacing:.08em;color:#6a6560;padding:7px 10px;border-radius:2px;text-align:left;text-transform:uppercase;transition:all .12s}
.chw-it:hover{background:rgba(200,122,80,.08);color:#edeae4}
.chw-it.act{color:#c87a50}
.chw-num{color:#2e2c30;width:18px;flex-shrink:0;font-size:6.5px}

/* render room CSS */
.render-scope{--bg:#060508;--bg2:#0a0810;--bg3:#0f0d14;--ink:#edeae4;--ink2:#6a6560;--ink3:#2e2c30;--acc:#c87a50;--accl:rgba(200,122,80,.08);--bdr:rgba(237,234,228,.04);--bdr2:rgba(237,234,228,.08)}
.room{position:relative;min-height:100dvh;display:flex;flex-direction:column;padding-top:44px;overflow:hidden;background:var(--bg,#060508)}
.rm-bg{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.rm-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 35%;opacity:0;transform:scale(1.08);transition:opacity 2.4s ease,transform 12s ease;will-change:transform}
.rm-bg img.on{opacity:1;transform:scale(1.04)}
.rm-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,var(--bg,#060508) 0%,rgba(6,5,8,.9) 32%,rgba(6,5,8,.5) 62%,rgba(6,5,8,.12) 100%),linear-gradient(to bottom,var(--bg,#060508) 0%,transparent 18%,transparent 78%,var(--bg,#060508) 100%)}
.rm-in{position:relative;z-index:2}
.room[data-p="amber"]{--bg:#080600;--ink:#f4eed8;--ink2:#9a7840;--acc:#d4a030}
.room[data-p="forest"]{--bg:#040806;--ink:#dceade;--ink2:#4a6e50;--acc:#78a868}
.room[data-p="midnight"]{--bg:#020410;--ink:#ccd8f0;--ink2:#4060a8;--acc:#5888be}
.room[data-p="linen"]{--bg:#f0ede6;--bg2:#e6e2da;--ink:#1a1816;--ink2:#484440;--ink3:#8a8680;--acc:#a84e28;--bdr:rgba(26,24,22,.06);--bdr2:rgba(26,24,22,.12)}
.room[data-p="red"]{--bg:#0a0204;--ink:#f0d0d0;--ink2:#904040;--acc:#d42828}
.room[data-l="full"]{justify-content:flex-end;align-items:flex-start}
.room[data-l="full"] .rm-bg::after{background:linear-gradient(to right,var(--bg,#060508) 0%,rgba(6,5,8,.85) 28%,rgba(6,5,8,.3) 70%,transparent 100%),linear-gradient(to bottom,transparent 0%,transparent 60%,rgba(6,5,8,.7) 82%,var(--bg,#060508) 100%)}
.room[data-l="full"] .rm-in{padding:clamp(60px,10vh,100px) clamp(40px,7vw,100px);max-width:820px;width:100%}
.room[data-l="split"]{justify-content:center;align-items:stretch}
.room[data-l="split"] .rm-in{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100dvh - 44px)}
.col-txt{padding:clamp(60px,10vh,100px) clamp(40px,6vw,80px);display:flex;flex-direction:column;justify-content:flex-end;background:var(--bg,#060508)}
.col-med{position:relative;overflow:hidden;background:var(--bg2,#0a0810)}
.col-med img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.75;transform:scale(1.06)}
.col-med::before{content:'';position:absolute;inset:0;z-index:1;background:linear-gradient(to right,var(--bg,#060508) 0%,rgba(6,5,8,.4) 12%,transparent 32%),linear-gradient(to bottom,var(--bg,#060508) 0%,transparent 16%,transparent 84%,var(--bg,#060508) 100%)}
.room[data-l="hero"]{justify-content:center;align-items:center}
.room[data-l="hero"] .rm-in{display:grid;grid-template-columns:1fr 380px;gap:clamp(48px,7vw,100px);padding:clamp(48px,9vh,88px) clamp(40px,6vw,80px);max-width:1080px;margin:0 auto;width:100%;align-items:center}
.feat-img{position:relative;overflow:hidden;background:var(--bg2,#0a0810);aspect-ratio:2/3}
.feat-img img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.06)}
.feat-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 60%,var(--bg,#060508) 100%)}
.room[data-l="immersive"]{min-height:auto}
.room[data-l="immersive"] .rm-in{position:relative;z-index:2;width:100%}
.room[data-l="immersive"] .rm-bg::after{background:linear-gradient(112deg,var(--bg,#060508) 0%,rgba(6,5,8,.82) 42%,transparent 100%),linear-gradient(to bottom,var(--bg,#060508) 0%,rgba(6,5,8,.2) 14%,transparent 28%,transparent 72%,var(--bg,#060508) 100%)}
.lb-scene{position:sticky;top:44px;height:calc(100dvh - 44px);display:flex;align-items:flex-end;overflow:hidden}
.lb-txt{max-width:580px;position:relative;z-index:2;padding:0 clamp(40px,7vw,100px) clamp(60px,10vh,100px)}
.room[data-l="specs"]{justify-content:center;background:var(--bg,#060508)}
.room[data-l="specs"] .rm-in{padding:clamp(60px,10vh,100px) clamp(40px,7vw,100px);max-width:860px;margin:0 auto;width:100%}
.room[data-l="essay"]{justify-content:center;align-items:flex-start}
.room[data-l="essay"] .rm-bg::after{background:linear-gradient(to right,var(--bg,#060508) 0%,var(--bg,#060508) 52%,rgba(6,5,8,.7) 68%,rgba(6,5,8,.1) 100%),linear-gradient(to bottom,var(--bg,#060508) 0%,transparent 16%,transparent 82%,var(--bg,#060508) 100%)}
.room[data-l="essay"] .rm-in{padding:clamp(60px,10vh,100px) clamp(40px,7vw,100px);max-width:660px;margin-left:clamp(48px,12vw,180px)}
.room[data-l="cta"]{justify-content:center;align-items:center;text-align:center}
.room[data-l="cta"] .rm-bg::after{background:radial-gradient(ellipse 55% 55% at 50% 50%,rgba(6,5,8,.05) 0%,rgba(6,5,8,.7) 60%,var(--bg,#060508) 100%)}
.room[data-l="cta"] .rm-in{padding:clamp(80px,13vh,140px) clamp(40px,7vw,100px);max-width:640px}
.s{display:block;opacity:0;transform:translateY(14px);transition:opacity .7s ease,transform .7s cubic-bezier(.16,1,.36,1)}
.s.rev{opacity:1;transform:none}
.s.lbl{font-family:var(--mono);font-size:6.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink3,#2e2c30);padding-bottom:clamp(20px,3vh,36px);display:flex;align-items:center;gap:12px;opacity:0}
.s.lbl::before{content:'';flex:0 0 24px;height:1px;background:var(--acc,#c87a50);opacity:.4}
.s.lbl.rev{opacity:1}
.s.pst{font-family:var(--cond);font-weight:900;font-size:clamp(64px,10vw,136px);line-height:.85;letter-spacing:-.03em;text-transform:uppercase;color:var(--ink,#edeae4);margin-bottom:clamp(24px,4vh,48px)}
.s.pst .ac{color:var(--acc,#c87a50)}
.s.bdy{font-family:var(--mono);font-size:11px;line-height:1.9;color:var(--ink2,#6a6560);margin-bottom:18px;max-width:52ch}
.s.pul{font-family:var(--cond);font-weight:300;font-style:italic;font-size:clamp(18px,2.4vw,28px);line-height:1.35;color:var(--ink,#edeae4);border-left:1px solid var(--acc,#c87a50);padding:8px 0 8px 22px;margin:clamp(18px,3vh,36px) 0;max-width:48ch}
.s.spc{display:flex;align-items:baseline;font-family:var(--mono);font-size:10px;border-bottom:1px solid var(--bdr,rgba(237,234,228,.04));padding:10px 0;transition:background .12s}
.s.spc:hover{background:var(--accl,rgba(200,122,80,.08))}
.sk{font-size:6.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3,#2e2c30);min-width:140px;flex-shrink:0}
.ss{color:var(--ink3,#2e2c30);margin:0 10px;opacity:.2}
.sv{color:var(--ink2,#6a6560)}
.s.brk{display:flex;align-items:center;gap:16px;padding:clamp(28px,5vh,56px) 0}
.s.brk::before,.s.brk::after{content:'';flex:1;height:1px;background:var(--bdr,rgba(237,234,228,.04))}
.bd{color:var(--ink3,#2e2c30);font-size:7px;letter-spacing:.14em}
.btn-atc{display:inline-block;background:none;border:1px solid var(--acc,#c87a50);font-family:var(--mono);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--acc,#c87a50);padding:14px 28px;cursor:pointer;transition:background .2s,color .2s;width:auto}
.btn-atc:hover{background:var(--acc,#c87a50);color:var(--bg,#060508)}
@media(max-width:900px){
  .room[data-l="split"] .rm-in{grid-template-columns:1fr}.col-med{display:none}
  .room[data-l="hero"] .rm-in{grid-template-columns:1fr;max-width:520px}
  .room[data-l="essay"] .rm-in{margin-left:0}
}
</style>
</head>
<body>
<div id="cur"></div>

<!-- TOPBAR -->
<div id="tb">
  <div class="tb-logo">
    <span class="tb-dia">◆</span>
    <span class="tb-name">arc</span>
  </div>
  <input id="tb-proj" type="text" value="untitled-project" placeholder="project name" spellcheck="false">
  <div class="tb-r">
    <button class="tbtn" id="btn-create">+ New ▾</button>
    <div class="tb-sep"></div>
    <button class="tbtn" id="btn-prev-panel">⊞ Schematic</button>
    <div class="tb-sep"></div>
    <button class="tbtn ac" id="btn-prev">Render ↗</button>
  </div>
</div>

<!-- CREATE MENU -->
<div id="create-menu">
  <div class="cm-sec">Create</div>
  <button class="cm-item" data-create="room">
    <div class="cm-ico" style="background:var(--bg3);color:var(--ink2)">⬡</div>
    <div class="cm-txt"><span class="cm-name">Room</span><span class="cm-desc">Sovereign unit of experience</span></div>
    <span class="cm-kbd">R</span>
  </button>
  <button class="cm-item" data-create="view">
    <div class="cm-ico" style="background:rgba(42,88,160,.1);color:var(--view)">⊞</div>
    <div class="cm-txt"><span class="cm-name">View</span><span class="cm-desc">Page lane — sequence of rooms</span></div>
    <span class="cm-kbd">V</span>
  </button>
</div>

<!-- DRAG GHOST -->
<div id="drag-ghost"><span id="dg-dot" style="display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:6px;vertical-align:middle"></span><span id="dg-lbl">drop to cite</span></div>

<!-- THREE-COLUMN LAYOUT -->
<div id="layout">

  <!-- LEFT: POOL SIDEBAR -->
  <div id="pool-sidebar">
    <div id="pool-sidebar-hd">
      <span class="psb-title">Room Pool</span>
      <span class="psb-count" id="pool-count">0 rooms</span>
      <button id="psb-collapse-btn" title="Collapse sidebar">‹</button>
    </div>
    <div class="psb-rail-icon">
      <div class="psb-rail-pip"></div>
      <div class="psb-rail-pip"></div>
      <div class="psb-rail-pip"></div>
    </div>
    <div id="pool-list"></div>
    <div id="pool-add">
      <span>⊕</span>
      <span>Add room</span>
    </div>
    <div id="pool-resize"></div>
  </div>

  <!-- MIDDLE: LANE CANVAS -->
  <div id="lane-canvas">
    <div id="canvas-wrap">
      <div id="canvas-inner">
        <!-- lanes injected by JS -->
        <div id="lane-add-btn">
          <span class="lab-ico">⊞</span>
          <span class="lab-lbl">Add view lane</span>
        </div>
      </div>
    </div>
    <!-- zoom HUD -->
    <div id="zhud">
      <button class="zhb" id="btn-zo">−</button>
      <span id="zpct">100%</span>
      <button class="zhb" id="btn-zi">+</button>
      <button class="zhb" id="btn-fit" style="font-size:7.5px;letter-spacing:.06em;font-family:var(--mono)">fit</button>
    </div>
  </div>

  <!-- RIGHT: PREVIEW PANEL -->
  <div id="prev-panel">
    <div id="prev-panel-hd">
      <div id="prev-panel-title">
        <span class="pp-live-dot"></span>
        Schematic
      </div>
      <select id="prev-panel-view-sel"></select>
      <button class="pp-close" onclick="togglePrevPanel()">×</button>
    </div>
    <div id="prev-panel-body">
      <div id="pp-empty">Add rooms to a lane to see the schematic here.</div>
      <div id="pp-schematic"></div>
    </div>
    <div id="pp-footer" style="display:none">
      <div id="pp-footer-summary">–</div>
      <button id="pp-render-btn">Render ↗</button>
    </div>
  </div>

</div>

<!-- INSPECTOR -->
<div id="insp">
  <div id="insp-hd">
    <span id="insp-ttl">Room</span>
    <button id="insp-close">×</button>
  </div>
  <div id="insp-body"></div>
  <div class="ins-esc" id="insp-esc-hint"><kbd>Esc</kbd> to close</div>
</div>

<!-- TOAST -->
<div id="tst"><span id="tst-msg"></span></div>

<!-- RENDER ENGINE -->
<div id="rndr">
  <div id="sbar">
    <div class="sb-brand"><span class="sb-dia">◆</span><span class="sb-nm" id="sb-nm">arc</span></div>
    <div id="sb-nav"></div>
    <div class="sb-acts"><button class="sbbtn ac" id="btn-rclose">← Back</button></div>
  </div>
  <div id="rr" class="render-scope"></div>
  <div id="chw">
    <div id="chw-dd"></div>
    <button class="chw-t" id="chw-btn">
      <span style="font-family:var(--mono);font-size:6px;letter-spacing:.14em;text-transform:uppercase">§</span>
      <span class="chw-cur" id="chw-cur">—</span>
    </button>
  </div>
  <div id="rprog"></div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-header" id="ctx-header">Room</div>
  <div class="ctx-sep"></div>
  <button class="ctx-item" id="ctx-edit">
    <span class="ctx-ico acc">✎</span>
    <span class="ctx-txt"><span class="ctx-name">Edit</span><span class="ctx-desc">Open compose studio</span></span>
    <span class="ctx-kbd">E</span>
  </button>
  <button class="ctx-item" id="ctx-preview">
    <span class="ctx-ico view">↗</span>
    <span class="ctx-txt"><span class="ctx-name">Preview</span><span class="ctx-desc">Render this view</span></span>
    <span class="ctx-kbd">P</span>
  </button>
  <button class="ctx-item" id="ctx-duplicate">
    <span class="ctx-ico">⊕</span>
    <span class="ctx-txt"><span class="ctx-name">Duplicate room</span><span class="ctx-desc">Copy as new sovereign room</span></span>
  </button>
  <div class="ctx-sep"></div>
  <button class="ctx-item danger" id="ctx-remove">
    <span class="ctx-ico danger">×</span>
    <span class="ctx-txt"><span class="ctx-name">Remove</span><span class="ctx-desc">Remove from this view</span></span>
  </button>
</div>

<!-- COMPOSE STUDIO -->
<div id="compose-studio">
  <div id="compose-inner">
    <div id="compose-hd">
      <span id="compose-ttl">Edit · Room</span>
      <span id="compose-rm-name"></span>
      <button class="compose-close" id="compose-close">×</button>
    </div>
    <div id="compose-body">
      <div class="cs-col" id="cs-col-left"></div>
      <div class="cs-col" id="cs-col-right"></div>
    </div>
    <div id="compose-ft">
      <span class="cs-hint">Changes save immediately</span>
      <button class="cs-preview-btn" id="cs-preview-btn">Preview ↗</button>
      <button class="cs-save" id="cs-save">Done</button>
    </div>
  </div>
</div>

<script>
(function(){'use strict';

/* ── CONSTANTS ── */
var LANE_H=164, LANE_HDR_W=212, SLOT_W=168, SLOT_H=116, SNAP=20, COL_STEP=200;
var LAYOUTS=[
  {id:'full',name:'Full Bleed',col:'#c8704a'},{id:'split',name:'Split',col:'#7a8ecc'},
  {id:'grid3',name:'Grid',col:'#6ab09a'},{id:'hero',name:'Hero',col:'#c87060'},
  {id:'immersive',name:'Immersive',col:'#b07acc'},{id:'specs',name:'Specs',col:'#d4a84a'},
  {id:'essay',name:'Essay',col:'#8a9e6a'},{id:'cta',name:'CTA',col:'#9a8070'},
  {id:'cover',name:'Cover',col:'#7a6ecc'},{id:'spread',name:'Spread',col:'#6a9eb0'},
  {id:'catalogue',name:'Catalogue',col:'#b09a6a'}
];
var CTYPES=[
  {id:'brand',name:'Brand'},{id:'story',name:'Story'},{id:'catalog',name:'Catalog'},
  {id:'feature',name:'Feature'},{id:'editorial',name:'Editorial'},{id:'data',name:'Data'},
  {id:'essay',name:'Essay'},{id:'convert',name:'Convert'}
];
var PALS=[
  {id:'',name:'Night',col:'#c87a50'},{id:'amber',name:'Amber',col:'#e8a830'},
  {id:'forest',name:'Forest',col:'#88b878'},{id:'midnight',name:'Midnight',col:'#6a9bcc'},
  {id:'linen',name:'Linen',col:'#b85c32'},{id:'red',name:'Red',col:'#e03030'}
];
var IMGS={
  full:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1800&q=80',
  split:'https://images.unsplash.com/photo-1551218808-94e220e084d2?w=1200&q=80',
  hero:'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1200&q=80',
  immersive:'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1800&q=80',
  cta:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1800&q=80'
};
var PAL_COLORS={'':'#b8622a','amber':'#d49820','forest':'#6a9858','midnight':'#4878a8','linen':'#a84e28','red':'#cc2020'};

/* ── STATE ── */
var rooms=[], views=[], citations=[];
var createMenuOpen=false;
var selectedId=null, selectedCitId=null;
var renderViewId=null, cwOpen=false;
var prevPanelViewId=null, prevPanelOpen=true;
var idn=1;
function gid(){return 'n'+(idn++);}

/* canvas transform */
var T={x:0,y:0,s:1};

/* ── DOM refs ── */
var g=function(id){return document.getElementById(id);};
var ce=function(tag){return document.createElement(tag);};

/* ── TOAST ── */
var toastT;
function toast(msg){
  g('tst-msg').innerHTML=msg;g('tst').classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(function(){g('tst').classList.remove('show');},2800);
}

/* ── HELPERS ── */
function getLayout(id){return LAYOUTS.find(function(l){return l.id===id;})||LAYOUTS[0];}
function getCtype(id){return CTYPES.find(function(c){return c.id===id;})||CTYPES[0];}
function roomColor(rm){var p=rm.palette?PALS.find(function(p){return p.id===rm.palette;}):null;return p?p.col:getLayout(rm.layout).col;}
function getView(id){return views.find(function(v){return v.id===id;});}
function getRoom(id){return rooms.find(function(r){return r.id===id;});}
function viewCitations(vId){return citations.filter(function(c){return c.viewId===vId;}).sort(function(a,b){return a.position-b.position;});}
function roomCitations(rmId){return citations.filter(function(c){return c.roomId===rmId;});}
function citHasOverrides(cit){if(!cit.overrides)return false;return Object.keys(cit.overrides).some(function(k){return cit.overrides[k]!==undefined&&cit.overrides[k]!=='';});}
function resolveRoom(rm,cit){if(!cit||!cit.overrides)return rm;return Object.assign({},rm,{label:cit.overrides.label||rm.label,headline:cit.overrides.headline||rm.headline,palette:cit.overrides.palette!==undefined?cit.overrides.palette:rm.palette,body:cit.overrides.body||rm.body,pull:cit.overrides.pull||rm.pull});}

/* ── PERSIST ── */
function save(){
  try{localStorage.setItem('arc5',JSON.stringify({rooms:rooms,views:views,citations:citations,T:T,idn:idn,proj:g('tb-proj').value}));}catch(e){}
}
function load(){
  try{
    var d=JSON.parse(localStorage.getItem('arc5')||'null');
    if(!d)return false;
    rooms=d.rooms||[];views=d.views||[];citations=d.citations||[];
    T=d.T||{x:0,y:0,s:1};idn=d.idn||1;
    if(d.proj)g('tb-proj').value=d.proj;
    return true;
  }catch(e){return false;}
}

/* ── CANVAS TRANSFORM (lane canvas only) ── */
var ci=g('canvas-inner');
function applyT(){
  ci.style.transform='translate('+T.x+'px,'+T.y+'px) scale('+T.s+')';
  g('zpct').textContent=Math.round(T.s*100)+'%';
}
function zoom(d,cx,cy){
  var ns=Math.max(.25,Math.min(2,T.s*(1+d)));
  var lc=g('lane-canvas');
  var lx=(cx!==undefined?cx:lc.clientWidth/2);
  var ly=(cy!==undefined?cy:lc.clientHeight/2);
  T.x=lx-(lx-T.x)*(ns/T.s);T.y=ly-(ly-T.y)*(ns/T.s);T.s=ns;applyT();
}
function fit(){
  var lc=g('lane-canvas');
  var totalW=LANE_HDR_W+(views.length?Math.max.apply(null,views.map(function(vw){return viewCitations(vw.id).length*(SLOT_W+20)+80;}).concat([400])):400);
  var totalH=views.length*LANE_H+80;
  var sw=lc.clientWidth-40,sh=lc.clientHeight-40;
  T.s=Math.min(sw/totalW,sh/totalH,.95);
  T.x=20;T.y=20;
  applyT();save();
}
g('btn-zo').addEventListener('click',function(){zoom(-.15);});
g('btn-zi').addEventListener('click',function(){zoom(.15);});
g('btn-fit').addEventListener('click',fit);

/* canvas pan */
var lc=g('lane-canvas');
var pan=false,panPS={};
var spaceDown=false;

/* Spacebar — hold to enter grab mode on the canvas */
document.addEventListener('keydown',function(e){
  if(e.code==='Space'&&!e.repeat&&!e.target.closest('input,textarea,select')){
    e.preventDefault();
    spaceDown=true;
    lc.style.cursor='grab';
  }
});
document.addEventListener('keyup',function(e){
  if(e.code==='Space'){
    spaceDown=false;
    if(!pan)lc.style.cursor='';
  }
});

lc.addEventListener('pointerdown',function(e){
  if(e.button!==0)return;
  /* Space held: pan from anywhere on the canvas */
  if(spaceDown){
    e.preventDefault();lc.setPointerCapture(e.pointerId);
    pan=true;panPS={x:e.clientX,y:e.clientY,tx:T.x,ty:T.y};lc.style.cursor='grabbing';
    return;
  }
  if(e.target.closest('.lane,.pool-row,.slot-card,.lane-add-btn,#lane-add-btn'))return;
  e.preventDefault();lc.setPointerCapture(e.pointerId);
  pan=true;panPS={x:e.clientX,y:e.clientY,tx:T.x,ty:T.y};lc.style.cursor='grabbing';
});
lc.addEventListener('pointermove',function(e){if(!pan||!e.isPrimary)return;T.x=panPS.tx+(e.clientX-panPS.x);T.y=panPS.ty+(e.clientY-panPS.y);applyT();});
lc.addEventListener('pointerup',function(e){if(!e.isPrimary)return;if(pan){pan=false;lc.style.cursor=spaceDown?'grab':'';save();}});
lc.addEventListener('pointercancel',function(){if(pan){pan=false;lc.style.cursor='';}});;
lc.addEventListener('wheel',function(e){e.preventDefault();var r=lc.getBoundingClientRect();zoom(-e.deltaY*.001,e.clientX-r.left,e.clientY-r.top);},{passive:false});

/* ── POOL SIDEBAR RESIZE ── */
(function(){
  var handle=g('pool-resize');
  var rz=false,sx=0,sw=0;
  handle.addEventListener('pointerdown',function(e){
    if(e.button!==0)return;
    handle.setPointerCapture(e.pointerId);handle.classList.add('dragging');
    rz=true;sx=e.clientX;sw=g('pool-sidebar').offsetWidth;e.preventDefault();
  });
  handle.addEventListener('pointermove',function(e){
    if(!rz||!e.isPrimary)return;
    var w=Math.max(200,Math.min(380,sw+(e.clientX-sx)));
    g('pool-sidebar').style.width=w+'px';
    document.documentElement.style.setProperty('--pool-w',w+'px');
  });
  handle.addEventListener('pointerup',function(){rz=false;handle.classList.remove('dragging');});
  handle.addEventListener('pointercancel',function(){rz=false;handle.classList.remove('dragging');});
})();

/* ── DATA CRUD ── */
function addRoom(layout,contentType){
  var rm={id:gid(),layout:layout||'full',contentType:contentType||'brand',
    name:getLayout(layout||'full').name,label:'',headline:'',body:'',pull:'',
    palette:'',img:'',specs:[]};
  rooms.push(rm);
  renderPoolSidebar();save();
  return rm;
}
function deleteRoom(id){
  rooms=rooms.filter(function(r){return r.id!==id;});
  citations=citations.filter(function(c){return c.roomId!==id;});
  if(selectedId===id)closeInspector();
  renderPoolSidebar();renderAllLanes();syncPrevPanel();save();
  toast('Room deleted');
}
function addView(name,slug){
  var vw={id:gid(),name:name||'New View',slug:slug||'/new-view'};
  views.push(vw);
  if(!prevPanelViewId)prevPanelViewId=vw.id;
  renderAllLanes();syncPrevPanelViewSel();syncPrevPanel();save();
  return vw;
}
function deleteView(id){
  views=views.filter(function(v){return v.id!==id;});
  citations=citations.filter(function(c){return c.viewId!==id;});
  if(prevPanelViewId===id)prevPanelViewId=views.length?views[0].id:null;
  renderAllLanes();syncPrevPanelViewSel();syncPrevPanel();save();
  toast('View deleted');
}
function addCitation(roomId,viewId,position){
  if(citations.find(function(c){return c.roomId===roomId&&c.viewId===viewId;})){
    toast('Already in this view');return null;
  }
  var pos=position!==undefined?position:viewCitations(viewId).length+1;
  var cit={id:gid(),roomId:roomId,viewId:viewId,position:pos,overrides:{}};
  citations.push(cit);
  viewCitations(viewId).forEach(function(c,i){c.position=i+1;});
  renderLane(viewId);renderPoolSidebar();
  if(prevPanelViewId===viewId)syncPrevPanel();
  save();return cit;
}
function removeCitation(citId){
  var cit=citations.find(function(c){return c.id===citId;});if(!cit)return;
  var vwId=cit.viewId;
  citations=citations.filter(function(c){return c.id!==citId;});
  viewCitations(vwId).forEach(function(c,i){c.position=i+1;});
  renderLane(vwId);renderPoolSidebar();
  if(prevPanelViewId===vwId)syncPrevPanel();
  save();toast('Removed from lane');
}
function reorderCitation(citId,newPos,viewId){
  var vcits=viewCitations(viewId);
  var cit=vcits.find(function(c){return c.id===citId;});if(!cit)return;
  var oldPos=cit.position;if(oldPos===newPos)return;
  vcits.forEach(function(c){
    if(c.id===citId){c.position=newPos;return;}
    if(oldPos<newPos){if(c.position>oldPos&&c.position<=newPos)c.position--;}
    else{if(c.position>=newPos&&c.position<oldPos)c.position++;}
  });
  renderLane(viewId);if(prevPanelViewId===viewId)syncPrevPanel();save();
}
function divergeAsRoom(citId){
  var cit=citations.find(function(c){return c.id===citId;});if(!cit)return;
  var rm=getRoom(cit.roomId);if(!rm)return;
  var newRm=Object.assign({},rm,cit.overrides||{},{id:gid(),name:(rm.name||rm.layout)+' (variant)'});
  rooms.push(newRm);cit.roomId=newRm.id;cit.overrides={};
  renderPoolSidebar();renderLane(cit.viewId);toast('Diverged: '+newRm.name);
}

  /* footer: citation dots + palette */

/* POOL ROW DRAG — drag from sidebar to lane */
var dragRmId=null;
var dg=g('drag-ghost');

function bindPoolRowDrag(el,rm){
  el.addEventListener('pointerdown',function(e){
    if(e.button!==0)return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
    if(e.target.closest('.pra'))return;
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    var moved=false;var snapLaneId=null;
    el.classList.add('dragging');
    dragRmId=rm.id;
    g('dg-dot').style.background=roomColor(rm);
    g('dg-lbl').textContent=(rm.name||rm.layout)+' → drop to cite';

    function mm(e){
      if(!e.isPrimary)return;
      if(!moved)moved=true;
      dg.style.left=(e.clientX+12)+'px';dg.style.top=(e.clientY-10)+'px';dg.classList.add('show');
      var laneUnder=findLaneAt(e.clientX,e.clientY);
      if(laneUnder!==snapLaneId){
        if(snapLaneId){var prev=g('lane-'+snapLaneId);if(prev){prev.classList.remove('snap-target');var pdz=g('ldz-'+snapLaneId);if(pdz)pdz.classList.remove('active');}}
        snapLaneId=laneUnder;
        if(snapLaneId){var lel=g('lane-'+snapLaneId);if(lel){lel.classList.add('snap-target');var dz=g('ldz-'+snapLaneId);if(dz)dz.classList.add('active');}}
      }
    }
    function mu(e){
      if(!e.isPrimary)return;
      el.classList.remove('dragging');dragRmId=null;dg.classList.remove('show');
      if(snapLaneId){
        var lel=g('lane-'+snapLaneId);if(lel)lel.classList.remove('snap-target');
        var dz=g('ldz-'+snapLaneId);if(dz)dz.classList.remove('active');
        var insertPos=getInsertPosition(e.clientX,snapLaneId);
        var existing=citations.find(function(c){return c.roomId===rm.id&&c.viewId===snapLaneId;});
        if(!existing){addCitation(rm.id,snapLaneId,insertPos);toast((rm.name||rm.layout)+' cited');}
        else toast('Already in this view');
        snapLaneId=null;
      }
      el.removeEventListener('pointermove',mm);
      el.removeEventListener('pointerup',mu);
      el.removeEventListener('pointercancel',mu);
    }
    el.addEventListener('pointermove',mm);
    el.addEventListener('pointerup',mu);
    el.addEventListener('pointercancel',mu);
  });
}

function findLaneAt(cx,cy){
  var els=document.querySelectorAll('.lane');
  for(var i=0;i<els.length;i++){
    var r=els[i].getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)return els[i].dataset.viewid;
  }
  return null;
}
function getInsertPosition(cx,viewId){
  var slots=document.querySelectorAll('.slot-card[data-viewid="'+viewId+'"]');
  if(!slots.length)return 1;
  for(var i=0;i<slots.length;i++){var r=slots[i].getBoundingClientRect();if(cx<(r.left+r.right)/2)return i+1;}
  return viewCitations(viewId).length+1;
}

function refreshPoolRow(rmId){
  var rm=getRoom(rmId);if(!rm)return;
  var old=g('pr-'+rmId);if(!old)return;
  var neo=makePoolRow(rm);old.replaceWith(neo);
}
function refreshAllSlotsForRoom(rmId){
  views.forEach(function(vw){
    viewCitations(vw.id).forEach(function(cit){
      if(cit.roomId===rmId){
        var slot=g('slot-'+cit.id);
        var rm=getRoom(rmId);
        if(slot&&rm){var neo=makeSlotCard(cit,rm);slot.replaceWith(neo);bindSlotDrag(neo,cit,vw.id);}
      }
    });
  });
}

/* ── LANE RENDER ── */
var canvasInner=g('canvas-inner');
var laneAddBtn=g('lane-add-btn');

function renderAllLanes(){

function makeLane(vw){
  var vcits=viewCitations(vw.id);
  var el=ce('div');el.className='lane';el.id='lane-'+vw.id;el.dataset.viewid=vw.id;

  /* number strip */
  var num=ce('div');num.className='lane-num';
  var numTxt=ce('span');numTxt.className='lane-num-txt';
  numTxt.textContent=String(views.indexOf(vw)+1).padStart(2,'0');
  num.appendChild(numTxt);

  /* header */
  var hd=ce('div');hd.className='lane-hd';
  var nameInp=ce('input');nameInp.className='lane-view-name';nameInp.value=vw.name||'';nameInp.placeholder='View name';
  nameInp.dataset.vwfield='name';nameInp.dataset.vwid=vw.id;
  var slugInp=ce('input');slugInp.className='lane-view-slug';slugInp.value=vw.slug||'';slugInp.placeholder='/slug';
  slugInp.dataset.vwfield='slug';slugInp.dataset.vwid=vw.id;
  var meta=ce('div');meta.className='lane-meta';
  var cnt=ce('span');cnt.className='lane-count';cnt.id='lc-'+vw.id;cnt.textContent=vcits.length+(vcits.length===1?'r':'r');
  var pvBtn=ce('button');pvBtn.className='lane-preview-btn';pvBtn.textContent='Preview ↗';pvBtn.dataset.previewview=vw.id;
  var delBtn=ce('button');delBtn.className='lane-del-btn';delBtn.textContent='✕';delBtn.dataset.deletelane=vw.id;
  meta.appendChild(cnt);meta.appendChild(pvBtn);meta.appendChild(delBtn);
  hd.appendChild(nameInp);hd.appendChild(slugInp);hd.appendChild(meta);

  /* slots */
  var slots=ce('div');slots.className='lane-slots';
  vcits.forEach(function(cit,i){
    var rm=getRoom(cit.roomId);if(!rm)return;
    if(i>0){var conn=ce('div');conn.className='slot-conn';slots.appendChild(conn);}
    var sc=makeSlotCard(cit,rm);
    var pos=ce('div');pos.className='slot-pos';pos.textContent=String(i+1).padStart(2,'0');
    sc.appendChild(pos);
    slots.appendChild(sc);
    bindSlotDrag(sc,cit,vw.id);
  });
  var dz=ce('div');dz.className='lane-drop-zone';dz.id='ldz-'+vw.id;
  var dzico=ce('span');dzico.className='ldz-ico';dzico.textContent='→';dz.appendChild(dzico);
  slots.appendChild(dz);

  /* sequence strip */
  var strip=ce('div');strip.className='lane-seq-strip';strip.id='lss-'+vw.id;
  for(var i=0;i<vcits.length;i++){var pip=ce('div');pip.className='lane-seq-pip filled';strip.appendChild(pip);}

  el.appendChild(num);el.appendChild(hd);el.appendChild(slots);el.appendChild(strip);

  /* lane events */
  el.addEventListener('input',function(e){
    var f=e.target.closest('[data-vwfield]');if(!f)return;
    vw[f.dataset.vwfield]=f.value;
    syncPrevPanelViewSel();save();
  });
  el.addEventListener('click',function(e){
    var pv=e.target.closest('[data-previewview]');if(pv){previewView(pv.dataset.previewview);return;}
    var dl=e.target.closest('[data-deletelane]');if(dl){deleteView(dl.dataset.deletelane);return;}
    var rmc=e.target.closest('[data-rmcit]');if(rmc){removeCitation(rmc.dataset.rmcit);return;}
    /* Left click on slot-card: visual selection only, no inspector */
    var sc=e.target.closest('.slot-card');
    if(sc&&!e.target.closest('[data-rmcit]')){
      document.querySelectorAll('.slot-card').forEach(function(el){el.classList.remove('sel');});
      sc.classList.add('sel');
      selectedCitId=sc.dataset.citid;
      prevPanelViewId=vw.id;syncPrevPanelViewSel();syncPrevPanel();
    }
  });
  /* Right-click on slot-card: context menu */
  el.addEventListener('contextmenu',function(e){
    var sc=e.target.closest('.slot-card');
    if(!sc)return;
    e.preventDefault();
    openCtxMenu(e.clientX,e.clientY,sc.dataset.citid,sc.dataset.rmid,vw.id);
  });
  return el;
}

function makeSlotCard(cit,rm){
  var col=roomColor(rm);
  var hasOv=citHasOverrides(cit);var eff=resolveRoom(rm,cit);
  var el=ce('div');el.className='slot-card'+(hasOv?' has-ov':'')+(selectedCitId===cit.id?' sel':'');
  el.id='slot-'+cit.id;el.dataset.citid=cit.id;el.dataset.viewid=cit.viewId;el.dataset.rmid=rm.id;
  el.style.setProperty('--slot-col',col);
  /* colorbar via ::before — set via inline style trick */
  el.style.cssText+='--slot-col:'+col;
  el.querySelector&&null;/* noop */
  /* colorbar */
  var topBar=ce('div');topBar.style.cssText='height:3px;background:'+col+';position:absolute;top:0;left:0;right:0;border-radius:3px 3px 0 0';
  var hd=ce('div');hd.className='slot-card-hd';
  var ttl=ce('div');ttl.className='slot-ttl';ttl.textContent=rm.name||rm.layout;
  var ly=ce('span');ly.className='slot-ly';ly.textContent=rm.layout;
  var rmb=ce('button');rmb.className='slot-rm';rmb.textContent='×';rmb.dataset.rmcit=cit.id;
  hd.appendChild(ttl);hd.appendChild(ly);hd.appendChild(rmb);
  var diag=ce('div');diag.className='slot-diag';
  var hl=ce('div');hl.className='slot-hl';hl.textContent=eff.headline||eff.name||rm.layout;
  if(eff.body){var bd=ce('div');bd.className='slot-bd';bd.textContent=eff.body;diag.appendChild(hl);diag.appendChild(bd);}
  else diag.appendChild(hl);
  el.appendChild(topBar);el.appendChild(hd);el.appendChild(diag);
  return el;
}

/* slot drag — reorder within lane */
function bindSlotDrag(el,cit,viewId){
  el.addEventListener('pointerdown',function(e){
    if(e.button!==0||e.target.closest('.slot-rm'))return;
    e.preventDefault();el.setPointerCapture(e.pointerId);
    var sx=e.clientX;var moved=false;var overCitId=null;
    el.style.opacity='.5';el.style.outline='1.5px solid var(--acc)';
    function mm(e){
      if(!e.isPrimary)return;
      if(Math.abs(e.clientX-sx)>8)moved=true;
      if(!moved)return;
      el.style.pointerEvents='none';
      var under=document.elementFromPoint(e.clientX,e.clientY);
      el.style.pointerEvents='';
      var ts=under?under.closest('.slot-card'):null;
      document.querySelectorAll('.slot-card').forEach(function(s){s.style.borderLeft='';});
      if(ts&&ts!==el&&ts.dataset.viewid===viewId){overCitId=ts.dataset.citid;ts.style.borderLeft='2px solid var(--acc)';}
      else overCitId=null;
    }
    function mu(){
      el.style.opacity='';el.style.outline='';
      document.querySelectorAll('.slot-card').forEach(function(s){s.style.borderLeft='';});
      el.removeEventListener('pointermove',mm);el.removeEventListener('pointerup',mu);el.removeEventListener('pointercancel',mu);
      if(moved&&overCitId){var tc=citations.find(function(c){return c.id===overCitId;});if(tc)reorderCitation(cit.id,tc.position,viewId);}
    }
    el.addEventListener('pointermove',mm);el.addEventListener('pointerup',mu);el.addEventListener('pointercancel',mu);
  });
}

function syncLaneSeqStrips(){
  /* update number labels based on current views order */
  views.forEach(function(vw,i){
    var num=g('lane-'+vw.id);
    if(num){var t=num.querySelector('.lane-num-txt');if(t)t.textContent=String(i+1).padStart(2,'0');}

function openRoomInspector(rmId){
  var rm=getRoom(rmId);if(!rm)return;

  var body=g('insp-body');body.innerHTML='';
  function sec(t){var s=ce('div');s.className='ins-sec';var tt=ce('div');tt.className='ins-sec-t';tt.textContent=t;s.appendChild(tt);body.appendChild(s);return s;}
  function row(s,lbl,field,multi){
    var r=ce('div');r.className='ins-row'+(multi?' top':'');
    var l=ce('span');l.className='ins-lbl';l.textContent=lbl;
    var inp=multi?ce('textarea'):ce('input');

    inp.dataset.rmfield=field;inp.dataset.rmid=rm.id;if(multi)inp.rows=3;
    r.appendChild(l);r.appendChild(inp);s.appendChild(r);
  }
  function selRow(s,lbl,field,opts){
    var r=ce('div');r.className='ins-row';var l=ce('span');l.className='ins-lbl';l.textContent=lbl;

    r.appendChild(l);r.appendChild(sel);s.appendChild(r);
  }
  var s1=sec('Identity');row(s1,'Name','name');row(s1,'Label','label');
  selRow(s1,'Layout','layout',LAYOUTS);selRow(s1,'Type','contentType',CTYPES);
  var s2=sec('Copy');row(s2,'Headline','headline',true);row(s2,'Body','body',true);row(s2,'Pull','pull',true);
  var s3=sec('Palette');var pr=ce('div');pr.className='pal-row';
  PALS.forEach(function(p){var sw=ce('div');sw.className='pal-sw'+(rm.palette===p.id?' sel':'');sw.style.background=p.col;sw.title=p.name;sw.dataset.rmpalette=p.id;sw.dataset.rmid=rm.id;pr.appendChild(sw);});
  s3.appendChild(pr);
  body.addEventListener('input',function(e){var f=e.target.closest('[data-rmfield]');if(!f)return;rm[f.dataset.rmfield]=f.value;refreshPoolRow(rm.id);refreshAllSlotsForRoom(rm.id);save();});
  body.addEventListener('change',function(e){var f=e.target.closest('[data-rmfield]');if(!f)return;rm[f.dataset.rmfield]=f.value;refreshPoolRow(rm.id);refreshAllSlotsForRoom(rm.id);save();});
  body.addEventListener('click',function(e){var sw=e.target.closest('[data-rmpalette]');if(!sw)return;rm.palette=sw.dataset.rmpalette;document.querySelectorAll('[data-rmpalette]').forEach(function(s){s.classList.toggle('sel',s.dataset.rmpalette===rm.palette);});refreshPoolRow(rm.id);refreshAllSlotsForRoom(rm.id);save();});
}
function openCitInspector(cit){
  var rm=getRoom(cit.roomId);var vw=getView(cit.viewId);if(!rm||!vw)return;

function buildRoom(rm,idx,vw){

  var acCol=acc?acc.col:ly.col;var lbl=rm.label||getCtype(rm.contentType).name.toUpperCase();

    case 'hero':sec.appendChild(mkBg());var fi=ce('div');fi.className='feat-img';var fimg=ce('img');fimg.src=bgSrc;fimg.alt=hl;fi.appendChild(fimg);var ft=ce('div');ft.appendChild(mkS('lbl',lbl));ft.appendChild(mkPo());if(body)ft.appendChild(mkS('bdy',body));ft.appendChild(mkBrk());var pb=ce('button');pb.className='s btn-atc';pb.style.maxWidth='280px';pb.textContent='View →';ft.appendChild(pb);inn.appendChild(fi);inn.appendChild(ft);break;

    case 'essay':sec.appendChild(mkBg());inn.appendChild(mkS('lbl',lbl));inn.appendChild(mkPo());inn.appendChild(mkBrk());if(body)inn.appendChild(mkS('bdy',body));if(pull)inn.appendChild(mkS('pul',pull));break;
    case 'cta':sec.appendChild(mkBg());inn.appendChild(mkS('lbl',lbl));inn.appendChild(mkPo());if(body)inn.appendChild(mkS('bdy',body));var cr=ce('div');cr.className='s';cr.style.cssText='display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:28px';var cpb=ce('button');cpb.className='btn-atc';cpb.style.maxWidth='220px';cpb.textContent='Get in Touch →';cr.appendChild(cpb);inn.appendChild(cr);break;
    default:sec.appendChild(mkBg());inn.appendChild(mkS('lbl',lbl));inn.appendChild(mkPo());if(body)inn.appendChild(mkS('bdy',body));
  }

}
