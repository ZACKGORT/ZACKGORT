<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Zack Gort · Senior UX/UI Designer & Strategist · Wolfgang & Co.</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><text y='28' font-size='24' font-family='monospace' font-weight='300' fill='%23daa520'>&lt;/</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#05030a;transition:background 0.6s;user-select:none;-webkit-user-select:none;}
body.light{background:#ffffff;}
canvas{display:block;width:100vw;height:100vh;position:relative;z-index:1;}
#bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;}

#brand{position:fixed;top:20px;left:24px;z-index:100;font-family:'DM Mono',monospace;cursor:pointer;}
#brand-logo{display:flex;align-items:center;gap:10px;position:relative;}
#brand-saturn{flex-shrink:0;opacity:0.75;transition:opacity 0.3s;}
#brand:hover #brand-saturn{opacity:1;}
#brand-text{display:flex;flex-direction:column;gap:3px;}
#brand-name{font-size:10px;letter-spacing:0.26em;text-transform:uppercase;color:rgba(218,165,32,0.70);transition:color 0.5s;}
#brand-sub{font-size:7.5px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(218,165,32,0.28);transition:color 0.5s;}
/* Ghost acronym tooltip */
#brand-dab{
  position:absolute;top:calc(100% + 8px);left:0;
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.18em;
  text-transform:uppercase;color:rgba(218,165,32,0.70);
  background:rgba(5,3,10,0.92);border:1px solid rgba(218,165,32,0.14);
  border-radius:2px;padding:5px 10px;white-space:nowrap;
  opacity:0;transform:translateY(-4px);
  transition:opacity 0.2s, transform 0.2s;
  pointer-events:none;z-index:200;
}
#brand:hover #brand-dab{opacity:1;transform:translateY(0);}
body.light #brand-name{color:rgba(0,0,0,0.90);}
body.light #brand-sub{color:rgba(0,0,0,0.50);}
body.light #brand-saturn circle,body.light #brand-saturn ellipse,body.light #brand-saturn line{stroke:rgba(0,0,0,0.45)!important;}
body.light #brand-saturn circle.node{fill:rgba(0,0,0,0.60)!important;stroke:none!important;}
body.light #brand-dab{background:#fff;border-color:rgba(0,0,0,0.12);color:rgba(0,0,0,0.75);}

#era-label{position:fixed;top:24px;right:28px;z-index:100;font-family:'DM Mono',monospace;text-align:right;pointer-events:none;}
#era-year{font-size:28px;letter-spacing:-0.02em;color:rgba(218,165,32,0.18);transition:color 0.5s,opacity 0.4s;font-family:'Crimson Text',serif;font-style:italic;}
#era-name{font-size:7px;letter-spacing:0.20em;text-transform:uppercase;color:rgba(218,165,32,0.22);margin-top:4px;}
body.light #era-year{color:rgba(0,0,0,0.22);}
body.light #era-name{color:rgba(0,0,0,0.55);}

/* ── TOP HUD ── */
#hud{
  position:fixed;top:20px;right:24px;
  display:flex;align-items:center;gap:1px;
  background:rgba(218,165,32,0.04);
  border:1px solid rgba(218,165,32,0.12);
  border-radius:4px;overflow:hidden;z-index:100;
  transition:background 0.5s,border-color 0.5s;
}
@media(max-width:768px){
  #hud{display:none;}  /* Mobile: nav handled by #mobile-nav-bar */
}
.hud-btn{
  background:none;border:none;cursor:pointer;
  color:rgba(218,165,32,0.35);
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.18em;
  text-transform:uppercase;padding:8px 16px;
  border-right:1px solid rgba(218,165,32,0.10);
  transition:color 0.2s,background 0.2s;
}
.hud-btn:last-child{border-right:none;}
.hud-btn:hover{color:rgba(218,165,32,0.85);background:rgba(218,165,32,0.06);}
.hud-btn.active{color:#daa520;background:rgba(218,165,32,0.10);}
.hud-sep{width:1px;background:rgba(218,165,32,0.15);align-self:stretch;flex-shrink:0;margin:5px 0;}
body.light #hud{background:rgba(255,255,255,0.96);border-color:rgba(0,0,0,0.12);}
body.light .hud-btn{color:rgba(0,0,0,0.55);border-right-color:rgba(0,0,0,0.08);}
body.light .hud-btn:hover{color:#000;}
body.light .hud-btn.active{color:#000;background:rgba(0,0,0,0.08);}

/* ── SENTENCE GHOST IMAGE ── */
#sent-ghost{
  position:fixed;left:0;top:0;
  width:220px;height:165px;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.35s, transform 0.35s;
  z-index:690;
  transform:translateX(-12px);
}
#sent-ghost.vis{opacity:1;transform:translateX(0);}
#sent-ghost-img{
  width:100%;height:100%;object-fit:cover;
  border-radius:3px;
  filter:saturate(0.7) brightness(0.75);
  display:block;
}
#sent-ghost-cap{
  position:absolute;bottom:0;left:0;right:0;
  padding:6px 10px;
  font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:0.14em;
  text-transform:uppercase;color:rgba(245,236,213,0.55);
  background:linear-gradient(transparent,rgba(0,0,0,0.6));
  border-radius:0 0 3px 3px;
}
body.light #sent-ghost-img{filter:saturate(0) brightness(1.0);}
body.light #sent-ghost-cap{color:rgba(0,0,0,0.55);}
@media(max-width:768px){#sent-ghost{display:none;}}

/* ── GRID VIEW ── */
#grid-overlay{
  position:fixed;inset:0;z-index:500;
  display:none;
  align-items:flex-start;justify-content:center;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.4s;
  overflow-y:auto;
}
#grid-overlay.vis{opacity:1;pointer-events:all;}
#grid-inner{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:24px 16px 80px;
  width:min(960px,100%);
  min-height:100%;
}
#grid-inner::-webkit-scrollbar{display:none;}
@media(max-width:600px){
  #grid-inner{
    grid-template-columns:1fr;
    gap:8px;
    padding:16px 14px 88px;
  }
}
@media(min-width:601px) and (max-width:860px){#grid-inner{grid-template-columns:repeat(2,1fr);}}
.grid-card{
  background:rgba(5,3,10,0.94);
  border:1px solid rgba(218,165,32,0.12);
  border-radius:5px;padding:16px 14px 14px;
  cursor:pointer;transition:all 0.20s;
  position:relative;overflow:hidden;
  opacity:0;transform:translateY(8px) scale(0.97);
  animation:cardIn 0.35s forwards;
}
@keyframes cardIn{to{opacity:1;transform:none;}}
.grid-card:hover{border-color:rgba(218,165,32,0.40);background:rgba(10,6,20,0.97);}
@media(max-width:600px){
  .grid-card{
    display:flex;align-items:baseline;gap:14px;
    padding:14px 14px 14px;
  }
  .gc-bar-top{display:none;}
  .grid-card-year{flex-shrink:0;margin:0;font-size:7.5px;letter-spacing:0.18em;width:auto;}
  .grid-card-role,.grid-card-body{display:none;}
  .grid-card-title{font-size:17px;margin:0;}
}
.gc-bar-top{height:2px;width:100%;position:absolute;top:0;left:0;border-radius:5px 5px 0 0;}
.grid-card-year{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.20em;text-transform:uppercase;color:rgba(218,165,32,0.38);margin-bottom:8px;margin-top:4px;}
.grid-card-title{font-family:'Crimson Text',serif;font-size:16px;letter-spacing:-0.01em;color:#f5ecd5;line-height:1.25;margin-bottom:5px;}
.grid-card-role{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(218,165,32,0.28);line-height:1.5;}
.grid-card-body{font-family:'Crimson Text',serif;font-size:12px;line-height:1.58;color:rgba(245,236,213,0.38);margin-top:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
body.light .grid-card{background:#fff;border-color:rgba(0,0,0,0.10);}
body.light .grid-card:hover{border-color:rgba(0,0,0,0.40);}
body.light .grid-card-year{color:rgba(0,0,0,0.40);}
body.light .grid-card-title{color:#000;}
body.light .grid-card-role{color:rgba(0,0,0,0.45);}
body.light .grid-card-body{color:rgba(0,0,0,0.60);}

#tl-label{display:none;}

#hint{display:none;}

#theme-toggle{display:none;}

#tooltip{position:fixed;top:0;left:0;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:200;}
#tooltip.vis{opacity:1;}
#tt-inner{background:rgba(5,3,10,0.97);border:1px solid rgba(218,165,32,0.16);border-radius:4px;padding:12px 16px;backdrop-filter:blur(12px);max-width:260px;}
.tt-era{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(218,165,32,0.40);margin-bottom:5px;}
.tt-title{font-family:'Crimson Text',serif;font-size:16px;color:#f5ecd5;line-height:1.2;margin-bottom:5px;letter-spacing:-0.01em;}
.tt-role{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(218,165,32,0.35);}
.tt-sub{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(218,165,32,0.25);margin-top:4px;font-style:italic;}
body.light #tt-inner{background:#fff;border-color:rgba(0,0,0,0.12);}
body.light .tt-era{color:rgba(0,0,0,0.45);}
body.light .tt-title{color:#000;}
body.light .tt-role{color:rgba(0,0,0,0.55);}

/* DETAIL PANEL */
#ghost{position:fixed;z-index:700;width:360px;pointer-events:none;opacity:0;right:28px;top:50%;transform:translateY(-50%) translateX(18px) scale(0.97);transition:opacity 0.30s,transform 0.30s;}
#ghost.on{opacity:1;transform:translateY(-50%) translateX(0) scale(1);pointer-events:all;}
.gc{background:rgba(5,3,10,0.98);border:1px solid rgba(218,165,32,0.12);border-radius:6px;box-shadow:0 18px 62px rgba(0,0,0,0.9);backdrop-filter:blur(26px);overflow:hidden;}
.gcscroll{max-height:82vh;overflow-y:auto;scrollbar-width:none;}
.gcscroll::-webkit-scrollbar{display:none;}
.gcbar{height:2px;width:100%;background:rgba(218,165,32,0.55);}
.gchead{
  padding:12px 14px 12px;
  border-bottom:1px solid rgba(218,165,32,0.08);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.gchead-text{flex:1;min-width:0;}
.gcera{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(218,165,32,0.40);margin-bottom:6px;}
.gctitle{font-family:'Crimson Text',serif;font-size:19px;letter-spacing:-0.02em;color:#f5ecd5;line-height:1.2;margin-bottom:5px;}
.gcrole{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(218,165,32,0.32);}
.gchead-nav{display:flex;gap:4px;align-items:center;flex-shrink:0;padding-top:2px;}

/* IFRAME HERO */
.gc-iframe-wrap{
  position:relative;width:100%;height:200px;
  background:rgba(218,165,32,0.04);
  border-bottom:1px solid rgba(218,165,32,0.08);
  overflow:hidden;
}
.gc-iframe-wrap iframe{
  width:160%;height:160%;
  transform:scale(0.625);transform-origin:top left;
  border:none;pointer-events:none;
  position:absolute;top:0;left:0;
  opacity:0.88;
}
.gc-iframe-cover{
  position:absolute;inset:0;z-index:2;
  background:linear-gradient(to bottom, transparent 55%, rgba(5,3,10,0.80) 100%);
  cursor:pointer;
}
.gc-iframe-badge{
  position:absolute;bottom:10px;right:12px;z-index:3;
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.18em;
  text-transform:uppercase;color:rgba(218,165,32,0.60);
  background:rgba(5,3,10,0.75);border:1px solid rgba(218,165,32,0.20);
  border-radius:2px;padding:3px 8px;
  transition:all 0.2s;pointer-events:all;
}
.gc-iframe-badge:hover{color:#daa520;border-color:rgba(218,165,32,0.55);}
.gc-iframe-none{
  display:flex;align-items:center;justify-content:center;height:100%;
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;
  text-transform:uppercase;color:rgba(218,165,32,0.15);
}
body.light .gc-iframe-wrap{background:#f2f2f2;border-color:rgba(0,0,0,0.08);}
body.light .gc-iframe-cover{background:linear-gradient(to bottom, transparent 55%, rgba(255,255,255,0.85) 100%);}
body.light .gc-iframe-badge{background:rgba(255,255,255,0.92);color:rgba(0,0,0,0.55);border-color:rgba(0,0,0,0.14);}
body.light .gc-iframe-none{color:rgba(0,0,0,0.22);}

/* SUBNODE pills in ghost panel */
.gc-moons{
  padding:8px 16px 10px;
  border-bottom:1px solid rgba(218,165,32,0.06);
}
.gc-moons-label{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(218,165,32,0.25);margin-bottom:7px;}
.gc-moon-pills{display:flex;flex-wrap:wrap;gap:5px;}
.gc-moon-pill{
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.12em;
  text-transform:uppercase;
  padding:3px 8px;border-radius:10px;
  border:1px solid rgba(218,165,32,0.25);
  color:rgba(218,165,32,0.50);
  cursor:pointer;transition:all 0.15s;
}
.gc-moon-pill:hover{background:rgba(218,165,32,0.10);color:rgba(218,165,32,0.85);border-color:rgba(218,165,32,0.50);}
.gc-moon-pill.active{background:rgba(218,165,32,0.12);color:#daa520;border-color:rgba(218,165,32,0.60);}

.gcbody{padding:14px 16px 16px;font-family:'Crimson Text',serif;font-size:15px;line-height:1.76;color:rgba(245,236,213,0.70);}
body.light .gcbody{color:rgba(0,0,0,0.80);}
.gcft{display:flex;align-items:center;padding:10px 16px 12px;border-top:1px solid rgba(218,165,32,0.06);}
.gctag{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;text-transform:uppercase;padding:3px 9px;border-radius:9px;border:1px solid rgba(218,165,32,0.30);color:rgba(218,165,32,0.50);}

/* nav arrows — now in header */
.gcnav-btn{background:none;border:1px solid rgba(218,165,32,0.16);color:rgba(218,165,32,0.38);width:24px;height:22px;border-radius:2px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;transition:all 0.2s;pointer-events:all;}
.gcnav-btn:hover:not(:disabled){color:#f5ecd5;border-color:rgba(218,165,32,0.55);}
.gcnav-btn:disabled{opacity:0.18;cursor:default;}
.gcclose{background:none;border:1px solid rgba(218,165,32,0.16);color:rgba(218,165,32,0.38);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;transition:all 0.2s;pointer-events:all;}
.gcclose:hover{color:#f5ecd5;border-color:rgba(218,165,32,0.55);}

body.light .gc{background:#fff;border-color:rgba(0,0,0,0.10);}
body.light .gchead,body.light .gcbody,body.light .gcft{border-color:rgba(0,0,0,0.08);}
body.light .gcera{color:rgba(0,0,0,0.42);}
body.light .gctitle{color:#000;}
body.light .gcrole{color:rgba(0,0,0,0.50);}
body.light .gc-sent{color:rgba(0,0,0,0.65);}
body.light .gc-sent:hover{color:#000;background:rgba(0,0,0,0.05);}
body.light .gc-sent.active{color:#000;background:rgba(0,0,0,0.06);border-left-color:rgba(0,0,0,0.40);}
body.light .gc-sent-label{color:rgba(0,0,0,0.38);}
body.light .gcclose{border-color:rgba(0,0,0,0.14);color:rgba(0,0,0,0.45);}
body.light .gcclose:hover{color:#000;}
body.light .gctag{color:rgba(0,0,0,0.50);border-color:rgba(0,0,0,0.20);}

body.light .gc-img-frame{background:#eee;border-color:rgba(0,0,0,0.10);}
body.light .gc-moons-label{color:rgba(0,0,0,0.38);}
body.light .gc-moon-pill{color:rgba(0,0,0,0.50);border-color:rgba(0,0,0,0.18);}
body.light .gc-moon-pill:hover{background:rgba(0,0,0,0.05);color:#000;}

/* MOBILE SHEET */
/* Mobile sheet — slides up behind the fixed nav bar */
#msheet{
  display:none;position:fixed;
  bottom:48px;  /* sits above the fixed mobile nav bar */
  left:0;right:0;
  z-index:700;
  background:rgba(5,3,10,0.98);
  border-top:1px solid rgba(218,165,32,0.10);
  border-radius:14px 14px 0 0;
  max-height:calc(72vh - 48px);
  overflow-y:auto;scrollbar-width:none;
  transform:translateY(calc(100% + 48px));
  transition:transform 0.38s cubic-bezier(0.22,1,0.36,1);
  backdrop-filter:blur(28px);
}
#msheet::-webkit-scrollbar{display:none;}
#msheet.on{transform:translateY(0);}
.mshandle{width:36px;height:4px;background:rgba(218,165,32,0.20);border-radius:2px;margin:12px auto 6px;}
.mshead{padding:16px 20px 12px;border-bottom:1px solid rgba(218,165,32,0.08);}
.msera{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(218,165,32,0.40);margin-bottom:6px;}
.mstitle{font-family:'Crimson Text',serif;font-size:22px;letter-spacing:-0.02em;color:#f5ecd5;line-height:1.15;margin-bottom:4px;}
.ms-images{display:flex;gap:4px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;}
.ms-images::-webkit-scrollbar{display:none;}
.ms-img-frame{width:80px;height:60px;flex-shrink:0;border-radius:3px;overflow:hidden;background:rgba(218,165,32,0.06);border:1px solid rgba(218,165,32,0.10);}
.ms-img-frame img{width:100%;height:100%;object-fit:cover;opacity:0.80;}
.msbody{padding:13px 20px 20px;font-family:'Crimson Text',serif;font-size:15px;line-height:1.72;color:rgba(245,236,213,0.60);}

/* Fixed mobile nav bar — always at bottom:0, z above sheet */
#mobile-nav-bar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:48px;
  z-index:800;
  background:rgba(5,3,10,0.97);
  border-top:1px solid rgba(218,165,32,0.12);
  backdrop-filter:blur(20px);
  align-items:stretch;
  padding:0;
}
@media(max-width:768px){
  #mobile-nav-bar{display:flex;}
}
.ms-navbtn{
  flex:1;
  background:none;border:none;
  color:rgba(218,165,32,0.45);
  font-family:'DM Mono',monospace;font-size:8px;
  letter-spacing:0.18em;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transition:color 0.15s,background 0.15s;
  border-right:1px solid rgba(218,165,32,0.08);
}
.ms-navbtn:last-child{border-right:none;}
.ms-navbtn:hover{color:rgba(218,165,32,0.85);background:rgba(218,165,32,0.05);}
.ms-navbtn:active{color:#daa520;background:rgba(218,165,32,0.10);}
.ms-navbtn:disabled{opacity:0.18;pointer-events:none;}
.msclose{
  flex:0 0 48px;
  background:none;border:none;
  border-left:1px solid rgba(218,165,32,0.08);
  border-right:1px solid rgba(218,165,32,0.08);
  color:rgba(218,165,32,0.35);
  font-family:'DM Mono',monospace;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  /* Hidden by default — fades in when panel is open */
  opacity:0;
  transform:scale(0.7);
  pointer-events:none;
  transition:color 0.15s, background 0.15s, opacity 0.20s, transform 0.20s;
}
body.panel-open .msclose{opacity:1;transform:scale(1);pointer-events:all;}
.msclose:hover{color:rgba(218,165,32,0.80);background:rgba(218,165,32,0.05);}
.msclose:active{color:#daa520;}
/* hide the old msft footer inside the sheet */
.msft{display:none;}
.ms-nav{display:none;}

/* Light theme mobile nav bar */
body.light #mobile-nav-bar{background:rgba(255,255,255,0.97);border-top-color:rgba(0,0,0,0.09);}
body.light .ms-navbtn{color:rgba(0,0,0,0.45);border-right-color:rgba(0,0,0,0.07);}

// SPIRAL GEOMETRY
// ─────────────────────────────────────────────────────────
function spiralPos(t, view) {
  if (view === 'arc') {
    const totalSpan = 24;
    const yOff = (t - 0.5) * totalSpan;
    const arcBow = 14;
    const bow = arcBow * (1 - Math.pow(t * 2 - 1, 2));
    return new THREE.Vector3(bow, yOff, 0);
  }
  const turns = 1.65;
  const angle = t * Math.PI * 2 * turns - Math.PI * 0.5;
  const minR = 4, maxR = 28;
  const radius = minR + (maxR - minR) * Math.pow(t, 0.7);
  return new THREE.Vector3(Math.cos(angle) * radius, (t - 0.5) * 22, Math.sin(angle) * radius);
}

ERAS.forEach((era, i) => {
  const t = i / (ERAS.length - 1);
  era._t = t;
  era._spiralPos = spiralPos(t, 'spiral');
  era._arcPos = spiralPos(t, 'arc');
  era._pos = era._spiralPos.clone();
});

// ── SWOOP ANIMATOR ──────────────────────────────────────
const swoop = {
  active: false, t: 0, totalDur: 1.40,
  startPhi: 0, startTheta: 0, startRadius: 0,
  startPivot: new THREE.Vector3(),
  endPhi: 0, endTheta: 0, endRadius: 0,
  endPivot: new THREE.Vector3(),
};

function swoopTo(endPhi, endTheta, endRadius, endPivotVec) {
  swoop.startPhi    = camState.phi;
  swoop.startTheta  = camState.theta;
  swoop.startRadius = camState.radius;
  swoop.startPivot.copy(scenePivot);
  swoop.endPhi      = endPhi;
  swoop.endTheta    = endTheta;
  swoop.endRadius   = endRadius;
  swoop.endPivot.copy(endPivotVec);
  swoop.t           = 0;
  swoop.active      = true;
}

function easeFigure8(t) { return 1 - Math.pow(1 - t, 4); }
function bowCurve(t) { return Math.sin(t * Math.PI) * 0.22; }

function tickSwoop(dt) {
  if (!swoop.active) return;
  swoop.t = Math.min(swoop.t + dt / swoop.totalDur, 1);
  const t = swoop.t, e = easeFigure8(t);
  const bow = bowCurve(t);
  const baseRadius = swoop.startRadius + (swoop.endRadius - swoop.startRadius) * e;
  camState.radius = baseRadius * (1 + bow);
  let dTheta = swoop.endTheta - swoop.startTheta;
  while (dTheta >  Math.PI) dTheta -= Math.PI * 2;
  while (dTheta < -Math.PI) dTheta += Math.PI * 2;
  camState.theta = swoop.startTheta + dTheta * e;
  const phiOvershoot = swoop.endPhi * 0.08 * Math.sin(t * Math.PI);
  camState.phi = swoop.startPhi + (swoop.endPhi - swoop.startPhi) * e + phiOvershoot;
  scenePivot.lerpVectors(swoop.startPivot, swoop.endPivot, e);
  if (swoop.t >= 1) {
    swoop.active = false;
    camState.phi    = swoop.endPhi;
    camState.theta  = swoop.endTheta;
    camState.radius = swoop.endRadius;
    camTarget.phi    = swoop.endPhi;
    camTarget.theta  = swoop.endTheta;
    camTarget.radius = swoop.endRadius;
    scenePivot.copy(swoop.endPivot);
    scenePivotTgt.copy(swoop.endPivot);
  }
}

function applyCam() {
  const { phi, theta, radius } = camState, c = scenePivot;
  cam.position.set(
    c.x + radius * Math.sin(phi) * Math.sin(theta),
    c.y + radius * Math.cos(phi),
    c.z + radius * Math.sin(phi) * Math.cos(theta)
  );
  cam.lookAt(c);
}
applyCam();

function makeGlowSprite(color, radius) {
  const sz = 128, c = document.createElement('canvas'); c.width = sz; c.height = sz;
  const ctx = c.getContext('2d'), cx = sz/2, cy = sz/2;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, sz/2);
  const r = (color>>16)&255, g = (color>>8)&255, b = color&255;
  grad.addColorStop(0, `rgba(${r},${g},${b},0.60)`);
  grad.addColorStop(0.4, `rgba(${r},${g},${b},0.18)`);
  grad.addColorStop(0.8, `rgba(${r},${g},${b},0.04)`);
  grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }));
  spr.scale.set(radius * 6, radius * 6, 1);
  return spr;
}

function makeLabelCanvas(text, color, fs) {
  const c = document.createElement('canvas'); c.width = 640; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = `italic 600 ${fs * 2.6}px "Crimson Text", serif`;
  ctx.fillText(text, 10, 44);
  return c;
}

function addLabel(text, pos, dkColor, fs) {
  const c = makeLabelCanvas(text, dkColor, fs);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false }));
  spr.position.copy(pos).add(new THREE.Vector3(0.6, 0.5, 0));
  spr.scale.set(11, 1.1, 1);
  scene.add(spr);
  allLabels.push({ spr, text, darkColor: dkColor, fs });
  return spr;
}

function redrawLabels() {
  allLabels.forEach(({ spr, text, darkColor, fs }) => {
    const color = isLight ? 'rgba(0,0,0,0.85)' : darkColor;
    const c = makeLabelCanvas(text, color, fs);
    spr.material.map.dispose();
    spr.material.map = new THREE.CanvasTexture(c);
    spr.material.needsUpdate = true;
  });
}

function buildCaseStudyMoon(era, parentPos, parentSize) {
  const cs = CASE_STUDY_DATA[era.caseStudy];
  if (!cs) return;
  const orbitR   = parentSize * 14;
  const moonR    = parentSize * 0.72;
  const baseAngle = era.caseStudy === 'gnc' ? Math.PI * 0.6 : Math.PI * 1.4;
  const speed    = 0.07;
  const tiltY    = 0.30;
  const tiltZ    = 0.18;
  const color    = cs.color;

  const orbitPts = [];
  for (let k = 0; k <= 80; k++) {
    const a = (k / 80) * Math.PI * 2;
    orbitPts.push(new THREE.Vector3(Math.cos(a) * orbitR, Math.sin(a) * orbitR * tiltY, Math.sin(a) * orbitR * tiltZ));
  }
  const orbitLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(orbitPts),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.18, depthWrite: false })
  );
  scene.add(orbitLine);
  allLines.push({ line: orbitLine, darkOp: 0.18, lightOp: 0.35, darkColor: color, lightColor: 0x333333 });

  const moonGeo = new THREE.SphereGeometry(moonR, 20, 20);
  const moonMat = new THREE.MeshPhysicalMaterial({
    color, emissive: color, emissiveIntensity: 1.6,
    metalness: 0.1, roughness: 0.05, clearcoat: 1.0,
    transparent: true, opacity: 0.92
  });
  const moonMesh = new THREE.Mesh(moonGeo, moonMat);
  moonMesh.userData = { isCaseStudy: true, caseStudy: era.caseStudy, era };
  scene.add(moonMesh);

  const hitGeo = new THREE.SphereGeometry(moonR * 3.5, 8, 8);
  const hitMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false });
  const hitMesh = new THREE.Mesh(hitGeo, hitMat);
  hitMesh.userData = { isCaseStudy: true, caseStudy: era.caseStudy, era };
  scene.add(hitMesh);

  const ringInner = moonR * 1.45, ringOuter = moonR * 2.55;
  const ringGeo = new THREE.RingGeometry(ringInner, ringOuter, 48);
  const ringMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.55, depthWrite: false });
  const ringMesh = new THREE.Mesh(ringGeo, ringMat);
  ringMesh.rotation.x = Math.PI * 0.42; ringMesh.rotation.y = Math.PI * 0.15;
  scene.add(ringMesh);

  const ring2Geo = new THREE.RingGeometry(ringOuter * 1.05, ringOuter * 1.38, 48);
  const ring2Mat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.18, depthWrite: false });
  const ring2Mesh = new THREE.Mesh(ring2Geo, ring2Mat);
  ring2Mesh.rotation.x = ringMesh.rotation.x; ring2Mesh.rotation.y = ringMesh.rotation.y;
  scene.add(ring2Mesh);

  const glow = makeGlowSprite(color, moonR);
  glow.scale.setScalar(moonR * 10); glow.material.opacity = 0.5;
  scene.add(glow);

  const lc = document.createElement('canvas'); lc.width = 384; lc.height = 56;
  const lctx = lc.getContext('2d');
  lctx.fillStyle = cs.hex + 'cc';
  lctx.font = '300 13px "DM Mono", monospace';
  lctx.letterSpacing = '0.14em';
  lctx.fillText('CASE STUDY  ·  ' + cs.label.toUpperCase(), 8, 34);
  const labelSpr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(lc), transparent: true, depthWrite: false }));
  labelSpr.scale.set(5.2, 0.76, 1); labelSpr.material.opacity = 0.85;
  scene.add(labelSpr);

  caseStudyMoons.push({ era, parentPos, orbitR, tiltY, tiltZ, baseAngle, speed, moonMesh, hitMesh, ringMesh, ring2Mesh, glow, labelSpr, orbitLine, cs });
}

function tickCaseStudyMoons(elapsed) {
  caseStudyMoons.forEach(m => {
    const p = m.era._pos;
    const angle = m.baseAngle + elapsed * m.speed;
    const ox = p.x + Math.cos(angle) * m.orbitR;
    const oy = p.y + Math.sin(angle) * m.orbitR * m.tiltY;
    const oz = p.z + Math.sin(angle) * m.orbitR * m.tiltZ;
    m.moonMesh.position.set(ox, oy, oz);
    m.hitMesh.position.set(ox, oy, oz);
    m.ringMesh.position.set(ox, oy, oz);
    m.ring2Mesh.position.set(ox, oy, oz);
    m.glow.position.set(ox, oy, oz);
    m.labelSpr.position.set(ox + 0.2, oy + 0.55, oz);
    m.orbitLine.position.copy(p);
    const pulse = 0.45 + Math.sin(elapsed * 0.8 + m.baseAngle) * 0.10;
    m.ringMesh.material.opacity = pulse;
  });
}

function buildMoons(era, parentPos, parentSize) {
  if (!era.moons || era.moons.length === 0) return null;
  const system = { moons: [], parentEra: era };
  const orbit1 = era.moons.slice(0, Math.min(3, era.moons.length));
  const orbit2 = era.moons.length > 3 ? era.moons.slice(3) : [];

  [orbit1, orbit2].forEach((group, orbitIdx) => {
    if (!group.length) return;
    const orbitR = parentSize * 8 + orbitIdx * parentSize * 5.5;
    const tiltY  = orbitIdx === 0 ? 0.22 : 0.38;
    const ringPts = [];
    for (let k = 0; k <= 64; k++) {
      const a = (k / 64) * Math.PI * 2;
      ringPts.push(new THREE.Vector3(Math.cos(a) * orbitR, Math.sin(a) * orbitR * tiltY, Math.sin(a) * orbitR * 0.28));
    }
    const ring = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(ringPts),
      new THREE.LineBasicMaterial({ color: era.color, transparent: true, opacity: 0.055, depthWrite: false })
    );
    scene.add(ring);
    allLines.push({ line: ring, darkOp: 0.055, lightOp: 0.25, darkColor: era.color, lightColor: 0x000000 });

    group.forEach((moon, mi) => {
      const baseAngle = (mi / group.length) * Math.PI * 2;
      const speed = 0.16 + orbitIdx * 0.09 + mi * 0.025;
      const { canvas } = makeMoonLabelCanvas(moon.label, era.hex);
      const dotGeo = new THREE.SphereGeometry(parentSize * 0.35, 8, 8);
      const dotMat = new THREE.MeshPhysicalMaterial({
        color: era.color, emissive: era.color, emissiveIntensity: 1.2,
        metalness: 0, roughness: 0.1, transparent: true, opacity: 0, depthWrite: false
      });
      const dot = new THREE.Mesh(dotGeo, dotMat);
      scene.add(dot);
      const dotGlow = makeGlowSprite(era.color, parentSize * 0.35);
      dotGlow.material.opacity = 0;
      scene.add(dotGlow);
      const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, depthWrite: false }));
      spr.scale.set(3.6, 0.45, 1);
      spr.userData = { isMoonLabel: true, moon, era };
      scene.add(spr);
      system.moons.push({ dot, dotGlow, spr, moon, baseAngle, orbitR, tiltY, orbitIdx, speed, ring, era });
    });
  });

  moonSystems.push(system);
  return system;
}

function tickMoons(elapsed) {
  moonSystems.forEach(sys => {
    const pos = sys.parentEra._pos;
    sys.moons.forEach(m => {
      const angle = m.baseAngle + elapsed * m.speed;
      const ox = pos.x + Math.cos(angle) * m.orbitR;
      const oy = pos.y + Math.sin(angle) * m.orbitR * m.tiltY;
      const oz = pos.z + Math.sin(angle) * m.orbitR * 0.28;
      m.dot.position.set(ox, oy, oz);
      m.dotGlow.position.set(ox, oy, oz);
      m.spr.position.set(ox + 0.18, oy + 0.16, oz);
      m.ring.position.copy(pos);
      const targetOp = isFocused && focusedEra && focusedEra.id === m.era.id ? 1.0 : 0.0;
      m.dot.material.opacity += (targetOp * 0.85 - m.dot.material.opacity) * 0.08;
      m.dotGlow.material.opacity += (targetOp * 0.55 - m.dotGlow.material.opacity) * 0.08;
      m.spr.material.opacity += (targetOp * 0.72 - m.spr.material.opacity) * 0.08;
    });
  });
}

function buildSpiralTube() {
  const pts = ERAS.map(e => e._spiralPos.clone());
  const curve = new THREE.CatmullRomCurve3(pts);
  const tubePts = curve.getPoints(200);
  const tubeMat = new THREE.LineBasicMaterial({ color: 0xdaa520, transparent: true, opacity: 0.08 });
  const tube = new THREE.Line(new THREE.BufferGeometry().setFromPoints(tubePts), tubeMat);
  scene.add(tube);
  allLines.push({ line: tube, darkOp: 0.08, lightOp: 0.22, darkColor: 0xdaa520, lightColor: 0x000000 });
  const innerMat = new THREE.LineBasicMaterial({ color: 0xb87333, transparent: true, opacity: 0.04 });
  const inner = new THREE.Line(new THREE.BufferGeometry().setFromPoints(tubePts), innerMat);
  scene.add(inner);

function makeClusterCanvas(cluster, forLight) {
  const c = document.createElement('canvas'); c.width = 512; c.height = 256;
  const ctx = c.getContext('2d');
  const r = (cluster.color >> 16) & 255, g = (cluster.color >> 8) & 255, b = cluster.color & 255;
  const nameColor  = forLight ? 'rgba(10,14,30,0.88)'  : `rgba(${r},${g},${b},0.95)`;
  const subColor   = forLight ? 'rgba(10,14,30,0.44)'  : `rgba(${r},${g},${b},0.50)`;
  const countColor = forLight ? 'rgba(10,14,30,0.28)'  : `rgba(${r},${g},${b},0.30)`;
  ctx.fillStyle = nameColor;
  ctx.font = '900 38px "Crimson Text", serif';
  const lines = cluster.name.split('\n');
  lines.forEach((ln, i) => ctx.fillText(ln, 12, 60 + i * 48));
  ctx.fillStyle = subColor;
  ctx.font = '300 18px "DM Mono", monospace';
  ctx.fillText(cluster.sub, 12, 60 + lines.length * 48 + 24);
  ctx.fillStyle = countColor;
  ctx.font = '300 15px "DM Mono", monospace';
  ctx.fillText(cluster.nodeIds.length + ' nodes', 12, 60 + lines.length * 48 + 48);
  return c;
}

function getClusterDotPositions(cl) {
  const R = cl.size * 5.5, DS = cl.size * 0.28;
  return cl.nodeIds.map((_, i) => {
    const a = (i / Math.max(cl.nodeIds.length, 1)) * Math.PI * 2;
    return { x: Math.cos(a) * R * 0.75, y: 0, z: Math.sin(a) * R * 0.75, size: DS };
  });
}

function buildGalaxyLayer() {
  CLUSTERS.forEach(cl => {
    const geo = new THREE.SphereGeometry(cl.size, 32, 32);
    const mat = new THREE.MeshPhysicalMaterial({ color: cl.color, emissive: cl.color, emissiveIntensity: 1.8, metalness: 0.05, roughness: 0.35, clearcoat: 0.6, transparent: true, opacity: 0 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(cl.pos);
    mesh.userData = { cluster: cl };
    galaxyGroup.add(mesh);

    const atmGeo = new THREE.SphereGeometry(cl.size * 1.55, 24, 24);
    const atmMat = new THREE.MeshBasicMaterial({ color: cl.color, transparent: true, opacity: 0, side: THREE.BackSide, depthWrite: false });
    const atm = new THREE.Mesh(atmGeo, atmMat);
    atm.position.copy(cl.pos);
    galaxyGroup.add(atm);

    const glowSpr = makeGlowSprite(cl.color, cl.size);
    glowSpr.scale.setScalar(cl.size * 9); glowSpr.position.copy(cl.pos); glowSpr.material.opacity = 0;
    galaxyGroup.add(glowSpr);

    const lc = makeClusterCanvas(cl, false);
    const lSpr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(lc), transparent: true, depthWrite: false }));
    lSpr.scale.set(28, 14, 1);
    lSpr.position.set(cl.pos.x - cl.size * 6.5, cl.pos.y + cl.size * 3.5, cl.pos.z);
    lSpr.material.opacity = 0;
    galaxyGroup.add(lSpr);

    const ringPts = [];
    for (let i = 0; i <= 80; i++) {
      const a = i / 80 * Math.PI * 2;
      ringPts.push(new THREE.Vector3(cl.pos.x + Math.cos(a) * cl.size * 1.35, cl.pos.y, cl.pos.z + Math.sin(a) * cl.size * 1.35));
    }
    const ringMat = new THREE.LineBasicMaterial({ color: cl.color, transparent: true, opacity: 0 });
    const ringLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(ringPts), ringMat);
    galaxyGroup.add(ringLine);
    galaxyLines.push({ line: ringLine, baseOp: 0.35 });

    const dotPositions = getClusterDotPositions(cl);
    cl.nodeIds.forEach((nid, ni) => {
      const node = ERA_BY_ID[nid]; if (!node) return;
      const offset = dotPositions[ni] || dotPositions[0];
      const dotPos = new THREE.Vector3(cl.pos.x + offset.x, cl.pos.y + offset.y, cl.pos.z + offset.z);
      const dotSize = offset.size || 0.22;
      const dotGeo = new THREE.SphereGeometry(dotSize, 16, 16);
      const dotMat = new THREE.MeshPhysicalMaterial({ color: cl.color, emissive: cl.color, emissiveIntensity: 1.6, metalness: 0.05, roughness: 0.15, clearcoat: 0.8, transparent: true, opacity: 0 });
      const dot = new THREE.Mesh(dotGeo, dotMat);
      dot.position.copy(dotPos);
      dot.userData = { clusterDot: true, nodeId: nid, cluster: cl };
      galaxyGroup.add(dot);

      const dotGlow = makeGlowSprite(cl.color, dotSize);
      dotGlow.scale.setScalar(dotSize * 9); dotGlow.position.copy(dotPos); dotGlow.material.opacity = 0;
      galaxyGroup.add(dotGlow);
      galaxyObjects.push({ type: 'dot', mesh: dot, glow: dotGlow, cluster: cl, nodeId: nid });

      const threadMat = new THREE.LineBasicMaterial({ color: cl.color, transparent: true, opacity: 0 });
      const threadLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([dotPos, cl.pos.clone()]), threadMat);
      galaxyGroup.add(threadLine);
      threadLine.userData = { cluster: cl };
      galaxyLines.push({ line: threadLine, baseOp: 0.12, clusterId: cl.id });
    });

    galaxyObjects.push({ type: 'cluster', mesh, atm, glow: glowSpr, label: lSpr, ring: ringLine, cluster: cl });
  });

  CLUSTER_CONNECTIONS.forEach(cc => {
    const fromCl = CLUSTERS.find(c => c.id === cc.from), toCl = CLUSTERS.find(c => c.id === cc.to);
    if (!fromCl || !toCl) return;
    const p1 = fromCl.pos.clone(), p2 = toCl.pos.clone(), mid = p1.clone().add(p2).multiplyScalar(0.5);
    mid.y += 18 + Math.random() * 12;
    const pts = new THREE.QuadraticBezierCurve3(p1, mid, p2).getPoints(40);
    const arcMat = new THREE.LineBasicMaterial({ color: 0xdaa520, transparent: true, opacity: 0, depthWrite: false });
    const arcLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), arcMat);
    galaxyGroup.add(arcLine);
    arcLine.userData = { clFrom: cc.from, clTo: cc.to };
    galaxyLines.push({ line: arcLine, baseOp: 0.28, isArc: true, label: cc.label, clFrom: cc.from, clTo: cc.to });
  });
}

let galaxyAlpha = 0, isGalaxyView = false;
const GALAXY_ENTER_THRESHOLD = 80, GALAXY_FADE_SPEED = 0.065;
let activeGalaxyCluster = null, hoveredCluster = null, hoveredDotMesh = null;

function updateGalaxyAlpha() {
  const r = camState.radius;
  let target = 0;
  if (r > GALAXY_ENTER_THRESHOLD) target = Math.min((r - GALAXY_ENTER_THRESHOLD) / (GALAXY_RADIUS_DEFAULT - GALAXY_ENTER_THRESHOLD), 1);
  galaxyAlpha += (target - galaxyAlpha) * GALAXY_FADE_SPEED;
  if (galaxyAlpha < 0.001) galaxyAlpha = 0;
  if (galaxyAlpha > 0.999) galaxyAlpha = 1;
  isGalaxyView = galaxyAlpha > 0.01;
  galaxyGroup.visible = isGalaxyView;
  galaxyHubGroup.visible = isGalaxyView;

  const oa = 1 - galaxyAlpha;
  nodeObjects.forEach(({ mesh }) => { mesh.material.opacity = isLight ? oa * 0.88 : oa * 0.95; });
  glowSprites.forEach(gs => { gs.material.opacity = isLight ? 0 : oa * 0.72; });
  allLabels.forEach(({ spr }) => { spr.material.opacity = oa; });
  allLines.forEach(({ line, darkOp, lightOp }) => {
    line.material.opacity = Math.max(0, (isLight ? lightOp : darkOp) * oa);
  });

  const ga = galaxyAlpha, focCl = activeGalaxyCluster;
  galaxyObjects.forEach(obj => {
    const isFoc = focCl && obj.cluster === focCl, dim = (focCl && !isFoc) ? 0.18 : 1.0;
    if (obj.type === 'cluster') {
      const boost = isFoc ? 1.25 : 1.0;
      obj.mesh.material.opacity = ga * 1.0 * dim * boost;
      obj.atm.material.opacity = ga * (isFoc ? 0.45 : 0.20) * dim;
      obj.glow.material.opacity = isLight ? 0 : ga * (isFoc ? 1.4 : 0.80) * dim;
      obj.label.material.opacity = ga * dim;
      obj.ring.material.opacity = ga * (isFoc ? 0.90 : 0.55) * dim;
    } else if (obj.type === 'dot') {
      const isHov = obj.mesh === hoveredDotMesh, inFoc = focCl && obj.cluster === focCl, noFoc = !focCl;
      let tOp, tEI, tGlow;
      if (isHov) { tOp = ga * 1.0; tEI = 2.4; tGlow = isLight ? 0 : ga * 0.90; }
      else if (inFoc || noFoc) { tOp = ga * 0.88; tEI = 1.6; tGlow = isLight ? 0 : ga * 0.45; }
      else { tOp = ga * 0.15; tEI = 0.3; tGlow = 0; }
      const lk = 0.10;
      obj.mesh.material.opacity += (tOp - obj.mesh.material.opacity) * lk;
      obj.mesh.material.emissiveIntensity += (tEI - obj.mesh.material.emissiveIntensity) * lk;
      if (obj.glow) obj.glow.material.opacity += (tGlow - obj.glow.material.opacity) * lk;
    }
  });

  galaxyLines.forEach(({ line, baseOp, isArc, clFrom, clTo, clusterId }) => {
    let op = baseOp * 1.8, dim = 1.0;
    if (focCl) {
      if (isArc) { const inv = clFrom === focCl.id || clTo === focCl.id; dim = inv ? 1.0 : 0.12; if (inv) op = Math.min(op * 2.0, 0.95); }
      else { dim = (!clusterId || clusterId === focCl.id) ? 1.0 : 0.12; }
    }
    line.material.opacity = Math.min(ga * op * dim, 0.95);
  });

  if (isGalaxyView && galaxyHubGroup.userData.mesh) {
    const hub = galaxyHubGroup.userData, hDim = focCl ? 0.30 : 1.0, lk = 0.10;
    hub.mesh.material.opacity += (ga * 1.0 * hDim - hub.mesh.material.opacity) * lk;
    hub.atm.material.opacity  += (ga * 0.28 * hDim - hub.atm.material.opacity)  * lk;
    hub.glow.material.opacity += ((isLight ? 0 : ga * 0.95 * hDim) - hub.glow.material.opacity) * lk;
    hub.label.material.opacity+= (ga * hDim - hub.label.material.opacity) * lk;
    hub.ring.material.opacity += (ga * 0.65 * hDim - hub.ring.material.opacity) * lk;
  }

  if (typeof _galaxyNebulaTick === 'undefined') window._galaxyNebulaTick = 0;
  _galaxyNebulaTick++;
  if (_galaxyNebulaTick % 3 === 0) drawMesh();
}

const clusterMeshes = galaxyObjects.filter(o => o.type === 'cluster').map(o => o.mesh);
const dotMeshes = galaxyObjects.filter(o => o.type === 'dot').map(o => o.mesh);

function setGalaxyFocus(cl) { activeGalaxyCluster = cl; }
function clearGalaxyFocus() { activeGalaxyCluster = null; }

function checkGalaxyHover(mouseVec) {
  if (!isGalaxyView || galaxyAlpha < 0.3) return false;
  raycaster.setFromCamera(mouseVec, cam);
  const hubHits = raycaster.intersectObjects(hubMeshList);
  if (hubHits.length) {
    document.getElementById('tt-era').textContent = 'Gateway';
    document.getElementById('tt-title').textContent = 'Full System';
    document.getElementById('tt-title').style.color = '#daa520';
    document.getElementById('tt-role').textContent = 'All nodes · Orrery view';
    tooltip.classList.add('vis'); hoveredDotMesh = null; document.body.style.cursor = 'pointer';
    return true;
  }
  const cHits = raycaster.intersectObjects(clusterMeshes);
  if (cHits.length) {
    const cl = cHits[0].object.userData.cluster;
    if (cl !== hoveredCluster) {
      hoveredCluster = cl;
      document.getElementById('tt-era').textContent = cl.nodeIds.length + ' nodes';
      document.getElementById('tt-title').textContent = cl.name.replace('\n', ' ');
      document.getElementById('tt-title').style.color = cl.hex;
      document.getElementById('tt-role').textContent = cl.sub;
      tooltip.classList.add('vis');
    }
    hoveredDotMesh = null; setGalaxyFocus(cl); document.body.style.cursor = 'pointer';
    return true;
  }
  const dHits = raycaster.intersectObjects(dotMeshes);
  if (dHits.length) {
    const dot = dHits[0].object, node = ERA_BY_ID[dot.userData.nodeId], cl = dot.userData.cluster;
    if (node) {
      document.getElementById('tt-era').textContent = cl.name.replace('\n', ' ');
      document.getElementById('tt-title').textContent = node.title;
      document.getElementById('tt-title').style.color = cl.hex;
      document.getElementById('tt-role').textContent = node.role;
      tooltip.classList.add('vis');
    }
    hoveredDotMesh = dot; setGalaxyFocus(cl); document.body.style.cursor = 'pointer';
    return true;
  }
  hoveredDotMesh = null;
  if (hoveredCluster) { hoveredCluster = null; tooltip.classList.remove('vis'); }
  clearGalaxyFocus();
  return false;
}

function handleGalaxyClick(mouseVec) {
  if (!isGalaxyView || galaxyAlpha < 0.3) return false;
  raycaster.setFromCamera(mouseVec, cam);
  const hubHits = raycaster.intersectObjects(hubMeshList);
  if (hubHits.length) { switchLayer(LAYER_ORRERY); clearGalaxyFocus(); return true; }
  const cHits = raycaster.intersectObjects(clusterMeshes);
  if (cHits.length) { switchLayer(LAYER_ORRERY); clearGalaxyFocus(); return true; }
  const dHits = raycaster.intersectObjects(dotMeshes);
  if (dHits.length) {
    const node = ERA_BY_ID[dHits[0].object.userData.nodeId];
    if (node) { switchLayer(LAYER_ORRERY); setTimeout(() => focusEra(node), 600); }
    return true;
  }
  return false;
}

  document.querySelectorAll('.hud-btn[data-view]').forEach(b => b.classList.remove('active'));

  el.addEventListener('pointerdown', function handler(ev) {
    if (!ev.target.closest('.grid-card')) {
      closeGridView(); switchView('spiral');
      el.removeEventListener('pointerdown', handler);
    }
  });
}

function closeGridView() {

  const el = document.getElementById('grid-overlay');

const sentGhostEl = document.getElementById('sent-ghost');
const sentGhostImg = document.getElementById('sent-ghost-img');
const sentGhostCap = document.getElementById('sent-ghost-cap');

function getSentenceImage(era, sentIndex) {
  if (!era.images || era.images.length === 0) return null;
  return era.images[sentIndex % era.images.length];
}

function showSentGhost(era, sentIndex, anchorEl) {
  const img = getSentenceImage(era, sentIndex);
  if (!img) { hideSentGhost(); return; }
  sentGhostImg.src = img.src;
  sentGhostCap.textContent = img.caption || '';
  const anchorRect = anchorEl ? anchorEl.getBoundingClientRect() : { top: window.innerHeight/2, height: 40 };
  const midY = anchorRect.top + anchorRect.height / 2;
  const y = Math.max(20, Math.min(window.innerHeight - 190, midY - 82));
  const panelLeft = window.innerWidth - 28 - 360;
  sentGhostEl.style.top = y + 'px';
  sentGhostEl.style.left = Math.max(8, panelLeft - 244) + 'px';
  sentGhostEl.classList.add('vis');
}

function hideSentGhost() { sentGhostEl.classList.remove('vis'); }

let currentView = 'spiral';
let morphing = false, morphT = 0;

function switchView(view) {
  if (view === 'galaxy') { closeGridView(); switchLayer(LAYER_GALAXY); return; }
  if (currentLayer === LAYER_GALAXY) switchLayer(LAYER_ORRERY);
  if (view === 'grid') { openGridView(); return; }
  closeGridView();
  if (view === currentView) return;
  currentView = view;
  morphing = true; morphT = 0;
  document.querySelectorAll('.hud-btn[data-view]').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-view="${view}"]`).classList.add('active');
  if (view === 'arc') { camTarget.phi = Math.PI * 0.06; camTarget.theta = 0; camTarget.radius = 48; }
  else { camTarget.phi = Math.PI * 0.28; camTarget.radius = 68; }
}

document.querySelectorAll('.hud-btn[data-view]').forEach(btn => btn.addEventListener('click', () => switchView(btn.dataset.view)));

function navPrev() {
  const idx = focusedEra ? ERAS.findIndex(e => e.id === focusedEra.id) : 1;
  focusEra(idx > 0 ? ERAS[idx - 1] : ERAS[ERAS.length - 1]);
}
function navNext() {
  const idx = focusedEra ? ERAS.findIndex(e => e.id === focusedEra.id) : -1;
  focusEra(idx < ERAS.length - 1 ? ERAS[idx + 1] : ERAS[0]);
}

let focusedEra = null;

// ── IMAGE HERO: images when no URL, iframe when URL exists ──
function buildIframeHero(era) {
  const wrap = document.getElementById('gc-iframe-wrap');
  const none = document.getElementById('gc-iframe-none');

  // Clear all previous children except the "none" placeholder
  const old = wrap.querySelector('iframe');        if (old) old.remove();
  const oldBadge = wrap.querySelector('.gc-iframe-badge'); if (oldBadge) oldBadge.remove();
  const oldCover = wrap.querySelector('.gc-iframe-cover'); if (oldCover) oldCover.remove();
  const oldStrip = wrap.querySelector('.gc-img-strip');    if (oldStrip) oldStrip.remove();
  none.style.display = 'none';

  if (era.url) {
    // ── IFRAME PATH ──
    const iframe = document.createElement('iframe');
    iframe.src = era.url;
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
    iframe.setAttribute('loading', 'lazy');
    iframe.setAttribute('title', era.title + ' preview');
    wrap.appendChild(iframe);

    const cover = document.createElement('div');
    cover.className = 'gc-iframe-cover';
    wrap.appendChild(cover);

    const badge = document.createElement('a');
    badge.className = 'gc-iframe-badge';
    badge.textContent = era.url.replace('https://', '');
    badge.href = era.url;
    badge.target = '_blank';
    badge.rel = 'noopener';
    wrap.appendChild(badge);
    return;
  }

  if (era.images && era.images.length > 0) {
    // ── IMAGE STRIP PATH ──
    const strip = document.createElement('div');
    strip.className = 'gc-img-strip';

    // Track active index for dot nav
    let activeIdx = 0;

    const frames = era.images.map((imgData, i) => {
      const frame = document.createElement('div');
      frame.className = 'gc-img-frame' + (i === 0 ? ' active' : '');

      const img = document.createElement('img');
      img.src = imgData.src;
      img.alt = imgData.caption || '';
      img.loading = i === 0 ? 'eager' : 'lazy';

      const cap = document.createElement('div');
      cap.className = 'gc-img-cap';
      cap.textContent = imgData.caption || '';

      frame.appendChild(img);
      frame.appendChild(cap);
      strip.appendChild(frame);
      return frame;
    });

    // Dot nav — only shown when more than one image
    if (era.images.length > 1) {
      const dotsWrap = document.createElement('div');
      dotsWrap.className = 'gc-img-dots';

      const dots = era.images.map((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'gc-img-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => {
          frames.forEach((f, fi) => f.classList.toggle('active', fi === i));
          dots.forEach((d, di) => d.classList.toggle('active', di === i));
          activeIdx = i;
        });
        dotsWrap.appendChild(dot);
        return dot;
      });

      strip.appendChild(dotsWrap);
    }

    wrap.appendChild(strip);
    return;
  }

  // Truly no content at all
  none.style.display = 'flex';
}

function buildImageStrip(era, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  if (!era.images || era.images.length === 0) { container.style.display = 'none'; return; }
  container.style.display = 'flex';
  era.images.forEach(img => {
    const frame = document.createElement('div');
    frame.className = 'ms-img-frame';
    const el = document.createElement('img');
    el.src = img.src; el.alt = img.caption || ''; el.loading = 'lazy';
    el.onerror = () => { frame.innerHTML = `<div style="padding:8px;font-size:10px;opacity:0.4">${img.caption || 'IMG'}</div>`; };
    frame.appendChild(el);
    container.appendChild(frame);
  });
}

function buildMoonPills(era) {
  const section = document.getElementById('gc-moons');
  const pillsContainer = document.getElementById('gc-moon-pills');
  pillsContainer.innerHTML = '';
  if (!era.moons || era.moons.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  era.moons.forEach(moon => {
    const pill = document.createElement('span');
    pill.className = 'gc-moon-pill';
    pill.textContent = moon.label;
    pill.title = moon.desc || '';
    pill.addEventListener('click', () => {
      pillsContainer.querySelectorAll('.gc-moon-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    });
    pillsContainer.appendChild(pill);
  });
}

function openPanel(era) {
  const idx = ERAS.findIndex(e => e.id === era.id);
  document.getElementById('gc-era').textContent = era.era;
  document.getElementById('gc-title').textContent = era.title;
  document.getElementById('gc-role').textContent = era.role;
  document.getElementById('gc-body').textContent = era.body;
  document.getElementById('gc-tag').textContent = era.domain;
  document.getElementById('gc-prev').disabled = idx === 0;
  document.getElementById('gc-next').disabled = idx === ERAS.length - 1;

  buildIframeHero(era);
  buildImageStrip(era, 'ms-images');
  buildMoonPills(era);

  document.getElementById('ghost').classList.add('on');
  document.getElementById('ms-era').textContent = era.era;
  document.getElementById('ms-title').textContent = era.title;
  document.getElementById('ms-body').textContent = era.body;
  document.getElementById('ms-prev').disabled = idx === 0;
  document.getElementById('ms-next').disabled = idx === ERAS.length - 1;
  document.getElementById('msheet').classList.add('on');
  document.body.classList.add('panel-open');
  document.getElementById('era-year').textContent = era.year;
  document.getElementById('era-name').textContent = era.era;
}

window.closePanel = function () {
  document.getElementById('ghost').classList.remove('on');
  document.getElementById('msheet').classList.remove('on');
  document.body.classList.remove('panel-open');
  hideSentGhost();
};

// ─────────────────────────────────────────────────────────
// CASE STUDY PANEL
// ─────────────────────────────────────────────────────────
let csState = { deck: null, idx: 0 };

function openCaseStudy(key) {
  const cs = CASE_STUDY_DATA[key];
  if (!cs) return;
  csState.deck = cs.slides; csState.idx = 0;
  renderCSSlide();
  document.getElementById('cs-panel').classList.add('on');
  document.body.classList.add('cs-open');
}

window.closeCaseStudy = function() {
  document.getElementById('cs-panel').classList.remove('on');
  document.body.classList.remove('cs-open');
};
window.csNext = function() { if (!csState.deck) return; csState.idx = Math.min(csState.idx + 1, csState.deck.length - 1); renderCSSlide(); };
window.csPrev = function() { if (!csState.deck) return; csState.idx = Math.max(csState.idx - 1, 0); renderCSSlide(); };

function renderCSSlide() {
  const slide = csState.deck[csState.idx], total = csState.deck.length, idx = csState.idx;
  const acc = slide.accent || '#daa520';
  document.getElementById('cs-accent-bar').style.background = acc;
  document.getElementById('cs-type').textContent  = slide.type;
  document.getElementById('cs-era').textContent   = slide.era;
  document.getElementById('cs-title').textContent = slide.title;
  document.getElementById('cs-title').style.color = '#f5ecd5';
  document.getElementById('cs-body').textContent  = slide.body;
  const pullEl = document.getElementById('cs-pull');
  if (slide.pull) { pullEl.textContent = slide.pull; pullEl.style.display = 'block'; pullEl.style.borderLeftColor = acc; pullEl.style.color = acc; }
  else { pullEl.style.display = 'none'; }
  const statsEl = document.getElementById('cs-stats');
  if (slide.stats && slide.stats.length) {
    statsEl.style.display = 'flex';
    statsEl.innerHTML = slide.stats.map(([num, label]) =>
      `<div class="cs-stat"><div class="cs-stat-num" style="color:${acc}">${num}</div><div class="cs-stat-label">${label}</div></div>`
    ).join('');
  } else { statsEl.style.display = 'none'; }
  const imgEl = document.getElementById('cs-img');
  if (slide.img) { imgEl.src = slide.img; imgEl.style.display = 'block'; } else { imgEl.style.display = 'none'; }
  const pips = document.getElementById('cs-pips');
  pips.innerHTML = csState.deck.map((_, i) =>
    `<div class="cs-pip${i === idx ? ' active' : ''}" style="${i === idx ? `background:${acc}` : ''}" onclick="csState.idx=${i};renderCSSlide()"></div>`
  ).join('');
  document.getElementById('cs-counter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('cs-prev-btn').disabled = idx === 0;
  document.getElementById('cs-next-btn').disabled = idx === total - 1;
  document.getElementById('cs-next-btn').style.borderColor = idx < total - 1 ? acc + '66' : '';
  document.getElementById('cs-prev-btn').style.borderColor = idx > 0 ? acc + '66' : '';
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('cs-panel').classList.contains('on')) return;
  if (e.key === 'Escape') { window.closeCaseStudy(); }
  else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { window.csNext(); }
  else if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  { window.csPrev(); }
});

// ─────────────────────────────────────────────────────────
// FOCUS
// ─────────────────────────────────────────────────────────
let isFocused = false;

function eraPreset(era) {
  const pos = era._pos;
  const isMobile = window.innerWidth <= 768;
  const nodeAngle = Math.atan2(pos.z, pos.x);
  const theta = nodeAngle + Math.PI * 0.55;
  const nodeR = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
  const baseRadius = 12 + nodeR * 0.55;
  const radius = isMobile ? Math.max(10, baseRadius * 0.85) : Math.max(14, baseRadius);
  const phi = isMobile ? Math.PI * 0.25 : Math.PI * 0.34;
  const panelShift = isMobile ? 0 : 3.5;
  const screenRight = new THREE.Vector3(Math.cos(theta), 0, -Math.sin(theta));
  const pivot = pos.clone().addScaledVector(screenRight, panelShift);
  return { theta, phi, radius, pivot };
}

function focusEra(era) {
  closeGridView();
  if (currentLayer === LAYER_GALAXY) switchLayer(LAYER_ORRERY);
  isFocused = true; focusedEra = era;
  const preset = eraPreset(era);
  scenePivotTgt.copy(preset.pivot);
  swoopTo(preset.phi, preset.theta, preset.radius, preset.pivot);
  camTarget.phi    = preset.phi;
  camTarget.theta  = preset.theta;
  camTarget.radius = preset.radius;
  activeNodeNebulaIdx = ERAS.findIndex(e => e.id === era.id);
  openPanel(era);
  highlightConnections(era);
}

function highlightConnections(era) {
  const idx = ERAS.findIndex(e => e.id === era.id);
  nodeObjects.forEach(({ mesh }, i) => {
    const near = Math.abs(i - idx) <= 2;
    mesh.material.opacity = near ? 0.96 : 0.18;
    mesh.material.emissiveIntensity = near ? (mesh.userData.origEI * 1.5) : 0.1;
  });
  allLines.forEach(({ line, darkOp }) => { line.material.opacity = darkOp * 0.3; });
}

function resetHighlights() {
  nodeObjects.forEach(({ mesh }) => { mesh.material.opacity = 0.92; mesh.material.emissiveIntensity = mesh.userData.origEI; });
  allLines.forEach(({ line, darkOp, lightOp }) => { line.material.opacity = isLight ? lightOp : darkOp; });
}

function showMoonGhost() { /* no-op */ }
function hideMoonGhost() { /* no-op */ }

// ─────────────────────────────────────────────────────────
// INTERACTION
// ─────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let hoveredMesh = null, mouse = new THREE.Vector2();
let drag = false, lastDragX = 0, lastDragY = 0, isDragging = false;
let hintFaded = false, orbitPaused = false;
let hoveredNodeMesh = null;

function getAllHittable() {
  const meshes = [];
  nodeObjects.forEach(o => { meshes.push(o.mesh); if (o.hitMesh) meshes.push(o.hitMesh); });
  caseStudyMoons.forEach(m => { meshes.push(m.moonMesh); meshes.push(m.hitMesh); });
  return meshes;
}

function checkHover(clientX, clientY) {
  if (checkGalaxyHover(mouse)) return;
  raycaster.setFromCamera(mouse, cam);
  const hits = raycaster.intersectObjects(getAllHittable());

  if (hoveredNodeMesh && (!hits.length || hits[0].object !== hoveredNodeMesh)) {
    hoveredNodeMesh.scale.setScalar(hoveredNodeMesh.userData._baseScale || 1);
    hoveredNodeMesh = null;
  }

  if (hits.length) {
    const hit = hits[0].object;
    const csHit = hit.userData.isCaseStudy ? caseStudyMoons.find(m => m.moonMesh === hit || m.hitMesh === hit) : null;
    if (csHit && hoveredMesh !== hit) {
      hoveredMesh = hit;
      document.getElementById('tt-era').textContent = csHit.cs.label + '  ·  Case Study';
      document.getElementById('tt-title').textContent = csHit.era.title;
      document.getElementById('tt-title').style.color = csHit.cs.hex;
      document.getElementById('tt-role').textContent = 'Click to open case study';
      document.getElementById('tt-sub').textContent = '';
      tooltip.classList.add('vis');
      document.body.style.cursor = 'pointer';
      return;
    }
    const nodeObj = nodeObjects.find(o => o.mesh === hit || o.hitMesh === hit);
    const e = nodeObj ? nodeObj.era : null;
    if (e && hoveredMesh !== hit) {
      hoveredMesh = hit;
      document.getElementById('tt-era').textContent = e.era;
      document.getElementById('tt-title').textContent = e.title;
      document.getElementById('tt-title').style.color = isLight ? '#2a1000' : '#f5ecd5';
      document.getElementById('tt-role').textContent = e.role;
      document.getElementById('tt-sub').textContent = '';
      tooltip.classList.add('vis');
    }
    if (nodeObj && nodeObj.mesh !== hoveredNodeMesh) {
      if (hoveredNodeMesh) {
        hoveredNodeMesh.scale.setScalar(hoveredNodeMesh.userData._baseScale || 1);
        const prevObj = nodeObjects.find(o => o.mesh === hoveredNodeMesh);
        if (prevObj && prevObj.hitMesh) prevObj.hitMesh.scale.setScalar(1);
      }
      hoveredNodeMesh = nodeObj.mesh;
      if (!hoveredNodeMesh.userData._baseScale) hoveredNodeMesh.userData._baseScale = 1;
      hoveredNodeMesh.scale.setScalar(1.55);
      if (nodeObj.hitMesh) nodeObj.hitMesh.scale.setScalar(1.55);
    }
    document.body.style.cursor = 'pointer';
  } else {
    if (hoveredMesh) { hoveredMesh = null; tooltip.classList.remove('vis'); }
    document.body.style.cursor = 'default';
  }
}

function posTooltip(cx, cy) {
  const isMobile = window.innerWidth <= 768;
  const ttEl = document.getElementById('tt-inner');
  const ttW = ttEl ? ttEl.offsetWidth || 220 : 220;
  const ttH = ttEl ? ttEl.offsetHeight || 80 : 80;
  let x, y;
  if (isMobile) { x = cx - ttW - 12; y = cy - ttH - 12; }
  else { x = cx + 18; y = cy - 10; }
  x = Math.max(8, Math.min(window.innerWidth  - ttW - 8, x));
  y = Math.max(8, Math.min(window.innerHeight - ttH - 8, y));
  tooltip.style.transform = `translate(${x}px,${y}px)`;
}

let pointerDownX = 0, pointerDownY = 0;
const isMobileDevice = () => window.innerWidth <= 768;

cvs.addEventListener('pointerdown', e => {
  if (e.button === 2) return;
  isDragging = false; drag = false;
  pointerDownX = e.clientX; pointerDownY = e.clientY;
  lastDragX = e.clientX; lastDragY = e.clientY;
  cvs.setPointerCapture(e.pointerId);
});

cvs.addEventListener('pointermove', e => {
  const rect = cvs.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / rect.width * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  posTooltip(e.clientX, e.clientY);

  if (e.buttons && e.button !== 2) {
    const dx = e.clientX - pointerDownX, dy = e.clientY - pointerDownY;
    const dragThreshold = isMobileDevice() ? 12 : 4;
    if (!drag && Math.sqrt(dx*dx + dy*dy) > dragThreshold) {
      drag = true;
      if (swoop.active) { swoop.active = false; camTarget.phi = camState.phi; camTarget.theta = camState.theta; camTarget.radius = camState.radius; }
    }
    if (drag) {
      isDragging = true;
      const sensitivity = isMobileDevice() ? 0.004 : 0.005;
      camTarget.theta -= (e.clientX - lastDragX) * sensitivity;
      camTarget.phi = Math.max(0.04, Math.min(Math.PI * 0.48, camTarget.phi + (e.clientY - lastDragY) * sensitivity));
    }
    lastDragX = e.clientX; lastDragY = e.clientY;
  } else {
    if (e.pointerType === 'mouse') checkHover(e.clientX, e.clientY);
  }
});

cvs.addEventListener('pointerup', e => {
  if (e.button === 2) return;
  const dx = e.clientX - pointerDownX, dy = e.clientY - pointerDownY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (isMobileDevice()) {
    const SWIPE_THRESHOLD = 48, AXIS_RATIO = 1.4;
    if (dist > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy) * AXIS_RATIO) {
      if (dx < 0) navNext(); else navPrev();
      return;
    }
    if (dist < 16) {
      if (handleGalaxyClick(mouse)) return;
      raycaster.setFromCamera(mouse, cam);
      const hits = raycaster.intersectObjects(getAllHittable());
      if (hits.length) {
        const hit = hits[0].object;
        if (hit.userData.isCaseStudy) { openCaseStudy(hit.userData.caseStudy); return; }
        const nodeObj = nodeObjects.find(o => o.mesh === hit || o.hitMesh === hit);
        if (nodeObj) {
          if (focusedEra && nodeObj.era.id === focusedEra.id) openPanel(focusedEra);
          else focusEra(nodeObj.era);
        }
      } else if (focusedEra) {
        const sheet = document.getElementById('msheet');
        if (sheet.classList.contains('on')) document.getElementById('msheet').classList.remove('on');
        else openPanel(focusedEra);
      }
    }
    return;
  }

  if (!drag) {
    if (handleGalaxyClick(mouse)) { if (!hintFaded) { document.getElementById('hint').style.opacity = '0.05'; hintFaded = true; } return; }
    raycaster.setFromCamera(mouse, cam);
    const hits = raycaster.intersectObjects(getAllHittable());
    if (hits.length) {
      const hit = hits[0].object;
      if (hit.userData.isCaseStudy) { openCaseStudy(hit.userData.caseStudy); return; }
      const nodeObj = nodeObjects.find(o => o.mesh === hit || o.hitMesh === hit);
      if (nodeObj) focusEra(nodeObj.era);
    } else if (isFocused) {
      document.getElementById('ghost').classList.remove('on');
      document.getElementById('msheet').classList.remove('on');
      hideSentGhost();
      focusedEra = null; isFocused = false;
      swoop.active = false;
      activeNodeNebulaIdx = -1;
      scenePivotTgt.set(0, 0, 0);
      camTarget.radius = 68; camTarget.phi = Math.PI * 0.28; camTarget.theta = Math.PI * 0.1;
      resetHighlights();
    }
  }
  if (!hintFaded) { document.getElementById('hint').style.opacity = '0.05'; hintFaded = true; }
});

function lockPivotToFocus() {
  if (!focusedEra || !isFocused) return;
  const preset = eraPreset(focusedEra);
  scenePivotTgt.copy(preset.pivot);
  scenePivot.copy(preset.pivot);
}

cvs.addEventListener('wheel', e => {
  if (swoop.active) { swoop.active = false; camTarget.phi = camState.phi; camTarget.theta = camState.theta; camTarget.radius = camState.radius; }
  lockPivotToFocus();
  const mx = currentLayer === LAYER_GALAXY ? GALAXY_RADIUS_MAX : ORRERY_RADIUS_MAX;
  const mn = currentLayer === LAYER_GALAXY ? GALAXY_RADIUS_MIN : ORRERY_RADIUS_MIN;
  const sensitivity = Math.max(0.012, camTarget.radius * 0.0018);
  camTarget.radius = Math.max(mn, Math.min(mx, camTarget.radius + e.deltaY * sensitivity));
}, { passive: true });

cvs.addEventListener('contextmenu', e => { e.preventDefault(); openTOC(); });

let longPressTimer = null, pinchDist = 0;

cvs.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    clearTimeout(longPressTimer);
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist = Math.sqrt(dx*dx + dy*dy);
    return;
  }
  longPressTimer = setTimeout(() => { openTOC(); }, 600);
}, { passive: true });

cvs.addEventListener('touchmove', e => {
  clearTimeout(longPressTimer);
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const delta = pinchDist - dist;
    const mn = currentLayer === LAYER_GALAXY ? GALAXY_RADIUS_MIN : ORRERY_RADIUS_MIN;
    const mx = currentLayer === LAYER_GALAXY ? GALAXY_RADIUS_MAX : ORRERY_RADIUS_MAX;
    const pinchSens = Math.max(0.03, camTarget.radius * 0.004);
    camTarget.radius = Math.max(mn, Math.min(mx, camTarget.radius + delta * pinchSens));
    lockPivotToFocus();
    pinchDist = dist;
  }
}, { passive: true });

cvs.addEventListener('touchend', () => { clearTimeout(longPressTimer); });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (tocVisible) closeTOC();
    else if (gridVisible) { closeGridView(); switchView('spiral'); }
    else closePanel();
  }
  if (e.code === 'Space') { e.preventDefault(); orbitPaused = !orbitPaused; }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    const idx = focusedEra ? ERAS.findIndex(er => er.id === focusedEra.id) : -1;
    if (idx < ERAS.length - 1) focusEra(ERAS[idx + 1]);
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (focusedEra) { const idx = ERAS.findIndex(er => er.id === focusedEra.id); if (idx > 0) focusEra(ERAS[idx - 1]); }
  }
});

// ─────────────────────────────────────────────────────────
// TABLE OF CONTENTS
// ─────────────────────────────────────────────────────────
let tocVisible = false;

function buildTOC() {
  const list = document.getElementById('toc-list');
  ERAS.forEach(era => {
    const row = document.createElement('div');
    row.className = 'toc-row';
    row.innerHTML = `<span class="toc-year">${era.year}</span><span class="toc-name">${era.title}</span><span class="toc-domain">${era.domain}</span>`;
    row.addEventListener('click', () => { closeTOC(); focusEra(era); });
    list.appendChild(row);
  });
}
buildTOC();

function openTOC() { document.getElementById('toc').classList.add('vis'); tocVisible = true; }
window.closeTOC = function () { document.getElementById('toc').classList.remove('vis'); tocVisible = false; };
document.getElementById('toc').addEventListener('click', e => { if (e.target === document.getElementById('toc')) closeTOC(); });

// ─────────────────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────────────────
function applyTheme() {
  document.body.classList.toggle('light', isLight);
  document.getElementById('theme-toggle').textContent = isLight ? 'Dark' : 'Light';
  const thb = document.getElementById('theme-toggle-hud');
  if (thb) thb.textContent = isLight ? 'DARK' : 'LIGHT';

  allLines.forEach(({ line, darkColor, lightColor, darkOp, lightOp }) => {
    line.material.color.setHex(isLight ? (lightColor || 0x5a3000) : darkColor);
    line.material.opacity = isLight ? lightOp : darkOp;
  });
  nodeObjects.forEach(({ mesh }) => {
    if (isLight) {
      mesh.material.color.setHex(0x111111); mesh.material.emissive.setHex(0x000000);
      mesh.material.emissiveIntensity = 0; mesh.material.metalness = 0; mesh.material.roughness = 0.9;
    } else {
      const ud = mesh.userData;
      mesh.material.color.setHex(ud.origColor); mesh.material.emissive.setHex(ud.origColor);
      mesh.material.emissiveIntensity = ud.origEI; mesh.material.metalness = 0.3; mesh.material.roughness = 0.08;
    }
  });
  glowSprites.forEach(gs => { gs.visible = !isLight; });
  moonSystems.forEach(sys => {
    sys.moons.forEach(m => {
      if (isLight) { m.dot.material.color.setHex(0x000000); m.dot.material.emissive.setHex(0x000000); m.dot.material.emissiveIntensity = 0; }
      else { m.dot.material.color.setHex(m.era.color); m.dot.material.emissive.setHex(m.era.color); m.dot.material.emissiveIntensity = 1.2; }
    });
  });
  moonSystems.forEach(sys => {
    sys.moons.forEach(m => {
      const { canvas } = makeMoonLabelCanvas(m.moon.label, m.era.hex);
      m.spr.material.map.dispose();
      m.spr.material.map = new THREE.CanvasTexture(canvas);
      m.spr.material.needsUpdate = true;
    });
  });
  gold1.intensity = isLight ? 0 : 5; gold2.intensity = isLight ? 0 : 4;
  warmTop.intensity = isLight ? 0 : 3; ambLight.intensity = isLight ? 1.1 : 0.12;
  pMat.opacity = isLight ? 0 : 0.12;
  scene.fog.color.setHex(isLight ? 0xffffff : 0x000000);
  renderer.setClearColor(isLight ? 0xffffff : 0x000000, 0);
  galaxyObjects.forEach(obj => {
    if (obj.type === 'cluster') {
      obj.glow.visible = !isLight;
      const newLc = makeClusterCanvas(obj.cluster, isLight);
      obj.label.material.map.dispose();
      obj.label.material.map = new THREE.CanvasTexture(newLc);
      obj.label.material.needsUpdate = true;
      if (isLight) { obj.mesh.material.color.setHex(0x1a1a20); obj.atm.material.opacity = 0.06; }
      else { obj.mesh.material.color.setHex(obj.cluster.color); }
    }
    if (obj.type === 'dot') {
      if (isLight) obj.mesh.material.color.setHex(0x3a1a00);
      else obj.mesh.material.color.setHex(obj.cluster.color);
    }
  });
  redrawLabels();
  drawMesh();
}
document.getElementById('theme-toggle').addEventListener('click', () => { isLight = !isLight; applyTheme(); });

// ─────────────────────────────────────────────────────────
// BACKGROUND MESH
// ─────────────────────────────────────────────────────────
const bgCanvas = document.getElementById('bg-mesh'), bgCtx = bgCanvas.getContext('2d');
function resizeBg() { bgCanvas.width = innerWidth; bgCanvas.height = innerHeight; } resizeBg();
const BD = [
  { x:0.12,y:0.22,vx:0.00007,vy:0.00005,r:0.65,col:[60,30,5] },
  { x:0.78,y:0.70,vx:-0.00005,vy:0.00007,r:0.55,col:[50,20,2] },
  { x:0.85,y:0.15,vx:-0.00006,vy:-0.00006,r:0.45,col:[80,45,8] },
  { x:0.20,y:0.82,vx:0.00006,vy:-0.00005,r:0.50,col:[40,15,2] },
];
const BG = [
  { x:0.12,y:0.22,vx:0.00007,vy:0.00005,r:0.68,col:[8,18,80] },
  { x:0.78,y:0.70,vx:-0.00005,vy:0.00007,r:0.58,col:[40,12,90] },
  { x:0.85,y:0.15,vx:-0.00006,vy:-0.00006,r:0.48,col:[6,50,65] },
  { x:0.20,y:0.82,vx:0.00006,vy:-0.00005,r:0.52,col:[20,8,72] },
];
const BGL = [
  { x:0.12,y:0.22,vx:0.00007,vy:0.00005,r:0.68,col:[190,195,240] },
  { x:0.78,y:0.70,vx:-0.00005,vy:0.00007,r:0.58,col:[215,195,240] },
  { x:0.85,y:0.15,vx:-0.00006,vy:-0.00006,r:0.48,col:[185,225,235] },
  { x:0.20,y:0.82,vx:0.00006,vy:-0.00005,r:0.52,col:[200,190,240] },
];
const BL = [
  { x:0.12,y:0.22,vx:0.00007,vy:0.00005,r:0.65,col:[220,220,220] },
  { x:0.78,y:0.70,vx:-0.00005,vy:0.00007,r:0.55,col:[200,200,200] },
  { x:0.85,y:0.15,vx:-0.00006,vy:-0.00006,r:0.45,col:[235,235,235] },
  { x:0.20,y:0.82,vx:0.00006,vy:-0.00005,r:0.50,col:[210,210,210] },
];

const NODE_NEBULA_DARK = [
  [[90,75,0],[70,60,0],[100,85,5],[60,50,0]],
  [[95,85,0],[80,70,0],[100,95,10],[70,60,0]],
  [[0,85,78],[0,65,60],[5,95,88],[0,50,45]],
  [[0,60,100],[0,45,80],[5,70,100],[0,35,70]],
  [[55,20,100],[42,12,85],[65,28,100],[35,8,75]],
  [[20,40,100],[12,28,85],[25,52,100],[8,20,80]],
  [[30,100,15],[20,80,8],[38,100,20],[15,70,5]],
  [[100,20,75],[85,10,60],[100,30,85],[70,8,55]],
  [[100,82,0],[85,68,0],[100,90,5],[70,55,0]],
];
let activeNodeNebulaIdx = -1;

function lerpBlobSets(setA, setB, t) {
  return setA.map((a, i) => {
    const b = setB[i];
    return { ...a, col: [
      Math.round(a.col[0] + (b.col[0] - a.col[0]) * t),
      Math.round(a.col[1] + (b.col[1] - a.col[1]) * t),
      Math.round(a.col[2] + (b.col[2] - a.col[2]) * t),
    ]};
  });
}

function drawMesh() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);
  const ga = typeof galaxyAlpha !== 'undefined' ? galaxyAlpha : 0;
  let baseSet = isLight ? BL : BD;
  if (!isLight && activeNodeNebulaIdx >= 0 && ga < 0.1) {
    const nc = NODE_NEBULA_DARK[activeNodeNebulaIdx];
    if (nc) { const nodeSet = BD.map((b, i) => ({ ...b, col: nc[i] || b.col })); baseSet = lerpBlobSets(BD, nodeSet, 0.65); }
  }
  const galaxySet = isLight ? BGL : BG;
  const blobs = ga > 0.01 ? lerpBlobSets(baseSet, galaxySet, ga) : baseSet;
  const bgBase = isLight ? '#f5f1ea' : '#05030a';
  if (ga > 0.01) {
    const t = ga;
    const baseRgb = isLight ? [245,241,234] : [5,3,10];
    const galRgb  = isLight ? [232,234,245] : [1,2,15];
    const r = Math.round(baseRgb[0] + (galRgb[0]-baseRgb[0])*t);
    const g = Math.round(baseRgb[1] + (galRgb[1]-baseRgb[1])*t);
    const b = Math.round(baseRgb[2] + (galRgb[2]-baseRgb[2])*t);
    bgCtx.fillStyle = `rgb(${r},${g},${b})`;
  } else {
    bgCtx.fillStyle = bgBase;
  }
  bgCtx.fillRect(0, 0, w, h);
  blobs.forEach(b => {
    const cx = b.x*w, cy = b.y*h, rad = Math.max(w,h)*b.r;
    const grd = bgCtx.createRadialGradient(cx,cy,0,cx,cy,rad);
    const [r,g,bl] = b.col;
    const intensity = isLight ? (ga > 0.01 ? 0.50 : 0.40) : (ga > 0.01 ? 0.65 : 0.55);
    grd.addColorStop(0, `rgba(${r},${g},${bl},${intensity})`);
    grd.addColorStop(0.5, `rgba(${r},${g},${bl},${intensity*0.28})`);
    grd.addColorStop(1, `rgba(${r},${g},${bl},0)`);
    bgCtx.fillStyle = grd; bgCtx.fillRect(0, 0, w, h);
  });
  const vig = bgCtx.createRadialGradient(w/2,h/2,h*0.3,w/2,h/2,h*0.9);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,isLight?'rgba(30,10,0,0.07)':'rgba(0,0,0,0.72)');
  bgCtx.fillStyle = vig; bgCtx.fillRect(0, 0, w, h);
}

let meshT = 0;
function tickMesh() {
  meshT++;
  [...BD,...BL,...BG,...BGL].forEach(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x<0||b.x>1) b.vx*=-1;
    if (b.y<0||b.y>1) b.vy*=-1;
  });
  if (meshT % 3 === 0) drawMesh();
  requestAnimationFrame(tickMesh);
}
drawMesh(); tickMesh();
applyTheme();

// Mobile: frame first node without opening panel
if (window.innerWidth <= 768) {
  requestAnimationFrame(() => {
    const era = ERAS[0];
    const preset = eraPreset(era);
    isFocused = true; focusedEra = era; activeNodeNebulaIdx = 0;
    scenePivotTgt.copy(preset.pivot);
    swoopTo(preset.phi, preset.theta, preset.radius, preset.pivot);
    camTarget.phi = preset.phi; camTarget.theta = preset.theta; camTarget.radius = preset.radius;
    highlightConnections(era);
    document.getElementById('era-year').textContent = era.year;
    document.getElementById('era-name').textContent = era.era;
  });
}

// ─────────────────────────────────────────────────────────
// NODE MORPH (spiral ↔ arc)
// ─────────────────────────────────────────────────────────
function tickMorph() {
  if (!morphing) return;
  morphT = Math.min(morphT + 0.04, 1);
  const ease = morphT < 0.5 ? 2*morphT*morphT : 1 - Math.pow(-2*morphT+2,2)/2;
  nodeObjects.forEach(({ mesh, hitMesh, era }, i) => {
    const from = currentView === 'arc' ? era._spiralPos : era._arcPos;
    const to   = currentView === 'arc' ? era._arcPos   : era._spiralPos;
    mesh.position.lerpVectors(from, to, ease);
    era._pos.copy(mesh.position);
    if (hitMesh) hitMesh.position.copy(mesh.position);
    if (glowSprites[i]) glowSprites[i].position.copy(mesh.position);
    if (allLabels[i*2]) allLabels[i*2].spr.position.set(mesh.position.x+0.6, mesh.position.y+0.5, mesh.position.z);
  });
  if (morphT >= 1) morphing = false;
}

// ─────────────────────────────────────────────────────────
// ANIMATE
// ─────────────────────────────────────────────────────────
let lastTime = 0, elapsed = 0;

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts; elapsed += dt;

  if (swoop.active) {
    tickSwoop(dt);
  } else {
    camState.phi   += (camTarget.phi   - camState.phi)   * 0.08;
    camState.theta += (camTarget.theta - camState.theta) * 0.08;
    camState.radius+= (camTarget.radius- camState.radius)* 0.08;
    const pivotLerpSpeed = isFocused ? 0.22 : 0.08;
    scenePivot.lerp(scenePivotTgt, pivotLerpSpeed);
    if (!isFocused && !isDragging && !orbitPaused) camTarget.theta += dt * 0.015;
  }

  if (!isFocused) {
    nodeObjects.forEach(({ mesh, era }) => {
      const pulse = 1 + Math.sin(elapsed * 0.7 + era._t * Math.PI * 2) * 0.025;
      mesh.scale.setScalar(pulse);
    });
  }

  const pa = pGeo.attributes.position.array;
  for (let i = 0; i < PC; i++) pa[i*3+1] = pOrig[i*3+1] + Math.sin(elapsed*pSp[i]+pPh[i])*0.35;
  pGeo.attributes.position.needsUpdate = true;

  tickMorph();
  tickMoons(elapsed);
  tickCaseStudyMoons(elapsed);
  updateGalaxyAlpha();

  const _ni = activeNodeNebulaIdx;
  const _nc = (!isLight && _ni >= 0 && NODE_NEBULA_DARK[_ni]) ? NODE_NEBULA_DARK[_ni][0] : null;
  if (_nc) {
    const _hex = (_nc[0]<<16)|(_nc[1]<<8)|_nc[2];
    gold1.color.setHex(_hex); gold2.color.setHex(_hex);
    gold1.intensity = 5 + Math.sin(elapsed * 0.8) * 0.5;
    gold2.intensity = 4 + Math.sin(elapsed * 0.6 + 1.2) * 0.4;
  } else {
    gold1.color.setHex(0xdaa520); gold2.color.setHex(0xb87333);
    gold1.intensity = (isLight ? 0 : 5) + Math.sin(elapsed * 0.8) * 0.5;
    gold2.intensity = (isLight ? 0 : 4) + Math.sin(elapsed * 0.6 + 1.2) * 0.4;
  }

  const ga = typeof galaxyAlpha !== 'undefined' ? galaxyAlpha : 0;
  galaxyLight1.intensity = isLight ? 0 : ga * (6 + Math.sin(elapsed * 0.4) * 1.0);
  galaxyLight2.intensity = isLight ? 0 : ga * (5 + Math.sin(elapsed * 0.5 + 1) * 0.8);
  galaxyLight3.intensity = isLight ? 0 : ga * (4 + Math.sin(elapsed * 0.3 + 2) * 0.6);

  applyCam();
  renderer.render(scene, cam);
  isDragging = false;
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  resizeBg(); drawMesh();
});
</script>
