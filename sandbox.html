<title>zackgort.sandbox — metallica </title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; cursor:none; }
  canvas { display:block; position:fixed; inset:0; }
  #cursor-canvas { display:block; position:fixed; inset:0; z-index:100; pointer-events:none; }
  #count {
    position:fixed; top:38px; right:60px;
    font-family:'DM Mono',monospace; font-weight:300;
    font-size:9px; letter-spacing:.2em; text-transform:uppercase;
    color:rgba(255,255,255,0.14); pointer-events:none; z-index:20;
  }

  #top-header {
    position:fixed; top:22px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
    z-index:20;
    filter: drop-shadow(0 0 18px #000) drop-shadow(0 0 40px #000) drop-shadow(0 0 60px #000);
  }
  #logo-widget {
    width:180px; height:180px;
    cursor:none; user-select:none;
    background:#000;
  }
  #logo-svg { width:100%; height:100%; fill:#fff; display:block; pointer-events:none; }

  #info-btn {
    width:22px; height:22px; border-radius:50%;
    border:1px solid rgba(255,255,255,0.22);
    font-family:'DM Mono',monospace; font-weight:300;
    font-size:11px; color:rgba(255,255,255,0.35);
    display:flex; align-items:center; justify-content:center;
    cursor:none;
    transition: color .2s, border-color .2s;
  }
  #info-btn:hover { color:rgba(255,255,255,0.8); border-color:rgba(255,255,255,0.5); }

  #info-overlay {
    position:fixed; inset:0; z-index:50;
    background:rgba(0,0,0,0.92);
    display:none; align-items:center; justify-content:center;
  }
  #info-overlay.visible { display:flex; }
  #info-close {
    position:absolute; top:28px; right:30px;
    font-family:'DM Mono',monospace; font-weight:300;
    font-size:18px; color:rgba(255,255,255,0.3);
    cursor:none; line-height:1;
    transition: color .2s;
  }
  #info-close:hover { color:rgba(255,255,255,0.8); }

  .filter-widget {
    position: fixed;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 20;
    display: flex;
    flex-direction: column;
    filter: drop-shadow(0 0 18px #000) drop-shadow(0 0 40px #000);
    max-width: 420px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  
  #albums-widget { left: 28px; bottom: 28px; }
  #tags-widget { right: 28px; bottom: 28px; }

  /* Mobile: thinner margins */
  @media (max-width: 600px) {
    #albums-widget { left: 10px; bottom: 10px; max-width: calc(50vw - 14px); }
    #tags-widget { right: 10px; bottom: 10px; max-width: calc(50vw - 14px); }
  }

  .widget-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    user-select: none;
  }
  .widget-topbar:hover { background: rgba(255,255,255,0.06); }

  .filter-header {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    pointer-events: none;
  }

  .collapse-btn {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1;
    color: rgba(255,255,255,0.3);
    cursor: none;
    padding: 0 4px;
    transition: color 0.2s;
  }
  .collapse-btn:hover { color: #fff; }

  .widget-content {
    padding: 16px;
    display: block;
  }

  .filter-widget.collapsed .widget-content { display: none; }
  .filter-widget.collapsed .widget-topbar { border-bottom: none; }

  .filter-btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.22);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 10px;
    cursor: none;
    transition: all 0.2s;
    user-select: none;
  }
  .filter-btn:hover {
    color: rgba(255,255,255,0.7);
    border-color: rgba(255,255,255,0.3);
  }
  .filter-btn.related {
    color: rgba(255,255,255,0.45);
    border-color: rgba(255,255,255,0.15);
  }
  .filter-btn.active {
    background: #fff;
    color: #000;
    border-color: #fff;
  }
</style>
</head>

<script>
const TRACKS = [
  { id:1,  album:"Kill 'Em All",       year:1983, tags:['speed','aggression','metal'],        text:"Hit the Lights opens with a pure velocity statement — speed and volume elevated to a kind of manifesto for what thrash metal would become." },
  { id:2,  album:"Kill 'Em All",       year:1983, tags:['mythology','war','power'],           text:"The Four Horsemen reframes the biblical apocalypse as a vehicle for guitar interplay, with Hetfield's extended metaphor riding a relentless galloping rhythm." },
  { id:3,  album:"Kill 'Em All",       year:1983, tags:['speed','aggression','lifestyle'],    text:"Motorbreath is a brief, breathless celebration of living fast, treating exhaustion as a moral failing rather than a natural consequence." },
  { id:4,  album:"Kill 'Em All",       year:1983, tags:['aggression','defiance','hell'],      text:"Jump in the Fire adapts an earlier Diamond Head-influenced demo into a lurching invitation from a demonic narrator, one of Hetfield's first experiments in writing from an antagonist's perspective." },
  { id:5,  album:"Kill 'Em All",       year:1983, tags:['isolation','bass','trauma'],         text:"(Anesthesia) – Pulling Teeth is the album's anomaly — Cliff Burton's solo bass showcase, aching and strange, hinting at emotional depths the rest of the record barely acknowledged." },
  { id:6,  album:"Kill 'Em All",       year:1983, tags:['aggression','metal','community'],    text:"Whiplash is essentially a love letter to the pit, collapsing the distance between performer and audience into a single thrashing body." },
  { id:7,  album:"Kill 'Em All",       year:1983, tags:['power','mythology','darkness'],      text:"Phantom Lord builds a feudal fantasy villain with convincing menace, showing the band could sustain a dramatic narrative across a longer track without losing momentum." },
  { id:8,  album:"Kill 'Em All",       year:1983, tags:['war','aggression','defiance'],       text:"No Remorse is an early example of Metallica's war-as-spectacle mode — the carnage described with such aesthetic relish that moral critique becomes genuinely ambiguous." },
  { id:9,  album:"Kill 'Em All",       year:1983, tags:['aggression','predator','metal'],     text:"Seek and Destroy remains a live staple four decades on, its central riff so perfectly calibrated that the song functions as both threat and anthem." },
  { id:10, album:"Kill 'Em All",       year:1983, tags:['metal','community','aggression'],    text:"Metal Militia closes the debut as collective declaration, the band explicitly positioning thrash as a unified movement rather than just a style." },
  { id:11, album:'Ride the Lightning',  year:1984, tags:['death','fear','punishment'],         text:"Fight Fire with Fire opens with pastoral acoustic guitar before detonating into a nuclear-age parable about mutually assured destruction as the only available logic." },
  { id:12, album:'Ride the Lightning',  year:1984, tags:['death','punishment','justice'],      text:"Ride the Lightning takes the condemned prisoner's interiority seriously — fear, confusion, and rage in the moments before execution — making capital punishment viscerally personal." },
  { id:13, album:'Ride the Lightning',  year:1984, tags:['love','loss','grief'],               text:"For Whom the Bell Tolls draws on Hemingway's wartime meditation to craft a tolling, doom-laden portrait of soldiers dying for purposes they no longer understand." },
  { id:14, album:'Ride the Lightning',  year:1984, tags:['despair','suicide','darkness'],      text:"Fade to Black was the band's first ballad and their most controversial — the gradual dimming of its arrangement mirrors the psychological logic of someone talking themselves toward the edge." },
  { id:15, album:'Ride the Lightning',  year:1984, tags:['mythology','power','occult'],        text:"Trapped Under Ice channels claustrophobic cryogenic horror, an early sign of the band's interest in the body as something that can be imprisoned as much as the mind." },
  { id:16, album:'Ride the Lightning',  year:1984, tags:['defiance','speed','aggression'],     text:"Escape is often dismissed as the album's weakest link, but its blunt individualism — leave the herd, trust no one — anticipates the antisocial streak running through much of the band's later work." },
  { id:17, album:'Ride the Lightning',  year:1984, tags:['war','death','futility'],            text:"Creeping Death retells the Exodus plagues as thrash theater, the crowd's ritual chant of \"Die!\" transforming scripture into something communal and cathartic." },
  { id:18, album:'Ride the Lightning',  year:1984, tags:['instrumental','darkness','power'],   text:"The Call of Ktulu is an eight-minute Lovecraft adaptation that proved the band could sustain dread across an entire side of vinyl without a single vocal line." },
  { id:19, album:'Master of Puppets',   year:1986, tags:['war','corruption','power'],          text:"Battery opens with classical acoustic counterpoint that snaps instantly into thrash, a structural trick that defines the entire album's method: beauty weaponized." },
  { id:20, album:'Master of Puppets',   year:1986, tags:['addiction','control','despair'],     text:"Master of Puppets is addiction personified as a sadistic puppetmaster — the drug speaks in the second person, making the listener complicit in the narrator's self-destruction." },
  { id:21, album:'Master of Puppets',   year:1986, tags:['war','futility','trauma'],           text:"The Thing That Should Not Be pulls Lovecraftian imagery into a slow, crushing meditation on the human encounter with forces that cannot be named or defeated." },
  { id:22, album:'Master of Puppets',   year:1986, tags:['grief','loss','darkness'],           text:"Welcome Home (Sanitarium) uses the psychiatric ward as a metaphor for any system that pathologizes inconvenient minds, its dynamics shifting between paranoid quiet and explosive protest." },
  { id:23, album:'Master of Puppets',   year:1986, tags:['war','futility','aggression'],       text:"Disposable Heroes is among the most damning anti-war statements in metal — the soldier reduced to an expendable unit, recycled until dead, the military machine indifferent to the body inside the uniform." },
  { id:24, album:'Master of Puppets',   year:1986, tags:['corruption','power','religion'],     text:"Leper Messiah is a swaggering evisceration of televangelist culture, skewering the transactional relationship between faith and money with particular venom." },
  { id:25, album:'Master of Puppets',   year:1986, tags:['instrumental','grief','memory'],     text:"Orion is the album's still centre — an instrumental elegiac enough to have been played at Cliff Burton's funeral, its melodic development more emotionally articulate than most rock songs with words." },
  { id:26, album:'Master of Puppets',   year:1986, tags:['darkness','power','aggression'],     text:"Damage Inc. closes the album at maximum velocity, Hetfield's lyrics treating violence as a first language and the riff as the only grammar that matters." },
  { id:27, album:'And Justice for All', year:1988, tags:['justice','corruption','power'],      text:"Blackened opens the Justice era with apocalyptic environmentalism — the earth personified as a dying body, poisoned by the same industrial systems that bankroll the justice the album title invokes." },
  { id:28, album:'And Justice for All', year:1988, tags:['justice','corruption','law'],        text:"…And Justice for All diagnoses a legal system so thoroughly captured by wealth that justice becomes a commodity — available to those who can afford it, rationed or withheld from those who cannot." },
  { id:29, album:'And Justice for All', year:1988, tags:['war','futility','trauma'],           text:"Eye of the Beholder turns the First Amendment into a paradox — freedom of speech described as simultaneously guaranteed and impossible, watched and revoked." },
  { id:30, album:'And Justice for All', year:1988, tags:['war','trauma','mortality'],          text:"One is a masterclass in dynamic escalation, starting from the inside of a limbless veteran's consciousness and building to a mechanical firing-squad fury that turns the anti-war message inescapable." },
  { id:31, album:'And Justice for All', year:1988, tags:['justice','defiance','aggression'],  text:"The Shortest Straw examines McCarthyite paranoia and blacklisting — the social machinery of accusation and exclusion rendered as thrash, with the accused's rage given structural form." },
  { id:32, album:'And Justice for All', year:1988, tags:['mythology','darkness','fear'],       text:"Harvester of Sorrow turns domestic violence and generational trauma into a slow, suffocating groove — the monster is a father, and the horror is recognizable." },
  { id:33, album:'And Justice for All', year:1988, tags:['fear','darkness','trauma'],          text:"The Frayed Ends of Sanity tracks a mind unraveling in real time, the music fragmenting alongside the narrator's grip on consensus reality." },
  { id:34, album:'And Justice for All', year:1988, tags:['instrumental','power','darkness'],   text:"To Live Is to Die is the band's memorial to Cliff Burton — a long, shifting instrumental built around a spoken poem Burton wrote, his voice absent but his presence structural." },
  { id:35, album:'And Justice for All', year:1988, tags:['corruption','media','power'],        text:"Dyers Eve closes the album as a furious letter from a stunted adult to the parents who sheltered him from reality — overprotection reframed as a form of violence." },
  { id:36, album:'The Black Album',     year:1991, tags:['control','trauma','darkness'],       text:"Enter Sandman distills childhood fear into an arena-sized lullaby — the monster under the bed given a wall of sound and a production budget, suddenly everyone's nightmare made universal." },
  { id:37, album:'The Black Album',     year:1991, tags:['justice','war','trauma'],            text:"Sad but True describes a shadow self — the darker impulse that narrates from inside, the part that controls the part that thinks it's in control." },
  { id:38, album:'The Black Album',     year:1991, tags:['death','grief','acceptance'],        text:"Holier Than Thou dismantles self-righteousness with economical aggression — the song's anger is righteous in the act of attacking righteousness, a paradox it earns through sheer momentum." },
  { id:39, album:'The Black Album',     year:1991, tags:['mortality','acceptance','grief'],    text:"The Unforgiven is a character study in accumulated bitterness — a life lived in reaction to external judgment, the resentment so old it has become the self." },
  { id:40, album:'The Black Album',     year:1991, tags:['love','loss','isolation'],           text:"Wherever I May Roam romanticizes rootlessness with enough guitar swagger to make homelessness sound like philosophy — road life as spiritual condition." },
  { id:41, album:'The Black Album',     year:1991, tags:['trauma','isolation','despair'],      text:"Don't Tread on Me is the album's most chest-puffed nationalist moment, more interesting as a document of early-90s American triumphalism than as music." },
  { id:42, album:'The Black Album',     year:1991, tags:['mortality','acceptance','fear'],     text:"Through the Never packs an existential road-trip into three minutes, the narrator racing toward a horizon that keeps receding — movement as the only answer to the unanswerable." },
  { id:43, album:'The Black Album',     year:1991, tags:['grief','loss','love'],               text:"Nothing Else Matters was written as a private love letter during a tour phone call and became Metallica's most covered song — intimacy at stadium scale, which should be a contradiction." },
  { id:44, album:'The Black Album',     year:1991, tags:['control','defiance','darkness'],     text:"Of Wolf and Man pairs lycanthrope mythology with a surprisingly earnest ecological subtext — the wolf as a creature that belongs to nature, not to civilization's categories." },
  { id:45, album:'The Black Album',     year:1991, tags:['trauma','control','darkness'],       text:"The God That Failed is Hetfield's most direct excavation of his Christian Science upbringing — faith weaponized against medicine, and the grief of a child who watched it fail." },
  { id:46, album:'The Black Album',     year:1991, tags:['isolation','identity','despair'],    text:"My Friend of Misery is a portrait of someone so deeply invested in suffering that the suffering has become a social identity — grief as personality." },
  { id:47, album:'The Black Album',     year:1991, tags:['darkness','mortality','fear'],       text:"The Struggle Within closes the album on a note of furious introspection — the enemy located not in any system or institution but in the narrator's own compulsive negativity." },
  { id:48, album:'Load',               year:1996, tags:['identity','change','darkness'],      text:"Ain't My Bitch opens the Load era as a declarative refusal — whatever burden is being handed to the narrator, he's not carrying it, a blunt reinvention after five years of stadium saturation." },
  { id:49, album:'Load',               year:1996, tags:['mortality','darkness','isolation'],  text:"2 x 4 is a grinding, mid-tempo threat with a blues chassis — the song is essentially a vehicle for Hetfield's ability to imply physical menace through syllable placement alone." },
  { id:50, album:'Load',               year:1996, tags:['mythology','power','darkness'],      text:"The House Jack Built is Load's most explicitly addiction-themed track, the house a metaphor for the body, the room for the mind, the dwelling dismantled by the substance living inside it." },
  { id:51, album:'Load',               year:1996, tags:['justice','defiance','corruption'],   text:"Until It Sleeps was the commercial lead single — deceptively simple, with Hetfield's cancer-as-internal-enemy metaphor landing harder than the arrangement initially suggests." },
  { id:52, album:'Load',               year:1996, tags:['identity','isolation','despair'],    text:"King Nothing traces the collapse of ambition into emptiness — the throne achieved, the view from the top confirming that the throne was never the point." },
  { id:53, album:'Load',               year:1996, tags:['identity','darkness','trauma'],      text:"Hero of the Day is a delicate, almost tender track about the parasitic nature of heroism — the rescuer needing the victim as much as the victim needs rescuing." },
  { id:54, album:'Load',               year:1996, tags:['change','isolation','grief'],        text:"Bleeding Me is Load's emotional centerpiece, a nine-minute examination of self-destruction as a form of spiritual seeking — bleeding as purification, the wound as a door." },
  { id:55, album:'Load',               year:1996, tags:['speed','aggression','defiance'],     text:"Cure is a charging mid-album breather, the frustration of trying to fix what cannot be fixed given a percussive, restless energy." },
  { id:56, album:'Load',               year:1996, tags:['identity','power','mythology'],      text:"Poor Twisted Me is a self-lacerating blues shuffle — the narrator wallowing with enough self-awareness to be embarrassed about the wallowing but not enough to stop." },
  { id:57, album:'Load',               year:1996, tags:['aggression','defiance','speed'],     text:"Wasting My Hate is a compact, economical burst of aggression — the song is almost over before the listener has registered it has started, which is musically appropriate for a track about futile anger." },
  { id:58, album:'Load',               year:1996, tags:['love','loss','grief'],               text:"Mama Said is Hetfield's acoustic reckoning with his mother's death and the faith that caused it — country-inflected, disarmingly vulnerable, proof that the quietest song on the record often carries the most weight." },
  { id:59, album:'Load',               year:1996, tags:['corruption','power','justice'],      text:"Thorn Within is a guilt-drenched mid-tempo churn, the narrator's self-condemnation so thorough it becomes its own kind of pride." },
  { id:60, album:'Load',               year:1996, tags:['death','power','mythology'],         text:"Ronnie is a cinematic ballad about a school shooter before that was a genre, the biography rendered without sentimentality or explanation — the absence of motive more disturbing than any analysis." },
  { id:61, album:'Load',               year:1996, tags:['darkness','mortality','acceptance'], text:"The Outlaw Torn closes Load with an eleven-minute requiem for something lost that the song never quite names — the ambiguity feels intentional, grief too large for a single referent." },
  { id:62, album:'Reload',             year:1997, tags:['speed','aggression','defiance'],     text:"Fuel distills Reload's arena ambitions into a single high-octane declaration — velocity as religion, the engine as the only god worth worshipping." },
  { id:63, album:'Reload',             year:1997, tags:['mortality','grief','acceptance'],    text:"The Memory Remains features Marianne Faithfull's spectral presence as a faded fame metaphor — celebrity decay observed with more compassion than cruelty." },
  { id:64, album:'Reload',             year:1997, tags:['isolation','identity','darkness'],   text:"Devil's Dance is a slow-burn seduction narrative, the tempter's voice low and patient, the melody doing the work of a raised eyebrow." },
  { id:65, album:'Reload',             year:1997, tags:['war','trauma','futility'],           text:"The Unforgiven II extends the original's character study into a second chapter — the bitterness has curdled differently with age, more aware of its own circularity." },
  { id:66, album:'Reload',             year:1997, tags:['love','darkness','isolation'],       text:"Better Than You is a strutting challenge, the narrator's confidence performing the very arrogance the song claims to critique." },
  { id:67, album:'Reload',             year:1997, tags:['trauma','control','darkness'],       text:"Slither is a slow, greasy blues that channels the manipulative partner with uncomfortable accuracy — the language of care deployed as a tool of domination." },
  { id:68, album:'Reload',             year:1997, tags:['identity','isolation','change'],     text:"Carpe Diem Baby turns the classical imperative toward darkness — seize the day, yes, but the day being seized is explicitly doomed, the urgency tinged with nihilism." },
  { id:69, album:'Reload',             year:1997, tags:['mythology','darkness','power'],      text:"Bad Seed is a character study in inherited malevolence — nature over nurture argued with a grinding, patient insistence." },
  { id:70, album:'Reload',             year:1997, tags:['grief','loss','mortality'],          text:"Where the Wild Things Are is Load's more introspective cousin — the wilderness internalized, the beast domesticated but still restless inside the house." },
  { id:71, album:'Reload',             year:1997, tags:['justice','corruption','power'],      text:"Prince Charming deconstructs the savior myth — the rescue narrative revealed as a transaction, the rescuer's need as great as the rescued's." },
  { id:72, album:'Reload',             year:1997, tags:['isolation','darkness','despair'],    text:"Low Man's Lyric is among Metallica's most stripped-back moments — hurdy-gurdy and acoustic guitar under a self-excoriating lyric about shame and social invisibility." },
  { id:73, album:'Reload',             year:1997, tags:['aggression','defiance','speed'],     text:"Attitude is a minimalist hard-rock shrug — the kind of song that sounds effortless because it refuses to try, which is either honesty or laziness, depending on your generosity." },
  { id:74, album:'Reload',             year:1997, tags:['mortality','darkness','acceptance'], text:"Fixxxer closes Reload with a slow-moving, psychologically dense examination of cycles — the damage repeated across generations, the child becoming the parent becoming the wound." },

const ALL_ALBUMS = [...new Set(TRACKS.map(d => d.album))];
const ALL_TAGS   = [...new Set(TRACKS.flatMap(d => d.tags))].sort();
const SHORT = { "Kill 'Em All":'KEA', 'Ride the Lightning':'RTL', 'Master of Puppets':'MOP', 'And Justice for All':'AJFA', 'The Black Album':'TBA', 'Load':'Load', 'Reload':'Reload', 'St. Anger':'St.A', 'Death Magnetic':'DM', 'Hardwired':'HW2SD', '72 Seasons':'72S' };

const isMobile = () => window.innerWidth <= 600;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cursorCanvas = document.getElementById('cursor-canvas');
const cursorCtx    = cursorCanvas.getContext('2d');
let W = canvas.width = cursorCanvas.width  = window.innerWidth;
let H = canvas.height = cursorCanvas.height = window.innerHeight;

const FONT_BASE  = 11;
const FONT_LARGE = 20;
const SEP = ' — ';
let fontT = 0, fontTgt = 0;
const FONT_LERP = 0.07;

// ── BLOOM SIZE: scrollwheel on desktop, fixed on mobile ──
const BLOOM_MIN = 60, BLOOM_MAX = 400, BLOOM_DEFAULT = 160;
let bloomRadius = BLOOM_DEFAULT;

window.addEventListener('wheel', e => {
  if (isMobile()) return;
  bloomRadius = Math.min(BLOOM_MAX, Math.max(BLOOM_MIN, bloomRadius - e.deltaY * 0.4));
}, { passive: true });

function isFiltered() { return activeAlbum !== null || activeTags.size > 0; }
function currentFontSize() {
  const base = isMobile() ? 9 : FONT_BASE;
  const large = isMobile() ? 16 : FONT_LARGE;
  return base + (large - base) * fontT;
}
function currentCharW()    { return currentFontSize() * 0.602; }
function currentLineH()    { return currentFontSize() * 1.64; }
function currentPadX()     { return isMobile() ? 10 : 80; }
function currentPadTop()   { return 220; }
function currentFontFace() { return `300 ${currentFontSize().toFixed(2)}px "DM Mono", monospace`; }

// ── Bottom safe area: fixed 120px clearance from bottom of viewport ──
function getBottomSafeArea() { return 120; }

const TETHER_K = 0.014, DAMP = 0.76, REPEL_R = 110, REPEL_S = 3.2, BLOB_LERP = 0.11, BLOB_RX = 28;

const topHeader = document.getElementById('top-header'), logoWidget = document.getElementById('logo-widget');
const LOGO_SIZE = 180;
let activeDrag = null, dragDX = 0, dragDY = 0;
let logoX = Math.round(window.innerWidth / 2 - LOGO_SIZE / 2), logoY = 22;

function bindDraggable(element, widgetContainer) {
  element.addEventListener('mousedown', e => {
    activeDrag = widgetContainer;
    const rect = widgetContainer.getBoundingClientRect();
    dragDX = e.clientX - rect.left; dragDY = e.clientY - rect.top;
    e.preventDefault();
  });
}

bindDraggable(logoWidget, topHeader);
document.querySelectorAll('.widget-topbar').forEach(bar => bindDraggable(bar, bar.closest('.filter-widget')));
window.addEventListener('mouseup', () => { activeDrag = null; });
window.addEventListener('mousemove', e => {
  if (!activeDrag) return;
  const nx = e.clientX - dragDX, ny = e.clientY - dragDY;
  if (activeDrag === topHeader) {
    logoX = nx; logoY = ny;
    topHeader.style.left = logoX + 'px'; topHeader.style.top = logoY + 'px'; topHeader.style.transform = 'none';
  } else {
    activeDrag.style.left = nx + 'px'; activeDrag.style.top = ny + 'px';
    activeDrag.style.bottom = 'auto'; activeDrag.style.right = 'auto';
    invalidateFilterRepel();
  }
});

document.querySelectorAll('.collapse-btn').forEach(btn => {
  btn.addEventListener('mousedown', e => e.stopPropagation());
  btn.addEventListener('click', e => {
    const widget = btn.closest('.filter-widget');
    widget.classList.toggle('collapsed');
    btn.textContent = widget.classList.contains('collapsed') ? '+' : '−';
    invalidateFilterRepel();
    buildLayout();
  });
});

const INFO_TEXT = "this here is a fan-made thought-experiment — a meditation on meaning as mass. one analytical sentence per track across metallica's studio discography. built to ask what it feels like to hold a body of work all at once.";
const infoOverlay = document.getElementById('info-overlay'), infoCanvas = document.getElementById('info-canvas'), infoCtx = infoCanvas.getContext('2d'), infoBtn = document.getElementById('info-btn'), infoClose = document.getElementById('info-close');
let infoOpen = false, infoChars = [], infoMX = 0, infoMY = 0, infoBX = 0, infoBY = 0;

function buildInfoLayout() {
  infoChars = [];
  const IW = Math.min(680, window.innerWidth - 80), IH = window.innerHeight;
  infoCanvas.width = IW; infoCanvas.height = IH;
  const FONT_SZ = 15, CW = FONT_SZ * 0.602, LH = FONT_SZ * 1.72, PAD = 48, maxW = IW - PAD * 2;
  const words = INFO_TEXT.split(' '), lines = [];
  let cur = [], curW = 0;
  words.forEach(w => {
    const seg = (cur.length ? ' ' : '') + w, sw = seg.length * CW;
    if (curW + sw > maxW && cur.length) { lines.push(cur); cur = [w]; curW = w.length * CW; }
    else { cur.push(seg); curW += sw; }
  });
  if (cur.length) lines.push(cur);
  const startY = (IH - lines.length * LH) * 0.5;
  lines.forEach((line, li) => {
    let rx = PAD;
    line.forEach(seg => {
      for (let ci = 0; ci < seg.length; ci++) {
        infoChars.push({ ch: seg[ci], restX: rx + ci * CW, restY: startY + li * LH, x: rx + ci * CW, y: startY + li * LH, vx:0, vy:0, op: 0.28 + Math.random() * 0.5 });
      }
      rx += seg.length * CW;
    });
  });
  infoBX = IW / 2; infoBY = IH / 2;
}

infoBtn.addEventListener('click', () => { infoOpen = true; infoOverlay.classList.add('visible'); buildInfoLayout(); });
infoClose.addEventListener('click', () => { infoOpen = false; infoOverlay.classList.remove('visible'); });
infoOverlay.addEventListener('mousemove', e => { const r = infoCanvas.getBoundingClientRect(); infoMX = e.clientX - r.left; infoMY = e.clientY - r.top; });

let activeAlbum = null, activeTags = new Set(), domButtons = [], filterRepelZones = [];
let mX = W/2, mY = H/2, bX = W/2, bY = H/2, eX = W/2, eY = H/2, eVX = 0, eVY = 0;

window.addEventListener('mousemove', e => { mX = e.clientX; mY = e.clientY; });

function initDOMFilters() {
  const albC = document.getElementById('albums-container'), tagC = document.getElementById('tags-container');
  ALL_ALBUMS.forEach(a => {
    const btn = document.createElement('div'); btn.className = 'filter-btn'; btn.textContent = SHORT[a] || a;
    btn.addEventListener('click', () => { activeAlbum = activeAlbum === a ? null : a; buildLayout(); });
    albC.appendChild(btn); domButtons.push({ btn, key: a, type: 'album' });
  });
  ALL_TAGS.forEach(t => {
    const btn = document.createElement('div'); btn.className = 'filter-btn'; btn.textContent = t;
    btn.addEventListener('click', () => { activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t); buildLayout(); });
    tagC.appendChild(btn); domButtons.push({ btn, key: t, type: 'tag' });
  });
}

function refreshFilterState() {
  const visible = TRACKS.filter(d => (!activeAlbum || d.album === activeAlbum) && (activeTags.size === 0 || d.tags.some(t => activeTags.has(t))));
  const vA = new Set(visible.map(d => d.album)), vT = new Set(visible.flatMap(d => d.tags));
  domButtons.forEach(({ btn, key, type }) => {
    const isActive = type === 'album' ? key === activeAlbum : activeTags.has(key);
    const isRel = isActive ? false : (type === 'album' ? vA.has(key) : vT.has(key));
    btn.classList.toggle('active', isActive); btn.classList.toggle('related', isRel);
  });
}

function invalidateFilterRepel() {
  filterRepelZones = [];
  [document.getElementById('albums-widget'), document.getElementById('tags-widget')].forEach(w => {
    const r = w.getBoundingClientRect();
    filterRepelZones.push({ left: r.left - 28, top: r.top - 28, right: r.right + 28, bottom: r.bottom + 28, rx: r.left, ry: r.top, rw: r.width, rh: r.height, pad: 28 });
  });
}

let allChars = [];

function computeLayout(charW, lineH, padX, padTop) {
  const visible = TRACKS.filter(d => (!activeAlbum || d.album === activeAlbum) && (activeTags.size === 0 || d.tags.some(t => activeTags.has(t))));
  if (!visible.length) return [];
  const tokens = [];
  visible.forEach((d, i) => {
    d.text.split(' ').forEach(w => tokens.push({ text: w, trackId: d.id }));
    if (i < visible.length - 1) tokens.push({ text: SEP.trim(), trackId: d.id, isSep: true });
  });
  // Bottom boundary: viewport height minus fixed 120px safe area
  const maxW = W - padX * 2;
  const maxH = H - getBottomSafeArea();
  const lines = [];
  let curL = [], curW = 0;
  tokens.forEach(tok => {
    const seg = (curL.length ? ' ' : '') + tok.text, sw = seg.length * charW;
    if (curW + sw > maxW && curL.length) { lines.push(curL); curL = [{ ...tok, display: tok.text }]; curW = tok.text.length * charW; }
    else { curL.push({ ...tok, display: seg }); curW += sw; }
  });
  if (curL.length) lines.push(curL);
  const chars = [];
  lines.forEach((line, li) => {
    const ry = padTop + li * lineH;
    if (ry > maxH) return; // skip lines that exceed safe area
    let rx = padX;
    line.forEach(tok => {
      for (let ci = 0; ci < tok.display.length; ci++) {
        chars.push({ ch: tok.display[ci], restX: rx + ci * charW, restY: ry, seed: (tok.trackId * 137 + ci) % 100 / 100, isSep: tok.isSep });
      }
      rx += tok.display.length * charW;
    });
  });
  return chars;
}

function buildLayout() {
  const tgtT = isFiltered() ? 1 : 0;
  const tgtF = (isMobile() ? 9 : FONT_BASE) + ((isMobile() ? 16 : FONT_LARGE) - (isMobile() ? 9 : FONT_BASE)) * tgtT;
  const tgtCW = tgtF * 0.602, tgtLH = tgtF * 1.64;
  const layout = computeLayout(tgtCW, tgtLH, currentPadX(), currentPadTop());
  allChars = layout.map((def, i) => {
    const ex = allChars[i];
    return { ch: def.ch, restX: def.restX, restY: def.restY, x: ex ? ex.x : def.restX, y: ex ? ex.y : def.restY, vx: ex ? ex.vx : 0, vy: ex ? ex.vy : 0, baseOpacity: def.isSep ? 0.11 : 0.32 + def.seed * 0.38 };
  });
  fontTgt = tgtT;
  document.getElementById('cnt').textContent = TRACKS.filter(d => (!activeAlbum || d.album === activeAlbum) && (activeTags.size === 0 || d.tags.some(t => activeTags.has(t)))).length;
  refreshFilterState();
}

function loop() {
  requestAnimationFrame(loop);
  bX += (mX - bX) * BLOB_LERP; bY += (mY - bY) * BLOB_LERP;
  eVX = (mX - eX) * 0.1; eVY = (mY - eY) * 0.1; eX += (eVX *= 0.68); eY += (eVY *= 0.68);
  fontT += (fontTgt - fontT) * FONT_LERP;

  if (Math.abs(fontT - fontTgt) > 0.001) {
    const l = computeLayout(currentCharW(), currentLineH(), currentPadX(), currentPadTop());
    l.forEach((def, i) => { if (allChars[i]) { allChars[i].restX = def.restX; allChars[i].restY = def.restY; } });
  }

  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  ctx.font = currentFontFace(); ctx.textBaseline = 'top';
  const lcx = logoX + 90, lcy = logoY + 90;

  for (const p of allChars) {
    p.vx += (p.restX - p.x) * TETHER_K; p.vy += (p.restY - p.y) * TETHER_K;
    const dx = p.x - bX, dy = p.y - bY, d = Math.sqrt(dx*dx + dy*dy);
    if (d < REPEL_R && d > 0.5) { const f = (1 - d/REPEL_R); p.vx += (dx/d) * f * f * 16; p.vy += (dy/d) * f * f * 16; }
    const ldx = p.x - lcx, ldy = p.y - lcy, ld = Math.sqrt(ldx*ldx + ldy*ldy);
    if (ld < 130) { const f = (1 - ld/130); p.vx += (ldx/ld) * f * f * 20; p.vy += (ldy/ld) * f * f * 20; }
    filterRepelZones.forEach(z => {
      if (p.x > z.left && p.x < z.right && p.y > z.top && p.y < z.bottom) {
        const cpx = Math.max(z.rx, Math.min(p.x, z.rx + z.rw)), cpy = Math.max(z.ry, Math.min(p.y, z.ry + z.rh));
        const ddx = p.x - cpx, ddy = p.y - cpy, dd = Math.sqrt(ddx*ddx + ddy*ddy);
        if (dd < z.pad && dd > 0.5) { const f = (1 - dd/z.pad); p.vx += (ddx/dd) * f * f * 16; p.vy += (ddy/dd) * f * f * 16; }
      }
    });
    p.vx *= DAMP; p.vy *= DAMP; p.x += p.vx; p.y += p.vy;

    // Fade chars based on distance to blob cursor
    const fadeStart = 20, fadeEnd = 60;
    const alpha = p.baseOpacity * Math.min(1, Math.max(0, (d - fadeStart) / (fadeEnd - fadeStart)));
    if (alpha > 0.01) { ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`; ctx.fillText(p.ch, p.x, p.y); }
  }

  // ── Cursor: bloom radius controlled by scroll (desktop only) ──
  cursorCtx.clearRect(0,0,W,H);

  if (!isMobile()) {
    // Bloom glow
    const grad = cursorCtx.createRadialGradient(bX, bY, 0, bX, bY, bloomRadius);
    grad.addColorStop(0,   'rgba(255,255,255,0.055)');
    grad.addColorStop(0.4, 'rgba(255,255,255,0.018)');
    grad.addColorStop(1,   'rgba(255,255,255,0)');
    cursorCtx.fillStyle = grad;
    cursorCtx.beginPath();
    cursorCtx.arc(bX, bY, bloomRadius, 0, Math.PI*2);
    cursorCtx.fill();
  }

  // Lagging dot
  cursorCtx.fillStyle = 'rgba(255,255,255,0.4)';
  cursorCtx.beginPath(); cursorCtx.arc(eX, eY, 4, 0, Math.PI*2); cursorCtx.fill();
  // Sharp dot at exact mouse pos
  cursorCtx.fillStyle = '#fff';
  cursorCtx.beginPath(); cursorCtx.arc(mX, mY, 1.5, 0, Math.PI*2); cursorCtx.fill();

  if (infoOpen) {
    infoBX += (infoMX - infoBX) * 0.11; infoBY += (infoMY - infoBY) * 0.11;
    infoCtx.clearRect(0,0,infoCanvas.width, infoCanvas.height);
    infoCtx.font = `300 15px "DM Mono", monospace`;
    for (const p of infoChars) {
      p.vx += (p.restX - p.x) * 0.016; p.vy += (p.restY - p.y) * 0.016;
      const dx = p.x - infoBX, dy = p.y - infoBY, d = Math.sqrt(dx*dx + dy*dy);
      if (d < 110) { const f = (1 - d/110); p.vx += (dx/d) * f * f * 16; p.vy += (dy/d) * f * f * 16; }
      p.vx *= 0.76; p.vy *= 0.76; p.x += p.vx; p.y += p.vy;
      infoCtx.fillStyle = `rgba(255,255,255,${(p.op * Math.min(1, d/50)).toFixed(2)})`; infoCtx.fillText(p.ch, p.x, p.y);
    }
  }
}

window.addEventListener('resize', () => {
  W = canvas.width = cursorCanvas.width = window.innerWidth;
  H = canvas.height = cursorCanvas.height = window.innerHeight;
  buildLayout(); invalidateFilterRepel();
});

initDOMFilters(); invalidateFilterRepel(); buildLayout(); loop();
</script>
</body>
</html>
